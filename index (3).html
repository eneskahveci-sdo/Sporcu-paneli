<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<title>Sporcu Paneli</title>
<style>
:root{--bg:#0d1117;--bg2:#161b22;--bg3:#1c2128;--border:#30363d;--text:#e6edf3;--text2:#8b949e;--text3:#484f58;--blue:#58a6ff;--green:#3fb950;--red:#f85149;--yellow:#d29922;--purple:#bc8cff}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:14px;height:100vh;overflow:hidden;display:flex;flex-direction:column}
input,select,textarea{background:var(--bg3);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:14px;padding:9px 12px;width:100%;outline:none;font-family:inherit}
input:focus,select:focus,textarea:focus{border-color:var(--blue)}
textarea{resize:vertical;min-height:80px}
label{display:block;font-size:12px;color:var(--text2);margin-bottom:5px;font-weight:500}
.btn{border:none;border-radius:8px;cursor:pointer;font-size:13px;font-weight:600;padding:8px 14px;transition:.15s}
.bp{background:var(--blue);color:#fff}.bp:active{opacity:.8}
.bs{background:var(--bg3);color:var(--text);border:1px solid var(--border)}
.bd{background:rgba(248,81,73,.15);color:var(--red);border:1px solid rgba(248,81,73,.3)}
.bsu{background:rgba(63,185,80,.15);color:var(--green);border:1px solid rgba(63,185,80,.3)}
.by{background:rgba(210,153,34,.15);color:var(--yellow);border:1px solid rgba(210,153,34,.3)}
.btn-sm{padding:5px 10px;font-size:12px}
.btn-xs{padding:3px 8px;font-size:11px}
.w100{width:100%}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:16px}
.dv{height:1px;background:var(--border)}
.dn{display:none!important}
.flex{display:flex}.fca{align-items:center}.fjb{justify-content:space-between}.fwrap{flex-wrap:wrap}
.gap1{gap:6px}.gap2{gap:10px}.gap3{gap:14px}.gap4{gap:20px}
.mb2{margin-bottom:8px}.mb3{margin-bottom:14px}.mt2{margin-top:8px}.mt3{margin-top:14px}
.tw{overflow-x:auto}.tw table{width:100%;border-collapse:collapse}.tw th,.tw td{padding:10px 12px;text-align:left;border-bottom:1px solid var(--border);white-space:nowrap}
.tw th{font-size:12px;color:var(--text2);font-weight:600}.tw td{font-size:13px}
.tw tr:last-child td{border-bottom:none}.tw tr:hover td{background:rgba(255,255,255,.02)}
.tsm{font-size:12px}.ts{font-size:11px}.tm{color:var(--text2)}.tw6{font-weight:600}
.tg{color:var(--green)}.tr2{color:var(--red)}.ty{color:var(--yellow)}.tb{color:var(--blue)}
.trunc{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.bg{font-size:11px;padding:2px 8px;border-radius:20px;font-weight:600;white-space:nowrap}
.bg-g{background:rgba(63,185,80,.15);color:var(--green)}
.bg-r{background:rgba(248,81,73,.15);color:var(--red)}
.bg-y{background:rgba(210,153,34,.15);color:var(--yellow)}
.bg-b{background:rgba(88,166,255,.15);color:var(--blue)}
.bg-p{background:rgba(188,140,255,.15);color:var(--purple)}
.ava{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,var(--blue),var(--purple));display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;flex-shrink:0}
.stat-card{cursor:pointer;transition:.15s}.stat-card:active{opacity:.75}
.stat-icon{font-size:22px;margin-bottom:6px}.stat-val{font-size:22px;font-weight:700;margin-bottom:2px}.stat-lbl{font-size:12px;color:var(--text2)}
.stat-b{border-color:rgba(88,166,255,.3)}.stat-g{border-color:rgba(63,185,80,.3)}.stat-r{border-color:rgba(248,81,73,.3)}.stat-y{border-color:rgba(210,153,34,.3)}
.al{border-radius:8px;padding:10px 14px;font-size:13px;margin-bottom:12px}
.al-r{background:rgba(248,81,73,.1);border:1px solid rgba(248,81,73,.3);color:var(--red)}
.al-y{background:rgba(210,153,34,.1);border:1px solid rgba(210,153,34,.3);color:var(--yellow)}
.al-g{background:rgba(63,185,80,.1);border:1px solid rgba(63,185,80,.3);color:var(--green)}
.al-b{background:rgba(88,166,255,.1);border:1px solid rgba(88,166,255,.3);color:var(--blue)}
.fg{display:grid;grid-template-columns:1fr 1fr;gap:12px}.fgr{display:flex;flex-direction:column}.fgr.full{grid-column:1/-1}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px}
.g4{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:12px}
.g21{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.filters{display:flex;gap:8px;flex-wrap:wrap}.fs{background:var(--bg3);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:13px;padding:7px 10px;flex:1;min-width:120px;outline:none}
.att-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border)}
.att-row:last-child{border-bottom:none}
.att-btns{display:flex;gap:4px}
.att-b{border:1px solid var(--border);background:var(--bg3);color:var(--text2);border-radius:6px;padding:4px 8px;font-size:11px;font-weight:600;cursor:pointer}
.att-b.ap{background:rgba(63,185,80,.2);border-color:var(--green);color:var(--green)}
.att-b.aa{background:rgba(248,81,73,.2);border-color:var(--red);color:var(--red)}
.att-b.al2{background:rgba(210,153,34,.2);border-color:var(--yellow);color:var(--yellow)}
.pr{height:6px;background:var(--bg3);border-radius:3px;overflow:hidden}
.prb{height:100%;border-radius:3px;transition:.3s}
.prb-g{background:var(--green)}.prb-y{background:var(--yellow)}.prb-r{background:var(--red)}
.dr{display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border)}
.dr:last-child{border-bottom:none}.dl{font-size:13px}.dvl{font-size:14px}
.ph{margin-bottom:16px}.stit{font-size:18px;font-weight:700}.ssub{font-size:13px;color:var(--text2);margin-top:2px}
.sh{display:flex;align-items:center;justify-content:space-between}
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:10px 18px;font-size:13px;font-weight:600;z-index:999;opacity:0;transition:.25s;white-space:nowrap;pointer-events:none}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.toast-e{border-color:rgba(248,81,73,.4);color:var(--red)}
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:500;align-items:flex-end;justify-content:center}
.modal-bg.show{display:flex}
.modal-box{background:var(--bg2);border-radius:16px 16px 0 0;width:100%;max-width:600px;max-height:88vh;display:flex;flex-direction:column}
.modal-hd{padding:16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.modal-body{padding:16px;overflow-y:auto;flex:1}
.modal-ft{padding:12px 16px;border-top:1px solid var(--border);display:flex;gap:8px;justify-content:flex-end;flex-shrink:0}
.modal-x{background:none;border:none;color:var(--text2);font-size:20px;cursor:pointer;padding:2px 6px;line-height:1}
#wrap{display:flex;flex-direction:column;flex:1;overflow:hidden}
#side{position:fixed;left:-260px;top:0;bottom:0;width:260px;background:var(--bg2);border-right:1px solid var(--border);z-index:200;transition:.25s;overflow-y:auto;display:flex;flex-direction:column}
#side.open{left:0}
#overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:150}
#overlay.show{display:block}
.slogo{padding:16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
.slogo-icon{width:36px;height:36px;background:linear-gradient(135deg,var(--blue),var(--purple));border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.snav{padding:10px 8px;flex:1}
.nsec{font-size:11px;color:var(--text3);font-weight:600;padding:8px 8px 4px;text-transform:uppercase;letter-spacing:.5px}
.ni{display:flex;align-items:center;gap:10px;width:100%;padding:9px 10px;border-radius:8px;border:none;background:none;color:var(--text2);font-size:13px;font-weight:500;cursor:pointer;text-align:left;transition:.15s;margin-bottom:2px}
.ni svg{width:18px;height:18px;flex-shrink:0}
.ni:hover,.ni.on{background:rgba(88,166,255,.1);color:var(--blue)}
.ni .badge{margin-left:auto;background:var(--red);color:#fff;border-radius:10px;padding:1px 6px;font-size:10px;font-weight:700}
#main{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:16px}
#bar{display:flex;align-items:center;gap:10px;padding:12px 16px;background:var(--bg2);border-bottom:1px solid var(--border);flex-shrink:0}
.hbg{background:none;border:none;color:var(--text2);cursor:pointer;padding:4px;border-radius:6px;display:flex;align-items:center;justify-content:center}
#bnav{background:var(--bg2);border-top:1px solid var(--border);flex-shrink:0;padding:4px 0 8px}
.bni{display:flex;justify-content:space-around}
.bni-btn{display:flex;flex-direction:column;align-items:center;gap:2px;background:none;border:none;color:var(--text2);font-size:10px;cursor:pointer;padding:6px 8px;border-radius:8px;min-width:52px;transition:.15s}
.bni-btn svg{width:20px;height:20px}
.bni-btn.on{color:var(--blue)}
#sporcu-portal{display:none;flex-direction:column;height:100vh;overflow:hidden}
.sp-hd{background:var(--bg2);border-bottom:1px solid var(--border);padding:14px 16px;display:flex;align-items:center;gap:12px;flex-shrink:0}
.sp-tabs{display:flex;background:var(--bg3);border-bottom:1px solid var(--border);flex-shrink:0}
.sp-tab{flex:1;padding:11px 4px;text-align:center;font-size:12px;font-weight:600;color:var(--text2);border:none;background:none;cursor:pointer;border-bottom:2px solid transparent}
.sp-tab.on{color:var(--blue);border-bottom-color:var(--blue)}
.sp-body{flex:1;overflow-y:auto;padding:14px}
#lbox-wrap{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;padding:20px;z-index:100}
.lbox{background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:28px 24px;width:100%;max-width:420px}
.llogo{text-align:center;margin-bottom:24px}
.llogo-i{width:64px;height:64px;background:linear-gradient(135deg,var(--blue),var(--purple));border-radius:18px;display:flex;align-items:center;justify-content:center;font-size:30px;margin:0 auto 12px}
.ltabs{display:flex;background:var(--bg3);border-radius:10px;padding:3px;margin-bottom:20px}
.ltab{flex:1;padding:8px;text-align:center;border-radius:8px;border:none;background:none;color:var(--text2);font-size:13px;font-weight:600;cursor:pointer}
.ltab.on{background:var(--bg2);color:var(--text)}
.lerr{background:rgba(248,81,73,.1);border:1px solid rgba(248,81,73,.3);color:var(--red);border-radius:8px;padding:10px;font-size:13px;margin-bottom:12px}
#loading-overlay{display:none;position:fixed;inset:0;background:rgba(13,17,23,.85);z-index:9990;align-items:center;justify-content:center;flex-direction:column;gap:12px}
.spin{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--blue);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
@media(max-width:600px){
  .g4{grid-template-columns:1fr 1fr}.g3{grid-template-columns:1fr 1fr}.g2{grid-template-columns:1fr}.g21{grid-template-columns:1fr}
  .fg{grid-template-columns:1fr}.fgr.full{grid-column:1}
}
</style>
</head>
<body>
<div id="loading-overlay"><div class="spin"></div><div style="color:var(--text2);font-size:13px">Yukleniyor...</div></div>

<div id="lbox-wrap">
  <div id="login">
    <div class="lbox">
      <div class="llogo">
        <div class="llogo-i">&#x26BD;</div>
        <h1 style="font-size:20px;font-weight:800">Sporcu Paneli</h1>
        <p style="color:var(--text2);font-size:13px;margin-top:4px">Akademi Yonetim Sistemi</p>
      </div>
      <div class="ltabs">
        <button class="ltab on" onclick="switchLoginTab('admin')">Kurum Girisi</button>
        <button class="ltab" onclick="switchLoginTab('sporcu')">Sporcu / Veli</button>
      </div>
      <div id="login-admin">
        <div class="fgr mb3"><label>E-posta</label><input id="le" type="email" placeholder="ornek@email.com" onkeydown="if(event.key==='Enter')doLogin()"/></div>
        <div class="fgr mb3"><label>Sifre</label><input id="lp" type="password" placeholder="Sifreniz" onkeydown="if(event.key==='Enter')doLogin()"/></div>
        <div id="lerr" class="lerr dn">E-posta veya sifre hatali!</div>
        <button class="btn bp w100 mb3" onclick="doLogin()">Giris Yap</button>
        <div style="text-align:center;font-size:13px;color:var(--text2)"><span onclick="showForgotPassword()" style="cursor:pointer">Sifremi Unuttum</span></div>
        <div style="text-align:center;font-size:13px;color:var(--text2);margin-top:8px">Hesabiniz yok mu? <span onclick="showRegister()" style="color:var(--blue);cursor:pointer;font-weight:600">Kurum Kaydi Olustur</span></div>
      </div>
      <div id="login-sporcu" class="dn">
        <div class="fgr mb3"><label>TC Kimlik No</label><input id="ls-tc" type="tel" maxlength="11" placeholder="11 haneli TC" onkeydown="if(event.key==='Enter')doSporcuLogin()"/></div>
        <div class="fgr mb3"><label>Sifre</label><input id="ls-pass" type="password" placeholder="Sifreniz" onkeydown="if(event.key==='Enter')doSporcuLogin()"/></div>
        <div id="ls-err" class="lerr dn">TC veya sifre hatali!</div>
        <button class="btn bp w100 mb3" onclick="doSporcuLogin()">Giris Yap</button>
        <div style="text-align:center;font-size:13px;color:var(--text2)"><span onclick="showForgotPassword()" style="cursor:pointer">Sifremi Unuttum</span></div>
      </div>
    </div>
  </div>
</div>

<div id="sporcu-portal">
  <div class="sp-hd">
    <div class="ava" id="sp-avatar">S</div>
    <div style="flex:1"><div class="tw6" id="sp-name">Sporcu</div><div class="ts tm" id="sp-orgname">Akademi</div></div>
    <button class="btn bs btn-sm" onclick="doSporcuLogout()">Cikis</button>
  </div>
  <div class="sp-tabs">
    <button class="sp-tab on" onclick="spTab('profil')">Profil</button>
    <button class="sp-tab" onclick="spTab('yoklama')">Yoklama</button>
    <button class="sp-tab" onclick="spTab('odemeler')">Odemeler</button>
    <button class="sp-tab" onclick="spTab('odeme-yap')">Odeme Yap</button>
  </div>
  <div class="sp-body" id="sp-content"></div>
</div>

<div id="wrap" class="dn">
  <div id="overlay" onclick="closeSide()"></div>
  <div id="side">
    <div class="slogo">
      <div class="slogo-icon">&#x26BD;</div>
      <div><div style="font-weight:700;font-size:13px" id="sn">Akademi</div><div style="font-size:11px;color:var(--text3)">Yonetim</div></div>
    </div>
    <nav class="snav">
      <div class="nsec">Ana Menu</div>
      <button class="ni on" id="ni-dashboard" onclick="go('dashboard')"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>Gosterge</button>
      <button class="ni" id="ni-athletes" onclick="go('athletes')"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0z"/></svg>Sporcular</button>
      <button class="ni" id="ni-payments" onclick="go('payments')"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>Odemeler<span class="badge dn" id="badge-pay">0</span></button>
      <button class="ni" id="ni-accounting" onclick="go('accounting')"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/></svg>Muhasebe</button>
      <button class="ni" id="ni-attendance" onclick="go('attendance')"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4"/></svg>Devam</button>
      <button class="ni" id="ni-coaches" onclick="go('coaches')"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>Antrenorler</button>
      <button class="ni" id="ni-messages" onclick="go('messages')"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z"/></svg>Mesajlar<span class="badge dn" id="badge-msg">0</span></button>
      <div class="nsec">Sistem</div>
      <button class="ni" id="ni-settings" onclick="go('settings')"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/><circle cx="12" cy="12" r="3"/></svg>Ayarlar</button>
      <div style="padding:16px 8px;margin-top:auto">
        <div class="flex fca gap2 mb3">
          <div class="ava" style="width:30px;height:30px;font-size:11px" id="sava">A</div>
          <div style="flex:1;min-width:0"><div class="tw6 tsm trunc" id="suname">Admin</div><div class="ts tm">Yonetici</div></div>
        </div>
        <button class="btn bs btn-sm w100" onclick="doLogout()">Cikis Yap</button>
      </div>
    </nav>
  </div>
  <div style="display:flex;flex-direction:column;flex:1;overflow:hidden;margin-left:0">
    <div id="bar">
      <button class="hbg" onclick="openSide()"><svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/></svg></button>
      <div style="flex:1;font-weight:700;font-size:15px" id="bar-title">Gosterge</div>
      <div class="ava" style="width:28px;height:28px;font-size:10px" id="bar-ava">A</div>
    </div>
    <div id="main" style="flex:1;overflow-y:auto;padding:16px;-webkit-overflow-scrolling:touch"></div>

// ── Supabase helpers ──────────────────────────────────────
async function supaFetch(table, method, data, filters) {
  var url = SUPA_URL + '/rest/v1/' + table;
  var params = [];
  if (filters) Object.keys(filters).forEach(function(k){ params.push(k+'=eq.'+encodeURIComponent(filters[k])); });
  if (method==='GET' && params.length) url += '?' + params.join('&');
  if (method==='GET') url += (url.indexOf('?')>=0?'&':'?') + 'order=created_at.desc&limit=1000';
  var realMethod = method==='UPSERT' ? 'POST' : method;
  var headers = {'apikey':SUPA_KEY,'Authorization':'Bearer '+SUPA_KEY,'Content-Type':'application/json','Accept':'application/json'};
  if (method==='UPSERT') headers['Prefer']='resolution=merge-duplicates,return=representation';
  else if (method==='POST'||method==='PATCH') headers['Prefer']='return=representation';
  var opts = {method:realMethod, headers:headers, mode:'cors'};
  if (data && method!=='GET') opts.body = JSON.stringify(data);
  try {
    var res = await fetch(url, opts);
    if (!res.ok) { console.error('Supa '+res.status, await res.text()); return null; }
    var txt = await res.text();
    return txt ? JSON.parse(txt) : [];
  } catch(e) { console.error('Supa fetch error:', e.message||e); return null; }
}
async function supaGet(t,f){ return await supaFetch(t,'GET',null,f); }
async function supaPost(t,d){ return await supaFetch(t,'POST',d); }
async function supaUpsert(t,d){ return await supaFetch(t,'UPSERT',Array.isArray(d)?d:[d]); }
async function supaDelete(t,f){
  var url=SUPA_URL+'/rest/v1/'+t+'?'+Object.keys(f).map(function(k){return k+'=eq.'+encodeURIComponent(f[k]);}).join('&');
  var res=await fetch(url,{method:'DELETE',headers:{'apikey':SUPA_KEY,'Authorization':'Bearer '+SUPA_KEY,'Prefer':'return=representation'},mode:'cors'});
  return res.ok;
}
async function supaPatch(t,d,f){
  var url=SUPA_URL+'/rest/v1/'+t+'?'+Object.keys(f).map(function(k){return k+'=eq.'+encodeURIComponent(f[k]);}).join('&');
  var res=await fetch(url,{method:'PATCH',headers:{'apikey':SUPA_KEY,'Authorization':'Bearer '+SUPA_KEY,'Content-Type':'application/json','Prefer':'return=representation'},body:JSON.stringify(d),mode:'cors'});
  return res.ok ? await res.json() : null;
}

async function fpSendCode(){
  var val=gv('fp-id');
  var errEl=document.getElementById('fp-err');
  if(!val){errEl.textContent='Alan bos!';errEl.classList.remove('dn');return;}
  showLoading();
  var found=null,type=null;
  if(val.length===11&&/^\d+$/.test(val)){
    var res=await supaGet('athletes',{tc:val});
    if(res&&res.length>0){found=dbToAth(res[0]);type='sporcu';}
  }
  if(!found){
    var res2=await supaGet('users',{email:val});
    if(res2&&res2.length>0){found={id:res2[0].id,email:res2[0].email,phone:res2[0].phone,name:res2[0].name};type='admin';}
  }
  hideLoading();
  if(!found){errEl.textContent='Kayit bulunamadi!';errEl.classList.remove('dn');return;}
  var code=Math.floor(100000+Math.random()*900000).toString();
  var expiry=Date.now()+5*60*1000;
  _forgotCtx={code:code,expiry:expiry,target:found,type:type};
  document.getElementById('fp-step1').classList.add('dn');
  document.getElementById('fp-step2').classList.remove('dn');
  document.getElementById('fp-code-display').innerHTML='<b>Demo Mod:</b> Dogrulama kodunuz: <b style="font-size:18px;letter-spacing:3px">'+code+'</b><br><small>Gercek sistemde SMS ile gonderilecek</small>';
}
function fpVerifyCode(){
  var code=gv('fp-code');
  var errEl=document.getElementById('fp-err2');
  if(!_forgotCtx){location.reload();return;}
  if(Date.now()>_forgotCtx.expiry){errEl.textContent='Kod suresi doldu!';errEl.classList.remove('dn');return;}
  if(code!==_forgotCtx.code){errEl.textContent='Yanlis kod!';errEl.classList.remove('dn');return;}
  document.getElementById('fp-step2').classList.add('dn');
  document.getElementById('fp-step3').classList.remove('dn');
}
async function fpSetNewPassword(){
  var p1=gv('fp-np1'),p2=gv('fp-np2');
  var errEl=document.getElementById('fp-new-err');
  if(!p1){errEl.textContent='Sifre bos!';errEl.classList.remove('dn');return;}
  if(p1!==p2){errEl.textContent='Sifreler eslesmiyor!';errEl.classList.remove('dn');return;}
  if(p1.length<4){errEl.textContent='En az 4 karakter!';errEl.classList.remove('dn');return;}
  showLoading();
  if(_forgotCtx.type==='admin'){await supaPatch('users',{pass:p1},{id:_forgotCtx.target.id});}
  else{await supaPatch('athletes',{sp_pass:p1},{id:_forgotCtx.target.id});}
  hideLoading();_forgotCtx=null;
  document.getElementById('lbox-wrap').innerHTML='<div class="lbox" style="text-align:center"><div class="llogo-i" style="margin:0 auto 16px;width:64px;height:64px;background:linear-gradient(135deg,var(--green),var(--blue));border-radius:18px;display:flex;align-items:center;justify-content:center;font-size:30px">&#x2705;</div><div style="font-size:18px;font-weight:800;margin-bottom:8px">Sifre Guncellendi!</div><button class="btn bp w100 mt3" onclick="location.reload()">Giris Yap</button></div>';
}

function pgAccounting(){
  var months=['Ocak','Subat','Mart','Nisan','Mayis','Haziran','Temmuz','Agustos','Eylul','Ekim','Kasim','Aralik'];
  var now=new Date(),curY=now.getFullYear(),curM=now.getMonth();
  var income=0,expense=0,monthly={};
  for(var i=0;i<12;i++)monthly[i]={income:0,expense:0};
  payments.forEach(function(p){if(p.st!=='completed')return;var d=new Date(p.dt);if(d.getFullYear()===curY){var m=d.getMonth();if(p.ty==='income'){monthly[m].income+=Number(p.amt)||0;income+=Number(p.amt)||0;}else{monthly[m].expense+=Number(p.amt)||0;expense+=Number(p.amt)||0;}}});
  var h='<div class="ph"><div class="stit">Muhasebe</div></div>';
  h+='<div class="g3 mb3">'+sc('g','&#x1F4C8;',fmtN(income)+' TL','Gelir','')+sc('r','&#x1F4C9;',fmtN(expense)+' TL','Gider','')+sc('b','&#x1F4B0;',fmtN(income-expense)+' TL','Net','')+'</div>';
  h+='<div class="card"><div class="tw6 mb3">'+curY+' Aylik Ozet</div><div class="tw"><table><thead><tr><th>Ay</th><th>Gelir</th><th>Gider</th><th>Net</th></tr></thead><tbody>';
  for(var i=11;i>=0;i--){var net=monthly[i].income-monthly[i].expense;h+='<tr'+(i===curM?' style="background:rgba(88,166,255,.05)"':'')+'>< td class="tsm tw6">'+months[i]+'</td><td class="tg tsm">'+fmtN(monthly[i].income)+' TL</td><td class="tr2 tsm">'+fmtN(monthly[i].expense)+' TL</td><td class="tsm tw6 '+(net>=0?'tg':'tr2')+'">'+fmtN(net)+' TL</td></tr>';}
  h+='</tbody></table></div></div>';return h;
}

  var orig=null;for(var i=0;i<messages.length;i++){if(messages[i].id===id){orig=messages[i];break;}}if(!orig)return;
  var h='<div class="fgr full"><label>Yanit *</label><textarea id="mf-body" style="min-height:110px"></textarea></div>';
  modal('RE: '+orig.sub,h,[{lbl:'Iptal',cls:'bs',fn:function(){closeModal();}},{lbl:'Gonder',cls:'bp',fn:function(){sendReply(id);}}]);
}
async function sendMsg(){var sub=gv('mf-sub'),body=gv('mf-body');if(!sub||!body){toast('Konu ve mesaj zorunlu!','e');return;}var m={id:uid(),fr:currentUser?currentUser.name:'Admin',role:'Yonetici',sub:sub,body:body,dt:tod(),rd:true};messages.unshift(m);showLoading();await dbSaveMsg(m);hideLoading();closeModal();go('messages');toast('Mesaj gonderildi');}
async function sendReply(id){var orig=null;for(var i=0;i<messages.length;i++){if(messages[i].id===id){orig=messages[i];break;}}if(!orig)return;var body=gv('mf-body');if(!body){toast('Mesaj bos!','e');return;}var m={id:uid(),fr:currentUser?currentUser.name:'Admin',role:'Yonetici',sub:'RE: '+orig.sub,body:body,dt:tod(),rd:true};messages.unshift(m);showLoading();await dbSaveMsg(m);hideLoading();closeModal();go('messages');toast('Yanit gonderildi');}
async function delMsg(id){messages=messages.filter(function(m){return m.id!==id;});await dbDelMsg(id);go('messages');toast('Mesaj silindi');}

// ── SETTINGS ──────────────────────────────────────────────
function pgSettings(){
  var activeN=0;athletes.forEach(function(a){if(a.st==='active')activeN++;});
  var orgUsers=_usersCache.filter(function(u){return u.orgId===currentOrgId;});
  var h='<div class="ph"><div class="stit">Ayarlar</div></div><div class="g2">';
  h+='<div class="card"><div class="tw6 mb3">Kurum Bilgileri</div>'+
    '<div class="fgr mb2"><label>Kurum Adi</label><input id="s-name" type="text" value="'+esc(settings.schoolName||'')+'"/></div>'+
    '<div class="dv" style="margin:10px 0"></div>'+
    '<div class="tw6 tsm mb2" style="color:var(--yellow)">Havale / EFT Bilgileri</div>'+
    '<div class="fgr mb2"><label>Banka</label><input id="s-bank" type="text" value="'+esc(settings.bankName||'')+'" placeholder="Ziraat Bankasi"/></div>'+
    '<div class="fgr mb2"><label>Hesap Sahibi</label><input id="s-accname" type="text" value="'+esc(settings.accountName||'')+'"/></div>'+
    '<div class="fgr mb3"><label>IBAN</label><input id="s-iban" type="text" value="'+esc(settings.iban||'')+'" placeholder="TR00..."/></div>'+
    '<button class="btn bp" onclick="saveSettings2()">Kaydet</button></div>';
  h+='<div class="card"><div class="tw6 mb3">Istatistikler</div>'+row('Toplam Sporcu',athletes.length)+row('Aktif',activeN)+row('Odeme',payments.length)+row('Antrenor',coaches.length)+row('Mesaj',messages.length)+'</div>';
  h+='<div class="card" style="grid-column:1/-1"><div class="flex fca fjb mb3"><div class="tw6">Kullanicilar</div><button class="btn bp btn-sm" onclick="showAddUserForm()">+ Ekle</button></div>'+
    '<div class="tw"><table><thead><tr><th>Ad</th><th>E-posta</th><th>Rol</th><th></th></tr></thead><tbody>';
  orgUsers.forEach(function(u){h+='<tr><td class="tw6 tsm">'+esc(u.name||'-')+'</td><td class="tsm">'+esc(u.email)+'</td><td><span class="bg bg-b">'+esc(u.role)+'</span></td><td>'+(u.id!==currentUser.id?'<button class="btn bd btn-xs" onclick="delUser(\''+u.id+'\')">Sil</button>':'<span class="ts tm">Aktif</span>')+'</td></tr>';});
  h+='</tbody></table></div></div>';
  h+='<div class="card"><div class="tw6 mb3">Hesabim</div>'+
    '<div class="fgr mb2"><label>E-posta</label><input id="s-email" type="email" value="'+esc(acct.email||'')+'"/></div>'+
    '<div class="fgr mb2"><label>Yeni Sifre</label><input id="s-pass1" type="password" placeholder="Bos biraksan degismez"/></div>'+
    '<div class="fgr mb3"><label>Tekrar</label><input id="s-pass2" type="password"/></div>'+
    '<div class="flex gap2"><button class="btn bp" onclick="saveAcct()">Kaydet</button><button class="btn bd btn-sm" onclick="doLogout()">Cikis</button></div></div></div>';
  return h;
}
async function saveSettings2(){
  settings.schoolName=gv('s-name')||settings.schoolName;
  var b=gv('s-bank');if(b)settings.bankName=b;
  var an=gv('s-accname');if(an)settings.accountName=an;
  var ib=gv('s-iban');if(ib)settings.iban=ib;
  showLoading();await saveS();hideLoading();
  var sn=document.getElementById('sn');if(sn)sn.textContent=(settings.schoolName||'').split(' ').slice(0,2).join(' ');
  toast('Ayarlar kaydedildi');
}
async function saveAcct(){
  var em=gv('s-email'),p1=gv('s-pass1'),p2=gv('s-pass2');
  if(!em){toast('E-posta bos olamaz!','e');return;}
  if(p1&&p1!==p2){toast('Sifreler eslesmiyor!','e');return;}
  if(p1&&p1.length<4){toast('En az 4 karakter!','e');return;}
  var upd={email:em};if(p1)upd.pass=p1;
  showLoading();await supaPatch('users',upd,{id:currentUser.id});currentUser.email=em;if(p1)currentUser.pass=p1;acct.email=em;if(p1)acct.pass=p1;
  hideLoading();toast('Hesap guncellendi');
}
function showAddUserForm(){
  var h='<div class="fg">'+
    '<div class="fgr"><label>Ad Soyad *</label><input id="au-name" type="text"/></div>'+
    '<div class="fgr"><label>Telefon</label><input id="au-phone" type="tel"/></div>'+
    '<div class="fgr"><label>E-posta *</label><input id="au-em" type="email"/></div>'+
    '<div class="fgr"><label>Rol</label><select id="au-role"><option value="admin">Admin</option><option value="staff">Personel</option></select></div>'+
    '<div class="fgr"><label>Sifre *</label><input id="au-p1" type="password"/></div>'+
    '<div class="fgr"><label>Tekrar *</label><input id="au-p2" type="password"/></div></div>';
  modal('Yeni Kullanici',h,[{lbl:'Iptal',cls:'bs',fn:function(){closeModal();}},{lbl:'Ekle',cls:'bp',fn:function(){saveNewUser();}}]);
}
async function saveNewUser(){
  var name=gv('au-name'),em=gv('au-em'),p1=gv('au-p1'),p2=gv('au-p2'),role=gv('au-role'),phone=gv('au-phone');
  if(!name||!em||!p1){toast('Zorunlu alanlar eksik!','e');return;}
  if(p1!==p2){toast('Sifreler eslesmiyor!','e');return;}
  if(p1.length<4){toast('En az 4 karakter!','e');return;}
  showLoading();
  var existing=await supaGet('users',{email:em});
  if(existing&&existing.length>0){hideLoading();toast('Bu e-posta kayitli!','e');return;}
  var nu={id:'u-'+Date.now().toString(36),org_id:currentOrgId,email:em,pass:p1,role:role,name:name,phone:phone};
  await supaPost('users',nu);
  _usersCache.push({id:nu.id,orgId:currentOrgId,email:em,pass:p1,role:role,name:name,phone:phone});
  hideLoading();closeModal();go('settings');toast('Kullanici eklendi');
}
function delUser(uid2){confirm2('Kullanici silinsin mi?','Bu islem geri alinamaz.',async function(){await supaDelete('users',{id:uid2});_usersCache=_usersCache.filter(function(u){return u.id!==uid2;});go('settings');toast('Kullanici silindi');});}
