name: Setup VAPID Secrets for Push Notifications

on:
  workflow_dispatch:

jobs:
  set-secrets:
    name: Set VAPID Secrets in Supabase
    runs-on: ubuntu-latest

    steps:
      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Set VAPID secrets
        run: |
          supabase secrets set \
            VAPID_PUBLIC_KEY="BKMs9WEFjU_ZGG8_2A1bmX_yh75oTl8zo1yOmjGeKpgGyRxctvZB2DeRnKSlC_PrcGPZ8LRPVWJxNErI9mMwEG8" \
            VAPID_PRIVATE_KEY="${{ secrets.VAPID_PRIVATE_KEY }}" \
            VAPID_EMAIL="mailto:admin@dragosfutbolakademisi.com" \
            --project-ref ${{ secrets.SUPABASE_PROJECT_REF }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Verify secrets set
        run: |
          supabase secrets list --project-ref ${{ secrets.SUPABASE_PROJECT_REF }} | grep VAPID
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
