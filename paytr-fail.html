<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Ödeme Başarısız</title>
  <style>body{margin:0;padding:20px;font-family:sans-serif;text-align:center;color:#333}</style>
</head>
<body>
  <p>Ödeme işlemi tamamlanamadı, lütfen bekleyiniz...</p>
  <script>
  (function() {
    var p = new URLSearchParams(window.location.search);
    var oid = p.get('oid') || p.get('merchant_oid') || '';
    // PayTR 3D Secure bazen üst pencereyi (top window) bu sayfaya yönlendirebilir.
    // Bu durumda ana uygulamaya geri dönmemiz gerekir.
    if (window.self === window.top) {
      var url = window.location.origin + '/?paytr=fail' + (oid ? '&oid=' + encodeURIComponent(oid) : '');
      window.location.replace(url);
      return;
    }
    try {
      window.parent.postMessage({ source: 'paytr_cb', status: 'fail', oid: oid }, window.location.origin);
    } catch(e) {
      var url = window.location.origin + '/?paytr=fail' + (oid ? '&oid=' + encodeURIComponent(oid) : '');
      try { window.top.location.href = url; } catch(e2) { window.location.href = url; }
    }
  })();
  </script>
</body>
</html>
