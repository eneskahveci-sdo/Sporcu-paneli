<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dragos Futbol Akademisi | Yönetim Paneli</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg: #080c14; --bg2: #0f1623; --bg3: #151e2d; --bg4: #1a2540;
            --border: #1e3352; --text: #e2e8f0; --text2: #94a3b8; --text3: #475569;
            --blue: #3b82f6; --blue2: #60a5fa; --green: #22c55e; --red: #ef4444; --yellow: #eab308;
            --grad: linear-gradient(135deg, var(--blue), var(--blue2));
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', -apple-system, sans-serif; }
        body { background: var(--bg); color: var(--text); overflow-x: hidden; transition: 0.3s; }
        .dn { display: none !important; }
        .flex { display: flex; } .fca { align-items: center; } .fjb { justify-content: space-between; } .fjc { justify-content: center; }
        .gap2 { gap: 8px; } .gap3 { gap: 12px; } .gap4 { gap: 16px; } .mb3 { margin-bottom: 16px; } .mt3 { margin-top: 16px; }
        
        #wrap { display: flex; height: 100vh; width: 100vw; }
        #side { width: 260px; background: var(--bg2); border-right: 1px solid var(--border); display: flex; flex-direction: column; z-index: 1000; transition: 0.3s; }
        .slogo { padding: 25px 20px; display: flex; align-items: center; gap: 12px; border-bottom: 1px solid var(--border); }
        .slogo-icon { width: 40px; height: 40px; background: var(--grad); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 20px; color: #fff; box-shadow: 0 4px 15px rgba(59, 130, 246, 0.3); }
        
        .snav { padding: 15px 10px; flex: 1; overflow-y: auto; }
        .nsec { font-size: 11px; font-weight: 700; color: var(--text3); text-transform: uppercase; margin: 20px 10px 10px; letter-spacing: 1px; }
        .ni { display: flex; align-items: center; gap: 12px; padding: 12px; border-radius: 10px; color: var(--text2); font-weight: 500; margin-bottom: 4px; width: 100%; cursor: pointer; border: none; background: none; text-align: left; transition: 0.2s; }
        .ni:hover { background: var(--bg3); color: var(--text); }
        .ni.on { background: var(--grad); color: #fff; box-shadow: 0 4px 12px rgba(59, 130, 246, 0.2); }
        
        #main-wrap { flex: 1; display: flex; flex-direction: column; min-width: 0; background: var(--bg); }
        #head { height: 65px; background: var(--bg2); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 25px; }
        #main { flex: 1; overflow-y: auto; padding: 30px; }

        .card { background: var(--bg2); border: 1px solid var(--border); border-radius: 18px; padding: 25px; margin-bottom: 25px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .stat-card { text-align: center; border-bottom: 4px solid var(--blue); transition: 0.3s; }
        .stat-card:hover { transform: translateY(-5px); }
        .stat-card h2 { font-size: 34px; font-weight: 800; margin-bottom: 5px; }
        
        .btn { padding: 12px 20px; border-radius: 10px; font-weight: 700; font-size: 14px; cursor: pointer; display: inline-flex; align-items: center; gap: 10px; border: none; transition: 0.2s; }
        .bp { background: var(--grad); color: #fff; }
        .bs { background: var(--bg3); color: var(--text); border: 1px solid var(--border); }
        .bd { background: rgba(239, 68, 68, 0.1); color: var(--red); border: 1px solid var(--red); }
        
        .tw { overflow-x: auto; width: 100%; }
        .tw table { width: 100%; border-collapse: collapse; min-width: 700px; }
        .tw th { padding: 15px; font-size: 12px; color: var(--text2); border-bottom: 1px solid var(--border); text-align: left; text-transform: uppercase; letter-spacing: 0.5px; }
        .tw td { padding: 18px; border-bottom: 1px solid var(--border); font-size: 14px; }
        
        #lbox-wrap { position: fixed; inset: 0; background: var(--bg); display: flex; align-items: center; justify-content: center; z-index: 10000; }
        .lbox { background: var(--bg2); border: 1px solid var(--border); border-radius: 30px; padding: 45px; width: 100%; max-width: 440px; text-align: center; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); }
        .ltabs { display: flex; background: var(--bg); padding: 5px; border-radius: 15px; margin-bottom: 30px; }
        .ltab { flex: 1; padding: 12px; font-size: 14px; font-weight: 600; color: var(--text2); border-radius: 10px; cursor: pointer; }
        .ltab.on { background: var(--bg2); color: var(--text); box-shadow: 0 2px 8px rgba(0,0,0,0.2); }
        input, select, textarea { padding: 14px; border-radius: 12px; background: var(--bg3); border: 1px solid var(--border); color: #fff; width: 100%; outline: none; margin-bottom: 18px; transition: 0.2s; }
        input:focus { border-color: var(--blue); box-shadow: 0 0 0 3px rgba(59,130,246,0.1); }
        
        #modal { position: fixed; inset: 0; background: rgba(0,0,0,0.85); display: none; align-items: center; justify-content: center; z-index: 20000; backdrop-filter: blur(8px); }
        #modal.show { display: flex; }
        .m-box { background: var(--bg2); border: 1px solid var(--border); border-radius: 24px; width: 90%; max-width: 600px; padding: 35px; }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<div id="lbox-wrap">
    <div class="lbox">
        <div class="slogo-icon" style="margin: 0 auto 25px; width: 65px; height: 65px; font-size: 32px;">⚽</div>
        <h2 class="mb3">Dragos Futbol Akademisi</h2>
        <div class="ltabs" id="login-tabs">
            <div class="ltab on" onclick="switchLoginTab('sporcu')">Sporcu/Veli</div>
            <div class="ltab" onclick="switchLoginTab('coach')">Antrenör</div>
        </div>
        <div id="login-admin" class="dn">
            <input id="le" type="email" placeholder="Yönetici E-posta">
            <input id="lp" type="password" placeholder="Yönetici Şifresi">
            <button class="btn bp w100" onclick="doLogin()" style="width: 100%; padding: 15px;">Sisteme Giriş Yap</button>
        </div>
        <div id="login-sporcu">
            <input id="ls-tc" type="tel" maxlength="11" placeholder="Sporcu TC Kimlik No">
            <input id="ls-pass" type="password" placeholder="Şifre (TC Son 4 Hane)">
            <button class="btn bp w100" onclick="doNormalLogin('sporcu')" style="width: 100%; padding: 15px;">Veli Portalı Girişi</button>
        </div>
        <div id="login-coach" class="dn">
            <input id="lc-tc" type="tel" maxlength="11" placeholder="Antrenör TC Kimlik No">
            <input id="lc-pass" type="password" placeholder="Antrenör Şifresi">
            <button class="btn bp w100" onclick="doNormalLogin('coach')" style="width: 100%; padding: 15px;">Eğitmen Girişi</button>
        </div>
        <div class="flex fjc gap4 mt3 ts tm" style="border-top: 1px solid var(--border); padding-top: 25px;">
            <a href="javascript:void(0)" onclick="showLegal('kvkk')" style="text-decoration:none">KVKK Aydınlatma</a>
            <a href="javascript:void(0)" onclick="showLegal('kullanim')" style="text-decoration:none">Üyelik Sözleşmesi</a>
        </div>
    </div>
</div>

<div id="wrap" class="dn">
    <div id="side">
        <div class="slogo">
            <div class="slogo-icon">⚽</div>
            <div>
                <div style="font-weight: 800; font-size: 20px; letter-spacing: -0.5px; color:#fff">DRAGOS</div>
                <div style="font-size: 11px; color: var(--text2); font-weight: 700;">FOOTBALL PRO</div>
            </div>
        </div>
        <nav class="snav">
            <div class="nsec">Ana Menü</div>
            <button class="ni on" id="ni-dashboard" onclick="go('dashboard')"><i class="fa-solid fa-house-chimney"></i><span>Gösterge Paneli</span></button>
            <button class="ni" id="ni-athletes" onclick="go('athletes')"><i class="fa-solid fa-users"></i><span>Sporcu Listesi</span></button>
            <button class="ni" id="ni-attendance" onclick="go('attendance')"><i class="fa-solid fa-calendar-check"></i><span>Yoklama Takibi</span></button>
            <button class="ni" id="ni-coaches" onclick="go('coaches')"><i class="fa-solid fa-user-tie"></i><span>Antrenörler</span></button>
            
            <div class="nsec" id="sec-finance">Yönetim & Muhasebe</div>
            <button class="ni" id="ni-payments" onclick="go('payments')"><i class="fa-solid fa-credit-card"></i><span>Aidat / Ödemeler</span></button>
            <button class="ni" id="ni-accounting" onclick="go('accounting')"><i class="fa-solid fa-chart-line"></i><span>Finansal Raporlar</span></button>
            <button class="ni" id="ni-branches" onclick="go('branches')"><i class="fa-solid fa-building-user"></i><span>Şube Yönetimi</span></button>
            <button class="ni" id="ni-announcements" onclick="go('announcements')"><i class="fa-solid fa-bullhorn"></i><span>Duyuru Yayınla</span></button>
            
            <div class="nsec" id="sec-platform">Platform Güvenliği</div>
            <button class="ni" id="ni-org-manage" onclick="go('org-manage')"><i class="fa-solid fa-shield-halved"></i><span>Kurum Yönetimi</span></button>
            <button class="ni" id="ni-settings" onclick="go('settings')"><i class="fa-solid fa-gears"></i><span>Sistem Ayarları</span></button>
            
            <div style="margin-top: auto; padding: 25px; border-top: 1px solid var(--border); background:rgba(0,0,0,0.2)">
                <div class="flex fca gap3 mb3">
                    <div style="width: 36px; height: 36px; border-radius: 50%; background: var(--grad); display: flex; align-items: center; justify-content: center; font-weight: 800; color:#fff;" id="user-init">A</div>
                    <div id="suname" style="font-weight: 700; font-size: 14px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">Yönetici</div>
                </div>
                <button onclick="doLogout()" class="ni" style="color: var(--red); margin:0; padding:10px;"><i class="fa-solid fa-right-from-bracket"></i><span>Güvenli Çıkış</span></button>
            </div>
        </nav>
    </div>

    <div id="main-wrap">
        <header id="head">
            <div class="flex fca gap3">
                <button class="btn bs" id="side-toggle" style="padding: 10px; background:var(--bg3)"><i class="fa-solid fa-bars"></i></button>
                <div class="tw6" id="bar-title" style="font-size: 20px;">Dashboard</div>
            </div>
            <div class="flex fca gap4">
                <div id="live-clock" class="ts tm" style="font-weight:700; background:var(--bg3); padding:8px 12px; border-radius:8px">00:00:00</div>
                <button class="btn bs" onclick="toggleTheme()" style="padding: 10px;"><i class="fa-solid fa-sun"></i></button>
            </div>
        </header>
        <main id="main"></main>
    </div>
</div>

<div id="modal">
    <div class="m-box">
        <div class="fjb flex mb3" style="border-bottom: 1px solid var(--border); padding-bottom:15px">
            <h3 id="modal-title">Bildirim</h3>
            <button onclick="closeModal()" style="background:none; border:none; color:var(--text2); font-size:28px; cursor:pointer;">&times;</button>
        </div>
        <div id="modal-body" class="mb3 ts tm" style="line-height: 1.7; font-size:15px"></div>
        <div id="modal-footer" class="flex fjb gap3"></div>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
