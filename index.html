<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<meta name="theme-color" content="#080c14"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<title>Sporcu Paneli</title>
<link rel="manifest" href='data:application/json,{"name":"Sporcu Paneli","short_name":"Sporcu","display":"standalone","background_color":"#080c14","theme_color":"#3b82f6"}'/>
<style>
:root{--bg:#080c14;--bg2:#0f1623;--bg3:#151e2d;--bg4:#1a2540;--border:#1e3352;--border2:#2a4a7f;--text:#e2e8f0;--text2:#94a3b8;--text3:#475569;--blue:#3b82f6;--blue2:#60a5fa;--green:#22c55e;--red:#ef4444;--yellow:#eab308;--grad:linear-gradient(135deg,var(--blue),var(--blue2));--grad-hover:linear-gradient(135deg,var(--blue2),#93c5fd);--purple:#a855f7}
*{box-sizing:border-box;margin:0;padding:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;user-select:none;-webkit-tap-highlight-color:transparent}
body{background:var(--bg);color:var(--text);font-size:15px;line-height:1.5;overflow:hidden}
a{color:inherit;text-decoration:none}
button{background:none;border:none;color:inherit;cursor:pointer;font:inherit;outline:none}
input,select,textarea{font:inherit;color:inherit;background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:12px;width:100%;outline:none;transition:border-color .2s;accent-color:var(--blue)}
input:focus,select:focus,textarea:focus{border-color:var(--blue)}
.dn{display:none!important}
.flex{display:flex}
.fca{align-items:center}
.fjb{justify-content:space-between}
.fjc{justify-content:center}
.gap2{gap:8px}
.gap3{gap:12px}
.gap4{gap:16px}
.fwrap{flex-wrap:wrap}
.tw6{font-weight:600}
.tw8{font-weight:800}
.tsm{font-size:14px}
.ts{font-size:13px}
.tm{color:var(--text2)}
.tc{text-align:center}
.trunc{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.w100{width:100%}
.h100{height:100%}
.pr{position:relative}
.mb2{margin-bottom:8px}
.mb3{margin-bottom:16px}
.mt2{margin-top:8px}
.mt3{margin-top:16px}
.pt2{padding-top:8px}

/* YAPI */
#wrap{display:flex;height:100vh;width:100vw}
#side{width:260px;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;transition:transform .3s;z-index:100}
.slogo{padding:20px;display:flex;align-items:center;gap:12px;border-bottom:1px solid var(--border)}
.slogo-icon{width:34px;height:34px;background:var(--grad);border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:18px;color:#fff;font-weight:800}
.snav{padding:16px 8px;flex:1;overflow-y:auto}
.nsec{font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin:16px 8px 8px}
.ni{display:flex;align-items:center;gap:12px;padding:10px 12px;border-radius:8px;color:var(--text2);font-weight:500;margin-bottom:2px;transition:all .2s;position:relative}
.ni svg{width:20px;height:20px;opacity:.7}
.ni:hover{background:var(--bg3);color:var(--text)}
.ni.on{background:var(--grad);color:#fff}
.ni.on svg{opacity:1}
.badge{background:var(--red);color:#fff;font-size:11px;font-weight:800;padding:2px 6px;border-radius:20px;min-width:20px;text-align:center;position:absolute;right:12px}

#main-wrap{flex:1;display:flex;flex-direction:column;min-width:0;background:var(--bg)}
#head{height:60px;background:var(--bg)/80;backdrop-filter:blur(10px);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 20px;z-index:50}
.menu-btn{display:none;padding:8px;background:var(--bg3);border-radius:8px;border:1px solid var(--border);color:var(--text)}
.menu-btn svg{width:20px;height:20px}
#main{flex:1;overflow-y:auto;padding:24px;position:relative}

.bnav{display:none;height:65px;background:var(--bg2);border-top:1px solid var(--border);padding-bottom:env(safe-area-inset-bottom);z-index:100}
.bni-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;color:var(--text2);padding:8px 0}
.bni-btn svg{width:24px;height:24px;opacity:.7;transition:all .2s}
.bni-btn span{font-size:10px;font-weight:600}
.bni-btn.on{color:var(--blue2)}
.bni-btn.on svg{opacity:1;transform:translateY(-2px)}

/* KARTLAR & MODÜLLER */
.ph{margin-bottom:24px}
.stit{font-size:24px;font-weight:800;letter-spacing:-.5px}
.ssub{color:var(--text2);font-size:14px;margin-top:4px}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:20px;margin-bottom:16px;box-shadow:0 4px 6px -1px rgba(0,0,0,.1),0 2px 4px -1px rgba(0,0,0,.06)}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.g21{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:16px}

.stat-card{padding:20px;position:relative;overflow:hidden;transition:transform .2s;cursor:pointer}
.stat-card:hover{transform:translateY(-2px)}
.stat-icon{width:40px;height:40px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px;margin-bottom:12px}
.stat-b .stat-icon{background:var(--blue)/20;color:var(--blue2)}
.stat-g .stat-icon{background:var(--green)/20;color:var(--green)}
.stat-r .stat-icon{background:var(--red)/20;color:var(--red)}
.stat-y .stat-icon{background:var(--yellow)/20;color:var(--yellow)}
.stat-val{font-size:24px;font-weight:800;letter-spacing:-.5px;margin-bottom:4px}
.stat-lbl{color:var(--text2);font-size:13px;font-weight:500}

.btn{padding:10px 16px;border-radius:8px;font-weight:600;font-size:14px;transition:all .2s;display:inline-flex;align-items:center;justify-content:center;gap:8px}
.btn-sm{padding:6px 12px;font-size:13px}
.btn-xs{padding:4px 8px;font-size:12px;border-radius:6px}
.bp{background:var(--grad);color:#fff;box-shadow:0 2px 10px rgba(59,130,246,.3)}
.bp:hover{background:var(--grad-hover);transform:translateY(-1px);box-shadow:0 4px 12px rgba(59,130,246,.4)}
.bs{background:var(--bg3);color:var(--text);border:1px solid var(--border)}
.bs:hover{background:var(--border);color:#fff}
.bd{background:rgba(239,68,68,.1);color:var(--red);border:1px solid rgba(239,68,68,.2)}
.bd:hover{background:var(--red);color:#fff}
.bsu{background:rgba(34,197,94,.1);color:var(--green);border:1px solid rgba(34,197,94,.2)}
.bsu:hover{background:var(--green);color:#fff}

.tw table{width:100%;border-collapse:collapse;text-align:left}
.tw th{padding:12px 16px;font-size:12px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid var(--border)}
.tw td{padding:16px;border-bottom:1px solid var(--border)/50;font-size:14px}
.tw tr:last-child td{border-bottom:none}
.tw tr:hover td{background:var(--bg)/50}

.bg{padding:4px 8px;border-radius:6px;font-size:12px;font-weight:700}
.bg-g{background:rgba(34,197,94,.15);color:#4ade80}
.bg-r{background:rgba(239,68,68,.15);color:#f87171}
.bg-y{background:rgba(234,179,8,.15);color:#facc15}
.bg-b{background:rgba(59,130,246,.15);color:#60a5fa}

.tg{color:#4ade80}
.tr2{color:#f87171}
.tb{color:#60a5fa}

.ava{display:flex;align-items:center;justify-content:center;border-radius:50%;background:var(--grad);color:#fff;font-weight:700}
.al{padding:12px 16px;border-radius:8px;font-size:14px;display:flex;align-items:flex-start;gap:12px}
.al-y{background:rgba(234,179,8,.1);color:#facc15;border:1px solid rgba(234,179,8,.2)}
.al-r{background:rgba(239,68,68,.1);color:#f87171;border:1px solid rgba(239,68,68,.2)}
.al-g{background:rgba(34,197,94,.1);color:#4ade80;border:1px solid rgba(34,197,94,.2)}
.al-b{background:rgba(59,130,246,.1);color:#60a5fa;border:1px solid rgba(59,130,246,.2)}

/* FORMLAR & MODAL */
.fgr{display:flex;flex-direction:column;gap:6px}
.fgr label{font-size:13px;font-weight:600;color:var(--text2)}
.fs{padding:8px 12px;font-size:14px}

#modal{position:fixed;inset:0;background:rgba(0,0,0,.6);backdrop-filter:blur(4px);display:none;align-items:center;justify-content:center;z-index:999;opacity:0;transition:opacity .2s}
#modal.show{display:flex;opacity:1}
.m-box{background:var(--bg);border:1px solid var(--border);border-radius:16px;width:100%;max-width:500px;max-height:90vh;display:flex;flex-direction:column;box-shadow:0 20px 25px -5px rgba(0,0,0,.2)}
.m-head{padding:20px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.m-tit{font-size:18px;font-weight:800}
.m-body{padding:20px;overflow-y:auto;flex:1}
.m-foot{padding:20px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:12px;background:var(--bg2);border-radius:0 0 16px 16px}

/* GİRİŞ EKRANI */
#lbox-wrap{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;padding:20px;z-index:1000}
.lbox{background:var(--bg2);border:1px solid var(--border);border-radius:24px;padding:32px;width:100%;max-width:400px;box-shadow:0 20px 25px -5px rgba(0,0,0,.2)}
.llogo{display:flex;flex-direction:column;align-items:center;margin-bottom:32px}
.llogo-i{width:64px;height:64px;background:var(--grad);border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:32px;color:#fff;margin-bottom:16px}
.lerr{background:rgba(239,68,68,.1);color:#f87171;padding:12px;border-radius:8px;font-size:13px;margin-bottom:16px;text-align:center;border:1px solid rgba(239,68,68,.2)}
.ltabs{display:flex;background:var(--bg);padding:4px;border-radius:12px;margin-bottom:24px;border:1px solid var(--border)}
.ltab{flex:1;padding:10px;text-align:center;font-size:13px;font-weight:600;color:var(--text2);border-radius:8px;cursor:pointer;transition:all .2s}
.ltab.on{background:var(--bg2);color:var(--text);box-shadow:0 1px 3px rgba(0,0,0,.1)}

/* OVERLAY & YUKLENIYOR */
#overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);backdrop-filter:blur(2px);z-index:90;display:none;opacity:0;transition:opacity .3s}
#overlay.show{display:block;opacity:1}
#loading-overlay{position:fixed;inset:0;background:var
