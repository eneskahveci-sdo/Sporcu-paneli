<!DOCTYPE html>

<html lang="tr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<title>Sporcu Paneli</title>
<style>
:root{--bg:#0d1117;--bg2:#161b22;--bg3:#21262d;--bg4:#2d333b;--border:#30363d;--border2:#444c56;--text:#e6edf3;--text2:#8b949e;--text3:#484f58;--blue:#58a6ff;--blue2:#1f6feb;--green:#3fb950;--red:#f85149;--yellow:#d29922;--purple:#a371f7;--r:10px;--r2:6px}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,Helvetica,sans-serif;font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased}
button{font-family:inherit;cursor:pointer}input,select,textarea{font-family:inherit}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}
#wrap{display:flex;height:100vh;overflow:hidden}
#side{width:220px;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;transition:transform .25s;z-index:200}
#main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
#bar{height:52px;background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 16px;gap:10px;flex-shrink:0}
#page{flex:1;overflow-y:auto;padding:20px;-webkit-overflow-scrolling:touch}
#bnav{display:none;background:var(--bg2);border-top:1px solid var(--border);flex-shrink:0}
#overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:150}
.slogo{padding:16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
.slogo-icon{width:34px;height:34px;background:linear-gradient(135deg,#58a6ff,#a371f7);border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0}
.snav{flex:1;padding:8px;overflow-y:auto}
.nsec{font-size:10px;font-weight:700;color:var(--text3);letter-spacing:.08em;text-transform:uppercase;padding:8px 8px 3px}
.ni{display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:var(--r2);color:var(--text2);font-size:13px;font-weight:500;border:none;background:none;width:100%;text-align:left;margin-bottom:1px;cursor:pointer}
.ni:hover{background:var(--bg3);color:var(--text)}
.ni.on{background:rgba(88,166,255,.12);color:var(--blue);border:1px solid rgba(88,166,255,.2)}
.ni svg{width:15px;height:15px;flex-shrink:0}
.nbadge{margin-left:auto;background:var(--red);color:#fff;font-size:10px;font-weight:700;padding:1px 5px;border-radius:10px;min-width:16px;text-align:center}
.sfoot{padding:8px;border-top:1px solid var(--border)}
.ava{border-radius:50%;background:linear-gradient(135deg,#58a6ff,#a371f7);display:flex;align-items:center;justify-content:center;font-weight:700;color:#fff;flex-shrink:0}
.hbg{display:none;background:none;border:none;color:var(--text2);padding:4px;cursor:pointer}
.btitle{font-weight:700;font-size:15px;flex:1}
.ibtn{background:var(--bg3);border:1px solid var(--border);border-radius:var(--r2);padding:6px;color:var(--text2);display:flex;align-items:center;justify-content:center;cursor:pointer;position:relative}
.ibtn:hover{background:var(--bg4);color:var(--text)}
.dot{position:absolute;top:4px;right:4px;width:7px;height:7px;background:var(--red);border-radius:50%;border:2px solid var(--bg2)}
.bni{display:flex;height:54px;align-items:stretch}
.bni-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;background:none;border:none;color:var(--text3);font-size:10px;font-weight:600;cursor:pointer}
.bni-btn svg{width:20px;height:20px}
.bni-btn.on{color:var(--blue)}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:18px}
.stat{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:18px}
.sico{width:38px;height:38px;border-radius:9px;display:flex;align-items:center;justify-content:center;margin-bottom:10px}
.sico.b{background:rgba(88,166,255,.15)}.sico.g{background:rgba(63,185,80,.15)}.sico.y{background:rgba(210,153,34,.15)}.sico.r{background:rgba(248,81,73,.15)}.sico.p{background:rgba(163,113,247,.15)}
.sval{font-size:22px;font-weight:800;color:var(--text);line-height:1}
.slbl{font-size:11px;color:var(--text3);margin-top:3px}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.g21{display:grid;grid-template-columns:2fr 1fr;gap:14px}
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 14px;border-radius:var(--r2);font-size:13px;font-weight:600;border:none;cursor:pointer;white-space:nowrap}
.btn:active{opacity:.75}
.bp{background:var(--blue2);color:#fff}.bs{background:var(--bg3);color:var(--text2);border:1px solid var(--border)}.bd{background:rgba(248,81,73,.15);color:var(--red);border:1px solid rgba(248,81,73,.25)}.bsu{background:rgba(63,185,80,.15);color:var(--green);border:1px solid rgba(63,185,80,.25)}
.btn-sm{padding:5px 10px;font-size:12px}.btn-xs{padding:3px 8px;font-size:11px}
.w100{width:100%;justify-content:center}
.bg{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:700}
.bg-g{background:rgba(63,185,80,.15);color:var(--green)}.bg-r{background:rgba(248,81,73,.15);color:var(--red)}.bg-y{background:rgba(210,153,34,.15);color:var(--yellow)}.bg-b{background:rgba(88,166,255,.15);color:var(--blue)}.bg-p{background:rgba(163,113,247,.15);color:var(--purple)}.bg-or{background:rgba(248,81,73,.2);color:#ff6b6b;border:1px solid rgba(248,81,73,.3)}
.tw{overflow-x:auto;border-radius:var(--r);border:1px solid var(--border)}
table{width:100%;border-collapse:collapse}
thead{background:var(--bg3)}
th{padding:10px 12px;text-align:left;font-size:11px;font-weight:700;color:var(--text3);letter-spacing:.05em;text-transform:uppercase;white-space:nowrap;border-bottom:1px solid var(--border)}
td{padding:10px 12px;border-bottom:1px solid var(--border);color:var(--text2);font-size:13px;vertical-align:middle}
tr:last-child td{border-bottom:none}
tbody tr:hover{background:var(--bg3)}
.tdn{color:var(--text);font-weight:600}
.fg{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.fgr{display:flex;flex-direction:column;gap:4px}
.fgr.full{grid-column:1/-1}
label{font-size:12px;font-weight:600;color:var(--text2)}
input,select,textarea{background:var(--bg3);border:1px solid var(--border);border-radius:var(--r2);padding:8px 11px;color:var(--text);font-size:13px;outline:none;width:100%}
input:focus,select:focus,textarea:focus{border-color:var(--blue)}
input::placeholder,textarea::placeholder{color:var(--text3)}
select option{background:var(--bg3)}
textarea{resize:vertical;min-height:65px}
.sb{position:relative}.sb svg{position:absolute;left:9px;top:50%;transform:translateY(-50%);color:var(--text3);width:13px;height:13px;pointer-events:none}.sb input{padding-left:30px}
.fb{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:14px}
.fs{background:var(--bg3);border:1px solid var(--border);border-radius:var(--r2);padding:6px 9px;color:var(--text2);font-size:12px;outline:none;-webkit-appearance:none}
.mo{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:1000;display:flex;align-items:center;justify-content:center;padding:12px}
.mb{background:var(--bg2);border:1px solid var(--border);border-radius:14px;width:100%;max-width:540px;max-height:92vh;overflow-y:auto;-webkit-overflow-scrolling:touch}
.mb-lg{max-width:680px}
.mh{padding:18px 20px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:var(--bg2);z-index:1}
.mt2x{font-weight:800;font-size:15px}
.mcx{background:var(--bg3);border:1px solid var(--border);border-radius:var(--r2);padding:5px;color:var(--text2);display:flex;align-items:center;cursor:pointer}
.mbody{padding:18px 20px}
.mfoot{padding:14px 20px 18px;border-top:1px solid var(--border);display:flex;gap:8px;justify-content:flex-end}
.ph{margin-bottom:20px}
.sh{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;gap:10px;flex-wrap:wrap}
.stit{font-weight:800;font-size:19px}
.ssub{font-size:12px;color:var(--text3);margin-top:2px}
.al{padding:11px 13px;border-radius:var(--r2);display:flex;align-items:flex-start;gap:9px;font-size:13px;margin-bottom:12px}
.al-r{background:rgba(248,81,73,.1);border:1px solid rgba(248,81,73,.2);color:var(--red)}
.al-g{background:rgba(63,185,80,.1);border:1px solid rgba(63,185,80,.2);color:var(--green)}
#tc{position:fixed;top:14px;right:14px;z-index:9999;display:flex;flex-direction:column;gap:6px;pointer-events:none}
.toast{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r2);padding:10px 14px;display:flex;align-items:center;gap:9px;font-size:13px;box-shadow:0 4px 20px rgba(0,0,0,.4);max-width:260px}
.toast.s{border-left:3px solid var(--green)}.toast.e{border-left:3px solid var(--red)}.toast.i{border-left:3px solid var(--blue)}
.pr{background:var(--bg3);border-radius:20px;height:5px;overflow:hidden}
.prb{height:100%;border-radius:20px}
.prb-b{background:var(--blue)}.prb-g{background:var(--green)}.prb-y{background:var(--yellow)}.prb-r{background:var(--red)}
.flex{display:flex}.fca{align-items:center}.fjb{justify-content:space-between}.fwrap{flex-wrap:wrap}.fcol{flex-direction:column}
.f1{flex:1}.gap1{gap:4px}.gap2{gap:8px}.gap3{gap:12px}
.mt1{margin-top:4px}.mt2{margin-top:8px}.mt3{margin-top:12px}.mt4{margin-top:16px}
.mb1{margin-bottom:4px}.mb2{margin-bottom:8px}.mb3{margin-bottom:12px}
.ts{font-size:11px}.tsm{font-size:12px}.tm{color:var(--text3)}.tw6{font-weight:700}
.tg{color:var(--green)}.tr2{color:var(--red)}.tb2{color:var(--blue)}.ty{color:var(--yellow)}
.trunc{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.dn{display:none!important}
.dv{height:1px;background:var(--border);margin:14px 0}
.dr{display:flex;justify-content:space-between;align-items:center;padding:5px 0;font-size:13px}
.dl{color:var(--text3)}.dvl{color:var(--text);font-weight:500;text-align:right}
.dsec{margin-bottom:18px}
.dsec h4{font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px;padding-bottom:5px;border-bottom:1px solid var(--border)}
.att-row{display:flex;align-items:center;gap:10px;padding:8px;background:var(--bg3);border-radius:var(--r2);margin-bottom:7px}
.att-btns{display:flex;gap:5px}
.att-b{padding:4px 9px;border-radius:5px;border:1px solid var(--border);background:var(--bg4);color:var(--text3);font-size:11px;font-weight:700;cursor:pointer}
.att-b.ap{border-color:var(--green);background:rgba(63,185,80,.2);color:var(--green)}
.att-b.al2{border-color:var(--yellow);background:rgba(210,153,34,.2);color:var(--yellow)}
.att-b.aa{border-color:var(--red);background:rgba(248,81,73,.2);color:var(--red)}
.mnav{display:flex;align-items:center;gap:8px}
.mnav button{background:var(--bg3);border:1px solid var(--border);border-radius:var(--r2);padding:5px 10px;color:var(--text2);font-size:14px;cursor:pointer}
.mnav span{font-weight:700;font-size:13px;min-width:120px;text-align:center}
.barchart{display:flex;align-items:flex-end;gap:5px;height:120px}
.barcol{display:flex;flex-direction:column;align-items:center;gap:3px;flex:1}
.bar{border-radius:3px 3px 0 0;width:100%;min-height:3px}
.barlbl{font-size:10px;color:var(--text3)}
.np{position:absolute;top:100%;right:0;width:290px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);box-shadow:0 8px 24px rgba(0,0,0,.4);z-index:500;margin-top:6px;overflow:hidden}
.nph{padding:11px 13px;border-bottom:1px solid var(--border);font-weight:700;font-size:13px;display:flex;justify-content:space-between}
.npi{padding:10px 13px;border-bottom:1px solid var(--border);cursor:pointer}
.npi:hover{background:var(--bg3)}
.npit{font-size:12px;font-weight:600}.npis{font-size:11px;color:var(--text3);margin-top:1px}
#login{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:999;padding:16px}
.lbox{background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:36px;width:100%;max-width:360px}
.llogo{text-align:center;margin-bottom:28px}
.llogo-i{width:52px;height:52px;background:linear-gradient(135deg,#58a6ff,#a371f7);border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:26px;margin:0 auto 12px}
.lfg{margin-bottom:13px}
.ldem{background:var(--bg3);border:1px solid var(--border);border-radius:var(--r2);padding:9px 12px;font-size:12px;color:var(--text3);text-align:center;margin-top:14px}
@media(max-width:760px){
  #side{position:fixed;left:0;top:0;bottom:0;transform:translateX(-100%)}
  #side.open{transform:translateX(0)}
  #overlay.show{display:block}
  .hbg{display:flex;align-items:center;justify-content:center}
  #bnav{display:block}
  #page{padding:14px}
  .g4{grid-template-columns:1fr 1fr}.g3{grid-template-columns:1fr 1fr}.g2{grid-template-columns:1fr}.g21{grid-template-columns:1fr}
  .fg{grid-template-columns:1fr}.fgr.full{grid-column:1}
}
</style>
</head>
<body>
<div id="tc"></div>
<div id="login">
  <div class="lbox">
    <div class="llogo">
      <div class="llogo-i">&#x26BD;</div>
      <h1 style="font-weight:800;font-size:20px">Sporcu Paneli</h1>
      <p style="color:var(--text3);font-size:13px;margin-top:3px">Akademi Yonetim Sistemi</p>
    </div>
    <div class="lfg fgr"><label>E-posta</label><input type="email" id="le" value="admin@dragosfutbol.com"/></div>
    <div class="lfg fgr"><label>Sifre</label><input type="password" id="lp" value="admin123"/></div>
    <div id="lerr" class="al al-r dn" style="margin-top:8px">E-posta veya sifre hatali!</div>
    <button class="btn bp w100" style="margin-top:12px" onclick="doLogin()">Giris Yap</button>
    <div class="ldem">Demo: admin@dragosfutbol.com / admin123</div>
  </div>
</div>
<div id="wrap" class="dn">
  <div id="overlay" onclick="closeSide()"></div>
  <div id="side">
    <div class="slogo">
      <div class="slogo-icon">&#x26BD;</div>
      <div><div style="font-weight:700;font-size:13px" id="sn">Dragos Futbol</div><div style="font-size:11px;color:var(--text3)">Akademisi</div></div>
    </div>
    <nav class="snav">
      <div class="nsec">Ana Menu</div>
      <button class="ni on" id="nav-dashboard" onclick="go('dashboard')"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>Gosterge</button>
      <button class="ni" id="nav-athletes" onclick="go('athletes')"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0"/></svg>Sporcular<span class="nbadge dn" id="abadge">0</span></button>
      <button class="ni" id="nav-payments" onclick="go('payments')"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>Odemeler<span class="nbadge dn" id="pbadge">0</span></button>
      <button class="ni" id="nav-accounting" onclick="go('accounting')"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/></svg>Muhasebe</button>
      <button class="ni" id="nav-attendance" onclick="go('attendance')"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4"/></svg>Devam Takibi</button>
      <div class="nsec">Yonetim</div>
      <button class="ni" id="nav-coaches" onclick="go('coaches')"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5.121 17.804A13.937 13.937 0 0112 16c2.5 0 4.847.655 6.879 1.804M15 10a3 3 0 11-6 0 3 3 0 016 0zm6 2a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>Antrenorler</button>
      <button class="ni" id="nav-messages" onclick="go('messages')"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z"/></svg>Mesajlar<span class="nbadge dn" id="mbadge">0</span></button>
      <button class="ni" id="nav-settings" onclick="go('settings')"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/></svg>Ayarlar</button>
    </nav>
    <div class="sfoot">
      <div class="flex fca gap2" style="padding:8px 10px">
        <div class="ava" style="width:30px;height:30px;font-size:11px" id="sava">A</div>
        <div><div style="font-size:12px;font-weight:600" id="suname">Admin</div><div class="ts tm">Yonetici</div></div>
        <button onclick="doLogout()" style="margin-left:auto;background:none;border:none;color:var(--text3);cursor:pointer;display:flex;align-items:center;padding:4px">
          <svg width="14" height="14" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg>
        </button>
      </div>
    </div>
  </div>
  <div id="main">
    <div id="bar">
      <button class="hbg" onclick="toggleSide()"><svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/></svg></button>

h += ‘<button class="btn bd btn-xs" data-id="' + c.id + '" onclick="delCoach(this.dataset.id)">Sil\x3C/button>\x3C/div>’;
h += ‘\x3C/div>’;
}
h += ‘<div class="card" style="border-style:dashed;display:flex;align-items:center;justify-content:center;min-height:180px;opacity:.4;cursor:pointer" onclick="showCoachForm(null)"><div style="text-align:center"><div style="font-size:28px">+\x3C/div><div class="tsm mt1">Antrenor Ekle\x3C/div>\x3C/div>\x3C/div>’;
h += ‘\x3C/div>’;
return h;
}
function showCoachForm(id) {
var c = null; if (id) { for (var i = 0; i < coaches.length; i++) { if (coaches[i].id === id) { c = coaches[i]; break; } } }
var h = ‘<div class="fg">’;
h += ‘<div class="fgr"><label>Ad *\x3C/label><input id="cf-fn" type="text" value="' + (c ? esc(c.fn) : '') + '"/>\x3C/div>’;
h += ‘<div class="fgr"><label>Soyad *\x3C/label><input id="cf-ln" type="text" value="' + (c ? esc(c.ln) : '') + '"/>\x3C/div>’;
h += ‘<div class="fgr"><label>Telefon\x3C/label><input id="cf-ph" type="tel" value="' + (c ? esc(c.ph) : '') + '"/>\x3C/div>’;
h += ‘<div class="fgr"><label>E-posta\x3C/label><input id="cf-em" type="email" value="' + (c ? esc(c.em) : '') + '"/>\x3C/div>’;
h += ‘<div class="fgr"><label>Uzmanlik *\x3C/label><input id="cf-sp" type="text" value="' + (c ? esc(c.sp) : '') + '"/>\x3C/div>’;
h += ‘<div class="fgr"><label>Maas (TL)\x3C/label><input id="cf-sa" type="number" value="' + (c ? c.sal : '') + '"/>\x3C/div>’;
h += ‘<div class="fgr"><label>Baslangic\x3C/label><input id="cf-sd" type="date" value="' + (c ? c.sd : '') + '"/>\x3C/div>’;
h += ‘<div class="fgr"><label>Durum\x3C/label><select id="cf-st"><option value=“active”’ + ((!c || c.st === ‘active’) ? ’ selected’ : ‘’) + ‘>Aktif\x3C/option><option value=“inactive”’ + (c && c.st === ‘inactive’ ? ’ selected’ : ‘’) + ‘>Pasif\x3C/option>\x3C/select>\x3C/div>’;
h += ‘<div class="fgr full"><label>Notlar\x3C/label><textarea id="cf-nt">’ + (c ? esc(c.nt) : ‘’) + ‘\x3C/textarea>\x3C/div>’;
h += ‘\x3C/div>’;
modal(id ? ‘Antrenor Duzenle’ : ‘Yeni Antrenor’, h, [{lbl:‘Iptal’,cls:‘bs’,fn:‘closeModal()’},{lbl:id ? ‘Kaydet’ : ‘Ekle’,cls:‘bp’,fn:‘saveCoach(”’ + (id || ‘’) + ‘”)’}]);
}
function saveCoach(id) {
var fn = gv(‘cf-fn’), ln = gv(‘cf-ln’), sp = gv(‘cf-sp’);
if (!fn || !ln || !sp) { toast(‘Ad, soyad ve uzmanlik zorunlu!’, ‘e’); return; }
var d = {fn:fn,ln:ln,ph:gv(‘cf-ph’),em:gv(‘cf-em’),sp:sp,sal:gvn(‘cf-sa’),sd:gv(‘cf-sd’),st:gv(‘cf-st’),nt:gv(‘cf-nt’)};
if (id) { for (var i = 0; i < coaches.length; i++) { if (coaches[i].id === id) { coaches[i] = Object.assign({}, coaches[i], d); break; } } toast(‘Antrenor guncellendi’); }
else { d.id = uid(); coaches.push(d); toast(‘Antrenor eklendi’); }
saveC(); closeModal(); go(‘coaches’);
}
function delCoach(id) {
confirm2(‘Antrenor silinsin mi?’, ‘Bu islem geri alinamaz.’, function () {
var nc = []; for (var i = 0; i < coaches.length; i++) { if (coaches[i].id !== id) nc.push(coaches[i]); }
coaches = nc; saveC(); toast(‘Antrenor silindi’); go(‘coaches’);
});
}

function pgMessages() {
var i, unread = 0; for (i = 0; i < messages.length; i++) { if (!messages[i].rd) unread++; }
var h = ‘<div class="ph"><div class="sh"><div><div class="stit">Mesajlar\x3C/div><div class="ssub">’ + unread + ’ okunmamis\x3C/div>\x3C/div>’;
h += ‘<button class="btn bp btn-sm" onclick="showMsgForm()">+ Yeni Mesaj\x3C/button>\x3C/div>\x3C/div>’;
h += ‘<div class="g21"><div class="card" style="padding:0;overflow:hidden">’;
if (!messages.length) h += ‘<div style="text-align:center;padding:40px;color:var(--text3)">Mesaj yok\x3C/div>’;
for (i = 0; i < messages.length; i++) {
var m = messages[i];
h += ‘<div style="padding:12px 14px;border-bottom:1px solid var(--border);cursor:pointer;background:' + (m.rd ? 'transparent' : 'rgba(88,166,255,.05)') + '" data-id="' + m.id + '" onclick="openMsg(this.dataset.id)">’;
h += ‘<div class="flex fca gap2"><div class="ava" style="width:26px;height:26px;font-size:9px;flex-shrink:0">’ + ini(m.fr) + ‘\x3C/div>’;
h += ‘<div style="flex:1;min-width:0"><div class="flex fjb"><span class="' + (m.rd ? 'tm' : 'tw6') + ' tsm trunc">’ + esc(m.fr) + ‘\x3C/span><span class="ts tm">’ + fmtD(m.dt) + ‘\x3C/span>\x3C/div>’;
h += ‘<div class="ts tm trunc">’ + esc(m.sub) + ‘\x3C/div>\x3C/div>’;
if (!m.rd) h += ‘<div style="width:7px;height:7px;border-radius:50%;background:var(--blue);flex-shrink:0">\x3C/div>’;
h += ‘\x3C/div>\x3C/div>’;
}
h += ‘\x3C/div><div class="card" id="msg-det"><div style="text-align:center;padding:40px;color:var(--text3)">Mesaj secin\x3C/div>\x3C/div>\x3C/div>’;
return h;
}
function openMsg(id) {
var m = null; for (var i = 0; i < messages.length; i++) { if (messages[i].id === id) { m = messages[i]; break; } } if (!m) return;
m.rd = true; saveM(); updateBadges();
var el = document.getElementById(‘msg-det’); if (!el) return;
var h = ‘<div class="tw6" style="font-size:15px;margin-bottom:6px">’ + esc(m.sub) + ‘\x3C/div>’;
h += ‘<div class="flex fca gap2 mb3"><div class="ava" style="width:26px;height:26px;font-size:9px">’ + ini(m.fr) + ‘\x3C/div>’;
h += ‘<div><div class="tw6 tsm">’ + esc(m.fr) + ‘\x3C/div><div class="ts tm">’ + esc(m.role || ‘’) + ’ - ’ + fmtD(m.dt) + ‘\x3C/div>\x3C/div>\x3C/div>’;
h += ‘<div class="dv" style="margin:10px 0">\x3C/div>’;
h += ‘<div class="tsm" style="line-height:1.7">’ + esc(m.body) + ‘\x3C/div>’;
h += ‘<div class="flex gap2 mt3"><button class="btn bs btn-sm" data-id="' + m.id + '" onclick="showReplyForm(this.dataset.id)">Yanitla\x3C/button>’;
h += ‘<button class="btn bd btn-sm" data-id="' + m.id + '" onclick="delMsg(this.dataset.id)">Sil\x3C/button>\x3C/div>’;
el.innerHTML = h;
}
function showMsgForm() {
var h = ‘<div class="fg">’;
h += ‘<div class="fgr"><label>Alici\x3C/label><input id="mf-to" type="text" placeholder="Ad Soyad"/>\x3C/div>’;
h += ‘<div class="fgr"><label>Rol\x3C/label><select id="mf-role"><option>Veli\x3C/option><option>Antrenor\x3C/option><option>Sporcu\x3C/option>\x3C/select>\x3C/div>’;
h += ‘<div class="fgr full"><label>Konu *\x3C/label><input id="mf-sub" type="text" placeholder="Mesaj konusu"/>\x3C/div>’;
h += ‘<div class="fgr full"><label>Mesaj *\x3C/label><textarea id="mf-body" style="min-height:110px" placeholder="Mesaj...">\x3C/textarea>\x3C/div>’;
h += ‘\x3C/div>’;
modal(‘Yeni Mesaj’, h, [{lbl:‘Iptal’,cls:‘bs’,fn:‘closeModal()’},{lbl:‘Gonder’,cls:‘bp’,fn:‘sendMsg()’}]);
}
function showReplyForm(id) {
var m = null; for (var i = 0; i < messages.length; i++) { if (messages[i].id === id) { m = messages[i]; break; } } if (!m) return;
var h = ‘<div class="fgr full"><label>Yanit *\x3C/label><textarea id="mf-body" style="min-height:110px" placeholder="Yanitiniz...">\x3C/textarea>\x3C/div>’;
modal(’RE: ’ + m.sub, h, [{lbl:‘Iptal’,cls:‘bs’,fn:‘closeModal()’},{lbl:‘Gonder’,cls:‘bp’,fn:‘sendReply(”’ + id + ‘”)’}]);
}
function sendMsg() {
var sub = gv(‘mf-sub’), body = gv(‘mf-body’);
if (!sub || !body) { toast(‘Konu ve mesaj zorunlu!’, ‘e’); return; }
messages.unshift({id:uid(),fr:‘Admin’,role:‘Yonetici’,to:gv(‘mf-to’) || ‘Tumu’,sub:sub,body:body,dt:tod(),rd:true});
saveM(); closeModal(); go(‘messages’); toast(‘Mesaj gonderildi’);
}
function sendReply(id) {
var m = null; for (var i = 0; i < messages.length; i++) { if (messages[i].id === id) { m = messages[i]; break; } } if (!m) return;
var body = gv(‘mf-body’); if (!body) { toast(‘Mesaj bos!’, ‘e’); return; }
messages.unshift({id:uid(),fr:‘Admin’,role:‘Yonetici’,to:m.fr,sub:’RE: ’ + m.sub,body:body,dt:tod(),rd:true});
saveM(); closeModal(); go(‘messages’); toast(‘Yanit gonderildi’);
}
function delMsg(id) {
var nm = []; for (var i = 0; i < messages.length; i++) { if (messages[i].id !== id) nm.push(messages[i]); }
messages = nm; saveM(); go(‘messages’); toast(‘Mesaj silindi’);
}

function pgSettings() {
var activeN = 0; for (var i = 0; i < athletes.length; i++) { if (athletes[i].st === ‘active’) activeN++; }
var h = ‘<div class="ph"><div class="stit">Ayarlar\x3C/div>\x3C/div>’;
h += ‘<div class="g2">’;
h += ‘<div class="card"><div class="tw6 mb3">Kurum Bilgileri\x3C/div>’;
h += ‘<div class="fgr mb3"><label>Kurum Adi\x3C/label><input id="s-name" type="text" value="' + esc(settings.schoolName || '') + '"/>\x3C/div>’;
h += ‘<button class="btn bp" onclick="saveSettings2()">Kaydet\x3C/button>\x3C/div>’;
h += ‘<div class="card"><div class="tw6 mb3">Veri Yonetimi\x3C/div><div class="flex fcol gap2">’;
h += ‘<button class="btn bs" onclick="exportAll()">Tum Veriyi Indir (JSON)\x3C/button>’;
h += ‘<button class="btn bs" onclick="exportCSV(athletes,\'sporcular.csv\')">Sporcular CSV\x3C/button>’;
h += ‘<button class="btn bs" onclick="exportCSV(payments,\'odemeler.csv\')">Odemeler CSV\x3C/button>’;
h += ‘<button class="btn bs" onclick="importData()">Veri Yukle (JSON)\x3C/button>’;
h += ‘<div class="dv">\x3C/div>’;
h += ‘<button class="btn bd" onclick="resetAll()">Tum Verileri Sifirla\x3C/button>’;
h += ‘\x3C/div>\x3C/div>’;
h += ‘<div class="card"><div class="tw6 mb3">Istatistikler\x3C/div>’;
h += row(‘Toplam Sporcu’, athletes.length) + row(‘Aktif Sporcu’, activeN) + row(‘Odeme Kaydi’, payments.length) + row(‘Antrenor’, coaches.length) + row(‘Mesaj’, messages.length);
h += ‘\x3C/div>’;
h += ‘<div class="card"><div class="tw6 mb3">Hesap\x3C/div>’;
h += row(‘E-posta’, ‘admin@dragosfutbol.com’) + row(‘Rol’, ‘Yonetici’);
h += ‘<div class="dv">\x3C/div><button class="btn bd btn-sm" onclick="doLogout()">Cikis Yap\x3C/button>’;
h += ‘\x3C/div>\x3C/div>’;
return h;
}
function saveSettings2() {
settings.schoolName = gv(‘s-name’) || settings.schoolName;
saveS();
var sn = document.getElementById(‘sn’); if (sn) sn.textContent = settings.schoolName.split(’ ‘).slice(0, 2).join(’ ’);
toast(‘Ayarlar kaydedildi’);
}
function resetAll() {
confirm2(‘TUM VERILER SIFIRLANSIN MI?’, ‘Bu islem geri alinamaz!’, function () {
athletes = JSON.parse(JSON.stringify(DA));
payments = JSON.parse(JSON.stringify(DP));
coaches = JSON.parse(JSON.stringify(DC));
attData = {}; messages = JSON.parse(JSON.stringify(DM));
saveA(); saveP(); saveC(); saveAtt(); saveM();
go(‘dashboard’); toast(‘Veriler sifirlandi’, ‘i’);
});
}

document.addEventListener(‘keydown’, function (e) { if (e.keyCode === 27) closeModal(); });
go(‘dashboard’);
</script>

</body>
</html>
