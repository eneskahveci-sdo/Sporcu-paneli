<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"/>
<title>Dragos Futbol Akademisi</title>
<style>
:root { --bg: #080c14; --bg2: #0f1623; --bg3: #151e2d; --border: #1e3352; --text: #e2e8f0; --text2: #94a3b8; --blue: #3b82f6; --blue2: #60a5fa; --grad: linear-gradient(135deg, var(--blue), var(--blue2)); }
*{box-sizing:border-box;margin:0;padding:0;font-family:sans-serif;}
body{background:var(--bg);color:var(--text);overflow-x:hidden;}
.dn{display:none!important} .flex{display:flex} .fca{align-items:center} .fjb{justify-content:space-between} .fjc{justify-content:center}
.gap2{gap:8px} .gap4{gap:16px} .mb3{margin-bottom:16px} .mt3{margin-top:16px} .w100{width:100%}
#wrap{display:flex;height:100vh}
#side{width:260px;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;}
.slogo{padding:20px;display:flex;align-items:center;gap:12px;border-bottom:1px solid var(--border)}
.snav{padding:16px 8px;flex:1;overflow-y:auto}
.nsec{font-size:11px;font-weight:700;color:var(--text2);text-transform:uppercase;margin:16px 8px 8px;opacity:0.6}
.ni{display:flex;align-items:center;gap:12px;padding:10px 12px;border-radius:8px;color:var(--text2);font-weight:500;margin-bottom:2px;width:100%;cursor:pointer;border:none;background:none;text-align:left;transition:0.2s}
.ni:hover{background:var(--bg3);color:var(--text)}
.ni.on{background:var(--grad);color:#fff}
#main-wrap{flex:1;display:flex;flex-direction:column;background:var(--bg)}
#head{height:60px;background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 20px}
#main{flex:1;overflow-y:auto;padding:24px}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:20px;margin-bottom:16px}
.btn{padding:10px 16px;border-radius:8px;font-weight:600;cursor:pointer;border:none;display:inline-flex;align-items:center;gap:8px}
.bp{background:var(--grad);color:#fff} .bs{background:var(--bg3);color:var(--text);border:1px solid var(--border)}
.tw table{width:100%;border-collapse:collapse} .tw th{padding:12px;font-size:12px;color:var(--text2);border-bottom:1px solid var(--border);text-align:left} .tw td{padding:14px;border-bottom:1px solid var(--border);font-size:14px}
#lbox-wrap{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:1000}
.lbox{background:var(--bg2);border:1px solid var(--border);border-radius:24px;padding:32px;width:100%;max-width:400px;text-align:center}
.ltabs{display:flex;background:var(--bg);padding:4px;border-radius:12px;margin-bottom:24px}
.ltab{flex:1;padding:10px;font-size:13px;font-weight:600;color:var(--text2);border-radius:8px;cursor:pointer}
.ltab.on{background:var(--bg2);color:var(--text)}
input{padding:12px;border-radius:8px;background:var(--bg3);border:1px solid var(--border);color:#fff;width:100%;margin-bottom:12px}
#modal{position:fixed;inset:0;background:rgba(0,0,0,0.8);display:none;align-items:center;justify-content:center;z-index:2000}
#modal.show{display:flex} .m-box{background:var(--bg2);border-radius:16px;width:90%;max-width:500px;padding:24px}
</style>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
<div id="lbox-wrap">
    <div class="lbox">
        <h2 style="margin-bottom:8px">Dragos Futbol Akademisi</h2>
        <div class="ltabs" id="login-tabs">
            <div class="ltab on" onclick="switchLoginTab('sporcu')">Sporcu/Veli</div>
            <div class="ltab" onclick="switchLoginTab('coach')">Antrenör</div>
        </div>
        <div id="login-admin" class="dn">
            <input id="le" type="email" placeholder="Yönetici E-posta"/>
            <input id="lp" type="password" placeholder="Şifre"/>
            <button class="btn bp w100" onclick="doLogin()">Yönetici Girişi</button>
        </div>
        <div id="login-sporcu">
            <input id="ls-tc" type="tel" placeholder="Sporcu TC No"/>
            <input id="ls-pass" type="password" placeholder="Şifre (TC Son 4)"/>
            <button class="btn bp w100" onclick="doNormalLogin('sporcu')">Giriş Yap</button>
        </div>
        <div id="login-coach" class="dn">
            <input id="lc-tc" type="tel" placeholder="Antrenör TC No"/>
            <input id="lc-pass" type="password" placeholder="Şifre"/>
            <button class="btn bp w100" onclick="doNormalLogin('coach')">Antrenör Girişi</button>
        </div>
        <div class="flex fjc gap4 mt3 ts tm"><a href="#" onclick="showLegal('kvkk')">KVKK Metni</a><a href="#" onclick="showLegal('kullanim')">Sözleşme</a></div>
    </div>
</div>
<div id="wrap" class="dn">
    <div id="side">
        <div class="slogo"><div style="font-size:24px">⚽</div><div style="font-weight:800">DRAGOS</div></div>
        <nav class="snav">
            <div class="nsec">Ana Menü</div>
            <button class="ni on" id="ni-dashboard" onclick="go('dashboard')">Gösterge</button>
            <button class="ni" id="ni-athletes" onclick="go('athletes')">Sporcular</button>
            <button class="ni" id="ni-attendance" onclick="go('attendance')">Yoklama</button>
            <button class="ni" id="ni-coaches" onclick="go('coaches')">Antrenörler</button>
            <div class="nsec" id="sec-finance">Yönetim (Muhasebe)</div>
            <button class="ni" id="ni-payments" onclick="go('payments')">Ödemeler</button>
            <button class="ni" id="ni-accounting" onclick="go('accounting')">Finans / Rapor</button>
            <button class="ni" id="ni-branches" onclick="go('branches')">Şubeler</button>
            <button class="ni" id="ni-announcements" onclick="go('announcements')">Duyurular</button>
            <div class="nsec" id="sec-platform">Platform</div>
            <button class="ni" id="ni-org-manage" onclick="go('org-manage')">Kurum Yönetimi</button>
            <div class="nsec" id="sec-sys">Sistem</div>
            <button class="ni" id="ni-settings" onclick="go('settings')">Ayarlar</button>
            <div style="margin-top:auto;padding:20px;border-top:1px solid var(--border)">
                <div id="suname" style="font-weight:700;font-size:14px">Kullanıcı</div>
                <button onclick="doLogout()" style="background:none;border:none;color:var(--text2);cursor:pointer;font-size:12px">Çıkış Yap</button>
            </div>
        </nav>
    </div>
    <div id="main-wrap">
        <header id="head"><div id="bar-title" style="font-weight:700">Dashboard</div></header>
        <main id="main"></main>
    </div>
</div>
<div id="modal"><div class="m-box"><h3 id="modal-title"></h3><div id="modal-body" style="margin:20px 0;font-size:14px;color:var(--text2)"></div><div id="modal-footer" class="flex fjc"></div></div></div>
<script src="script.js"></script>
</body>
</html>
