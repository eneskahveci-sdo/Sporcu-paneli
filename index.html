<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"/>
<title>Dragos Futbol Akademisi | Pro Panel</title>
<style>
:root {
  --bg: #080c14; --bg2: #0f1623; --bg3: #151e2d; --border: #1e3352;
  --text: #e2e8f0; --text2: #94a3b8; --blue: #3b82f6; --blue2: #60a5fa;
  --green: #22c55e; --red: #ef4444; --yellow: #eab308;
  --grad: linear-gradient(135deg, var(--blue), var(--blue2));
}
*{box-sizing:border-box;margin:0;padding:0;font-family:-apple-system,BlinkMacSystemFont,sans-serif;}
body{background:var(--bg);color:var(--text);overflow-x:hidden;transition:0.3s;}
.dn{display:none!important} .flex{display:flex} .fca{align-items:center} .fjb{justify-content:space-between} .fjc{justify-content:center}
.gap2{gap:8px} .gap3{gap:12px} .mb3{margin-bottom:16px} .mt3{margin-top:16px} .w100{width:100%}
.tw6{font-weight:600} .tsm{font-size:14px} .ts{font-size:13px} .tm{color:var(--text2)}

#wrap{display:flex;height:100vh}
#side{width:260px;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;transition:0.3s}
.slogo{padding:25px 20px;display:flex;align-items:center;gap:12px;border-bottom:1px solid var(--border)}
.slogo-i{width:36px;height:36px;background:var(--grad);border-radius:10px;display:flex;fca;fjc;font-size:20px;color:#fff;font-weight:800}
.snav{padding:15px 10px;flex:1;overflow-y:auto}
.nsec{font-size:11px;font-weight:700;color:var(--text2);text-transform:uppercase;margin:20px 10px 10px;opacity:0.5;letter-spacing:1px}
.ni{display:flex;fca;gap:12px;padding:12px;border-radius:10px;color:var(--text2);margin-bottom:4px;cursor:pointer;transition:0.2s;border:none;background:none;width:100%;text-align:left}
.ni:hover{background:var(--bg3);color:var(--text)}
.ni.on{background:var(--grad);color:#fff;box-shadow:0 4px 12px rgba(59,130,246,0.3)}

#main-wrap{flex:1;display:flex;flex-direction:column;background:var(--bg)}
#head{height:65px;background:var(--bg2);border-bottom:1px solid var(--border);display:flex;fca;fjb;padding:0 25px}
#main{flex:1;overflow-y:auto;padding:30px}

.card{background:var(--bg2);border:1px solid var(--border);border-radius:18px;padding:25px;margin-bottom:20px;box-shadow:0 4px 6px rgba(0,0,0,0.1)}
.stat-card{text-align:center;padding:25px;border-bottom:4px solid var(--blue)}
.stat-card h2{font-size:32px;margin-bottom:5px}
.btn{padding:12px 20px;border-radius:10px;font-weight:700;cursor:pointer;border:none;display:inline-flex;fca;gap:8px;transition:0.2s}
.bp{background:var(--grad);color:#fff} .bp:hover{transform:translateY(-2px);box-shadow:0 5px 15px rgba(59,130,246,0.4)}
.bs{background:var(--bg3);color:var(--text);border:1px solid var(--border)}

.tw table{width:100%;border-collapse:collapse}
.tw th{padding:15px;font-size:12px;color:var(--text2);text-transform:uppercase;border-bottom:1px solid var(--border)}
.tw td{padding:18px;border-bottom:1px solid var(--border);font-size:14px}
.tw tr:hover td{background:rgba(255,255,255,0.02)}

#lbox-wrap{position:fixed;inset:0;background:var(--bg);display:flex;fca;fjc;z-index:1000}
.lbox{background:var(--bg2);border:1px solid var(--border);border-radius:30px;padding:40px;width:100%;max-width:420px;text-align:center;box-shadow:0 25px 50px -12px rgba(0,0,0,0.5)}
.ltabs{display:flex;background:var(--bg);padding:5px;border-radius:15px;margin-bottom:30px}
.ltab{flex:1;padding:12px;font-size:14px;font-weight:600;color:var(--text2);border-radius:10px;cursor:pointer}
.ltab.on{background:var(--bg2);color:var(--text);box-shadow:0 2px 8px rgba(0,0,0,0.2)}
input{padding:14px;border-radius:10px;background:var(--bg3);border:1px solid var(--border);color:#fff;width:100%;margin-bottom:15px;outline:none}
input:focus{border-color:var(--blue)}

#modal{position:fixed;inset:0;background:rgba(0,0,0,0.85);display:none;fca;fjc;z-index:2000;backdrop-filter:blur(5px)}
#modal.show{display:flex}
.m-box{background:var(--bg);border:1px solid var(--border);border-radius:24px;width:90%;max-width:550px;padding:30px}

@media (max-width:768px){ #side{display:none} .g4{grid-template-columns:1fr 1fr!important} }
</style>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<div id="lbox-wrap">
    <div class="lbox">
        <div class="slogo-i" style="margin:0 auto 20px;width:60px;height:60px;font-size:30px">⚽</div>
        <h2 style="margin-bottom:5px;font-size:24px">Dragos Futbol Akademisi</h2>
        <p class="tm ts mb3">Kurumsal Yönetim Paneli</p>
        
        <div class="ltabs" id="login-tabs">
            <div class="ltab on" onclick="switchLoginTab('sporcu')">Sporcu/Veli</div>
            <div class="ltab" onclick="switchLoginTab('coach')">Antrenör</div>
        </div>

        <div id="login-admin" class="dn">
            <input id="le" type="email" placeholder="Yönetici E-posta Adresi"/>
            <input id="lp" type="password" placeholder="Şifre"/>
            <button class="btn bp w100" onclick="doLogin()" style="width:100%;padding:15px">Sisteme Giriş Yap</button>
        </div>

        <div id="login-sporcu">
            <input id="ls-tc" type="tel" maxlength="11" placeholder="Sporcu TC Kimlik No"/>
            <input id="ls-pass" type="password" placeholder="Şifre (TC Son 4)"/>
            <button class="btn bp w100" onclick="doNormalLogin('sporcu')" style="width:100%;padding:15px">Sporcu Girişi</button>
        </div>

        <div id="login-coach" class="dn">
            <input id="lc-tc" type="tel" maxlength="11" placeholder="Antrenör TC Kimlik No"/>
            <input id="lc-pass" type="password" placeholder="Antrenör Şifresi"/>
            <button class="btn bp w100" onclick="doNormalLogin('coach')" style="width:100%;padding:15px">Antrenör Girişi</button>
        </div>

        <div class="flex fjc gap4 mt3 ts tm" style="border-top:1px solid var(--border);padding-top:20px">
            <a href="javascript:void(0)" onclick="showLegal('kvkk')" style="text-decoration:none">KVKK Aydınlatma</a>
            <a href="javascript:void(0)" onclick="showLegal('kullanim')" style="text-decoration:none">Kullanım Sözleşmesi</a>
        </div>
    </div>
</div>

<div id="wrap" class="dn">
    <div id="side">
        <div class="slogo">
            <div class="slogo-i">⚽</div>
            <div><div class="tw6">DRAGOS</div><div class="ts tm">Akademi Pro</div></div>
        </div>
        <nav class="snav">
            <div class="nsec">Ana Menü</div>
            <button class="ni on" id="ni-dashboard" onclick="go('dashboard')"><span>📊 Gösterge Paneli</span></button>
            <button class="ni" id="ni-athletes" onclick="go('athletes')"><span>👥 Sporcu Listesi</span></button>
            <button class="ni" id="ni-attendance" onclick="go('attendance')"><span>✅ Günlük Yoklama</span></button>
            <button class="ni" id="ni-coaches" onclick="go('coaches')"><span>🏃 Antrenörler</span></button>
            
            <div class="nsec" id="sec-finance">Yönetim (Muhasebe)</div>
            <button class="ni" id="ni-payments" onclick="go('payments')"><span>💳 Ödemeler</span></button>
            <button class="ni" id="ni-accounting" onclick="go('accounting')"><span>📈 Finans / Rapor</span></button>
            <button class="ni" id="ni-branches" onclick="go('branches')"><span>🏢 Şube Yönetimi</span></button>
            <button class="ni" id="ni-announcements" onclick="go('announcements')"><span>📢 Duyuru Yayınla</span></button>
            
            <div class="nsec" id="sec-platform">Sistem Platformu</div>
            <button class="ni" id="ni-org-manage" onclick="go('org-manage')"><span>🛡️ Kurum Yönetimi</span></button>
            <button class="ni" id="ni-settings" onclick="go('settings')"><span>⚙️ Genel Ayarlar</span></button>
            
            <div style="margin-top:auto;padding:20px;border-top:1px solid var(--border);background:rgba(0,0,0,0.2)">
                <div id="suname" class="tw6 tsm mb2">Kullanıcı Adı</div>
                <button onclick="doLogout()" class="ts tm" style="border:none;background:none;cursor:pointer;color:var(--red)">🔒 Güvenli Çıkış</button>
            </div>
        </nav>
    </div>

    <div id="main-wrap">
        <header id="head">
            <div class="tw6" id="bar-title" style="font-size:18px">Dashboard</div>
            <div class="flex fca gap3">
                <span class="ts tm" id="live-clock">00:00:00</span>
                <div style="width:36px;height:36px;background:var(--grad);border-radius:50%;display:flex;fca;fjc;font-weight:700">A</div>
            </div>
        </header>
        <main id="main"></main>
    </div>
</div>

<div id="modal">
    <div class="m-box">
        <div class="fjb flex mb3" style="border-bottom:1px solid var(--border);padding-bottom:15px">
            <h3 id="modal-title">Başlık</h3>
            <button onclick="closeModal()" style="background:none;border:none;color:#fff;font-size:20px;cursor:pointer">&times;</button>
        </div>
        <div id="modal-body" class="mb3 ts tm" style="line-height:1.6"></div>
        <div id="modal-footer" class="flex fjc gap3"></div>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
