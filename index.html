<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<title>Sporcu Paneli</title>
<style>
:root{--bg:#0d1117;--bg2:#161b22;--bg3:#21262d;--bg4:#2d333b;--border:#30363d;--border2:#444c56;--text:#e6edf3;--text2:#8b949e;--text3:#484f58;--blue:#58a6ff;--blue2:#1f6feb;--green:#3fb950;--red:#f85149;--yellow:#d29922;--purple:#a371f7;--r:10px;--r2:6px}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,Helvetica,sans-serif;font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased}
button{font-family:inherit;cursor:pointer}input,select,textarea{font-family:inherit}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}
#wrap{display:flex;height:100vh;overflow:hidden}
#side{width:220px;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;transition:transform .25s;z-index:200}
#main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
#bar{height:52px;background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 16px;gap:10px;flex-shrink:0}
#page{flex:1;overflow-y:auto;padding:20px;-webkit-overflow-scrolling:touch}
#bnav{display:none;background:var(--bg2);border-top:1px solid var(--border);flex-shrink:0}
#overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:150}
.slogo{padding:16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
.slogo-icon{width:34px;height:34px;background:linear-gradient(135deg,#58a6ff,#a371f7);border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0}
.snav{flex:1;padding:8px;overflow-y:auto}
.nsec{font-size:10px;font-weight:700;color:var(--text3);letter-spacing:.08em;text-transform:uppercase;padding:8px 8px 3px}
.ni{display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:var(--r2);color:var(--text2);font-size:13px;font-weight:500;border:none;background:none;width:100%;text-align:left;margin-bottom:1px;cursor:pointer}
.ni:hover{background:var(--bg3);color:var(--text)}
.ni.on{background:rgba(88,166,255,.12);color:var(--blue);border:1px solid rgba(88,166,255,.2)}
.ni svg{width:15px;height:15px;flex-shrink:0}
.nbadge{margin-left:auto;background:var(--red);color:#fff;font-size:10px;font-weight:700;padding:1px 5px;border-radius:10px;min-width:16px;text-align:center}
.sfoot{padding:8px;border-top:1px solid var(--border)}
.ava{border-radius:50%;background:linear-gradient(135deg,#58a6ff,#a371f7);display:flex;align-items:center;justify-content:center;font-weight:700;color:#fff;flex-shrink:0}
.hbg{display:none;background:none;border:none;color:var(--text2);padding:4px;cursor:pointer}
.btitle{font-weight:700;font-size:15px;flex:1}
.ibtn{background:var(--bg3);border:1px solid var(--border);border-radius:var(--r2);padding:6px;color:var(--text2);display:flex;align-items:center;justify-content:center;cursor:pointer;position:relative}
.ibtn:hover{background:var(--bg4);color:var(--text)}
.dot{position:absolute;top:4px;right:4px;width:7px;height:7px;background:var(--red);border-radius:50%;border:2px solid var(--bg2)}
.bni{display:flex;height:54px;align-items:stretch}
.bni-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;background:none;border:none;color:var(--text3);font-size:10px;font-weight:600;cursor:pointer}
.bni-btn svg{width:20px;height:20px}
.bni-btn.on{color:var(--blue)}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:18px}
.stat{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:18px}
.sico{width:38px;height:38px;border-radius:9px;display:flex;align-items:center;justify-content:center;margin-bottom:10px}
.sico.b{background:rgba(88,166,255,.15)}.sico.g{background:rgba(63,185,80,.15)}.sico.y{background:rgba(210,153,34,.15)}.sico.r{background:rgba(248,81,73,.15)}.sico.p{background:rgba(163,113,247,.15)}
.sval{font-size:22px;font-weight:800;color:var(--text);line-height:1}
.slbl{font-size:11px;color:var(--text3);margin-top:3px}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.g21{display:grid;grid-template-columns:2fr 1fr;gap:14px}
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 14px;border-radius:var(--r2);font-size:13px;font-weight:600;border:none;cursor:pointer;white-space:nowrap}
.btn:active{opacity:.75}
.bp{background:var(--blue2);color:#fff}.bs{background:var(--bg3);color:var(--text2);border:1px solid var(--border)}.bd{background:rgba(248,81,73,.15);color:var(--red);border:1px solid rgba(248,81,73,.25)}.bsu{background:rgba(63,185,80,.15);color:var(--green);border:1px solid rgba(63,185,80,.25)}
.btn-sm{padding:5px 10px;font-size:12px}.btn-xs{padding:3px 8px;font-size:11px}
.w100{width:100%;justify-content:center}
.bg{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:700}
.bg-g{background:rgba(63,185,80,.15);color:var(--green)}.bg-r{background:rgba(248,81,73,.15);color:var(--red)}.bg-y{background:rgba(210,153,34,.15);color:var(--yellow)}.bg-b{background:rgba(88,166,255,.15);color:var(--blue)}.bg-p{background:rgba(163,113,247,.15);color:var(--purple)}.bg-or{background:rgba(248,81,73,.2);color:#ff6b6b;border:1px solid rgba(248,81,73,.3)}
.tw{overflow-x:auto;border-radius:var(--r);border:1px solid var(--border)}
table{width:100%;border-collapse:collapse}
thead{background:var(--bg3)}
th{padding:10px 12px;text-align:left;font-size:11px;font-weight:700;color:var(--text3);letter-spacing:.05em;text-transform:uppercase;white-space:nowrap;border-bottom:1px solid var(--border)}
td{padding:10px 12px;border-bottom:1px solid var(--border);color:var(--text2);font-size:13px;vertical-align:middle}
tr:last-child td{border-bottom:none}
tbody tr:hover{background:var(--bg3)}
.tdn{color:var(--text);font-weight:600}
.fg{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.fgr{display:flex;flex-direction:column;gap:4px}
.fgr.full{grid-column:1/-1}
label{font-size:12px;font-weight:600;color:var(--text2)}
input,select,textarea{background:var(--bg3);border:1px solid var(--border);border-radius:var(--r2);padding:8px 11px;color:var(--text);font-size:13px;outline:none;width:100%}
input:focus,select:focus,textarea:focus{border-color:var(--blue)}
input::placeholder,textarea::placeholder{color:var(--text3)}
select option{background:var(--bg3)}
textarea{resize:vertical;min-height:65px}
.sb{position:relative}.sb svg{position:absolute;left:9px;top:50%;transform:translateY(-50%);color:var(--text3);width:13px;height:13px;pointer-events:none}.sb input{padding-left:30px}
.fb{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:14px}
.fs{background:var(--bg3);border:1px solid var(--border);border-radius:var(--r2);padding:6px 9px;color:var(--text2);font-size:12px;outline:none;-webkit-appearance:none}
.mo{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:1000;display:flex;align-items:center;justify-content:center;padding:12px}
.mb{background:var(--bg2);border:1px solid var(--border);border-radius:14px;width:100%;max-width:540px;max-height:92vh;overflow-y:auto;-webkit-overflow-scrolling:touch}
.mb-lg{max-width:680px}
.mh{padding:18px 20px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:var(--bg2);z-index:1}
.mt2x{font-weight:800;font-size:15px}
.mcx{background:var(--bg3);border:1px solid var(--border);border-radius:var(--r2);padding:5px;color:var(--text2);display:flex;align-items:center;cursor:pointer}
.mbody{padding:18px 20px}
.mfoot{padding:14px 20px 18px;border-top:1px solid var(--border);display:flex;gap:8px;justify-content:flex-end}
.ph{margin-bottom:20px}
.sh{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;gap:10px;flex-wrap:wrap}
.stit{font-weight:800;font-size:19px}
.ssub{font-size:12px;color:var(--text3);margin-top:2px}
.al{padding:11px 13px;border-radius:var(--r2);display:flex;align-items:flex-start;gap:9px;font-size:13px;margin-bottom:12px}
.al-r{background:rgba(248,81,73,.1);border:1px solid rgba(248,81,73,.2);color:var(--red)}
.al-g{background:rgba(63,185,80,.1);border:1px solid rgba(63,185,80,.2);color:var(--green)}
#tc{position:fixed;top:14px;right:14px;z-index:9999;display:flex;flex-direction:column;gap:6px;pointer-events:none}
.toast{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r2);padding:10px 14px;display:flex;align-items:center;gap:9px;font-size:13px;box-shadow:0 4px 20px rgba(0,0,0,.4);max-width:260px}
.toast.s{border-left:3px solid var(--green)}.toast.e{border-left:3px solid var(--red)}.toast.i{border-left:3px solid var(--blue)}
.pr{background:var(--bg3);border-radius:20px;height:5px;overflow:hidden}
.prb{height:100%;border-radius:20px}
.prb-b{background:var(--blue)}.prb-g{background:var(--green)}.prb-y{background:var(--yellow)}.prb-r{background:var(--red)}
.flex{display:flex}.fca{align-items:center}.fjb{justify-content:space-between}.fwrap{flex-wrap:wrap}.fcol{flex-direction:column}
.f1{flex:1}.gap1{gap:4px}.gap2{gap:8px}.gap3{gap:12px}
.mt1{margin-top:4px}.mt2{margin-top:8px}.mt3{margin-top:12px}.mt4{margin-top:16px}
.mb1{margin-bottom:4px}.mb2{margin-bottom:8px}.mb3{margin-bottom:12px}
.ts{font-size:11px}.tsm{font-size:12px}.tm{color:var(--text3)}.tw6{font-weight:700}
.tg{color:var(--green)}.tr2{color:var(--red)}.tb2{color:var(--blue)}.ty{color:var(--yellow)}
.trunc{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.dn{display:none!important}
.dv{height:1px;background:var(--border);margin:14px 0}
.dr{display:flex;justify-content:space-between;align-items:center;padding:5px 0;font-size:13px}
.dl{color:var(--text3)}.dvl{color:var(--text);font-weight:500;text-align:right}
.dsec{margin-bottom:18px}
.dsec h4{font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px;padding-bottom:5px;border-bottom:1px solid var(--border)}
.att-row{display:flex;align-items:center;gap:10px;padding:8px;background:var(--bg3);border-radius:var(--r2);margin-bottom:7px}
.att-btns{display:flex;gap:5px}
.att-b{padding:4px 9px;border-radius:5px;border:1px solid var(--border);background:var(--bg4);color:var(--text3);font-size:11px;font-weight:700;cursor:pointer}
.att-b.ap{border-color:var(--green);background:rgba(63,185,80,.2);color:var(--green)}
.att-b.al2{border-color:var(--yellow);background:rgba(210,153,34,.2);color:var(--yellow)}
.att-b.aa{border-color:var(--red);background:rgba(248,81,73,.2);color:var(--red)}
.mnav{display:flex;align-items:center;gap:8px}
.mnav button{background:var(--bg3);border:1px solid var(--border);border-radius:var(--r2);padding:5px 10px;color:var(--text2);font-size:14px;cursor:pointer}
.mnav span{font-weight:700;font-size:13px;min-width:120px;text-align:center}
.barchart{display:flex;align-items:flex-end;gap:5px;height:120px}
.barcol{display:flex;flex-direction:column;align-items:center;gap:3px;flex:1}
.bar{border-radius:3px 3px 0 0;width:100%;min-height:3px}
.barlbl{font-size:10px;color:var(--text3)}
.np{position:absolute;top:100%;right:0;width:290px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);box-shadow:0 8px 24px rgba(0,0,0,.4);z-index:500;margin-top:6px;overflow:hidden}
.nph{padding:11px 13px;border-bottom:1px solid var(--border);font-weight:700;font-size:13px;display:flex;justify-content:space-between}
.npi{padding:10px 13px;border-bottom:1px solid var(--border);cursor:pointer}
.npi:hover{background:var(--bg3)}
.npit{font-size:12px;font-weight:600}.npis{font-size:11px;color:var(--text3);margin-top:1px}
#login{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:999;padding:16px}
.lbox{background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:36px;width:100%;max-width:360px}
.llogo{text-align:center;margin-bottom:28px}
.llogo-i{width:52px;height:52px;background:linear-gradient(135deg,#58a6ff,#a371f7);border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:26px;margin:0 auto 12px}
.lfg{margin-bottom:13px}
.ldem{background:var(--bg3);border:1px solid var(--border);border-radius:var(--r2);padding:9px 12px;font-size:12px;color:var(--text3);text-align:center;margin-top:14px}
@media(max-width:760px){
  #side{position:fixed;left:0;top:0;bottom:0;transform:translateX(-100%)}
  #side.open{transform:translateX(0)}
  #overlay.show{display:block}
  .hbg{display:flex;align-items:center;justify-content:center}
  #bnav{display:block}
  #page{padding:14px}
  .g4{grid-template-columns:1fr 1fr}.g3{grid-template-columns:1fr 1fr}.g2{grid-template-columns:1fr}.g21{grid-template-columns:1fr}
  .fg{grid-template-columns:1fr}.fgr.full{grid-column:1}
}
</style>
</head>
<body>
<div id="tc"></div>
<div id="login">
  <div class="lbox" style="max-width:400px">
    <div class="llogo">
      <div class="llogo-i">&#x26BD;</div>
      <h1 style="font-weight:800;font-size:20px">Sporcu Paneli</h1>
      <p style="color:var(--text3);font-size:13px;margin-top:3px">Akademi Yonetim Sistemi</p>
    </div>
    <div style="display:flex;background:var(--bg3);border-radius:8px;padding:3px;margin-bottom:18px">
      <button id="tab-admin" onclick="switchLoginTab('admin')" style="flex:1;padding:7px;border:none;border-radius:6px;font-size:12px;font-weight:700;cursor:pointer;background:var(--bg2);color:var(--text)">Kurum Girisi</button>
      <button id="tab-sporcu" onclick="switchLoginTab('sporcu')" style="flex:1;padding:7px;border:none;border-radius:6px;font-size:12px;font-weight:700;cursor:pointer;background:transparent;color:var(--text3)">Sporcu / Veli</button>
    </div>
    <div id="login-admin-form">
      <div class="lfg fgr"><label>E-posta</label><input type="email" id="le" value="admin@dragosfutbol.com"/></div>
      <div class="lfg fgr"><label>Sifre</label><input type="password" id="lp" value="admin123"/></div>
      <div id="lerr" class="al al-r dn" style="margin-top:8px">E-posta veya sifre hatali!</div>
      <button class="btn bp w100" style="margin-top:12px" onclick="doLogin()">Giris Yap</button>
      <div style="text-align:center;margin-top:8px;font-size:12px;color:var(--text3)"><button onclick="showForgotPassword('admin')" style="background:none;border:none;color:var(--text3);cursor:pointer;font-size:12px;padding:0">Sifremi Unuttum</button></div>
      <div style="text-align:center;margin-top:6px;font-size:12px;color:var(--text3)">Hesabiniz yok mu? <button onclick="showRegister()" style="background:none;border:none;color:var(--blue);cursor:pointer;font-size:12px;padding:0">Kurum Kaydi Olustur</button></div>
    </div>
    <div id="login-sporcu-form" style="display:none">
      <div class="lfg fgr"><label>TC Kimlik No</label><input type="text" id="ls-tc" maxlength="11" placeholder="11 haneli TC kimlik"/></div>
      <div class="lfg fgr"><label>Sifre</label><input type="password" id="ls-pass" placeholder="Sifreniz"/></div>
      <div id="ls-err" class="al al-r dn" style="margin-top:8px">TC kimlik veya sifre hatali!</div>
      <button class="btn bp w100" style="margin-top:12px" onclick="doSporcuLogin()">Sporcu Girisi</button>
      <div style="text-align:center;margin-top:8px;font-size:12px;color:var(--text3)"><button onclick="showForgotPassword('sporcu')" style="background:none;border:none;color:var(--text3);cursor:pointer;font-size:12px;padding:0">Sifremi Unuttum</button></div>
    </div>
  </div>
</div>

<div id="loading-overlay" style="display:none;position:fixed;inset:0;background:rgba(13,17,23,.85);z-index:9990;align-items:center;justify-content:center;flex-direction:column;gap:12px">
  <div style="width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--blue);border-radius:50%;animation:spin .7s linear infinite"></div>
  <div style="color:var(--text2);font-size:13px" id="loading-msg">Yukleniyor...</div>
</div>
<style>@keyframes spin{to{transform:rotate(360deg)}}</style>
<div id="sporcu-portal" style="display:none;position:fixed;inset:0;background:var(--bg);z-index:998;overflow-y:auto;-webkit-overflow-scrolling:touch">
  <div style="max-width:600px;margin:0 auto;padding:16px">
    <div style="display:flex;align-items:center;justify-content:space-between;padding:12px 0;margin-bottom:16px;border-bottom:1px solid var(--border)">
      <div style="display:flex;align-items:center;gap:10px">
        <div class="slogo-icon" style="width:30px;height:30px;font-size:14px">&#x26BD;</div>
        <div id="sp-orgname" style="font-weight:700;font-size:13px">Akademi</div>
      </div>
      <div style="display:flex;align-items:center;gap:8px">
        <div id="sp-avatar" class="ava" style="width:30px;height:30px;font-size:11px">S</div>
        <button onclick="doSporcuLogout()" style="background:var(--bg3);border:1px solid var(--border);border-radius:6px;padding:5px 10px;color:var(--text2);font-size:12px;cursor:pointer">Cikis</button>
      </div>
    </div>
    <div id="sp-tabs" style="display:flex;background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:3px;margin-bottom:16px;gap:2px">
      <button class="sp-tab-btn active" onclick="spTab('profil')" id="sptab-profil" style="flex:1;padding:7px 4px;border:none;border-radius:6px;font-size:11px;font-weight:700;cursor:pointer;background:var(--blue2);color:#fff">Profil</button>
      <button class="sp-tab-btn" onclick="spTab('yoklama')" id="sptab-yoklama" style="flex:1;padding:7px 4px;border:none;border-radius:6px;font-size:11px;font-weight:700;cursor:pointer;background:transparent;color:var(--text3)">Yoklama</button>
      <button class="sp-tab-btn" onclick="spTab('odemeler')" id="sptab-odemeler" style="flex:1;padding:7px 4px;border:none;border-radius:6px;font-size:11px;font-weight:700;cursor:pointer;background:transparent;color:var(--text3)">Odemeler</button>
      <button class="sp-tab-btn" onclick="spTab('odeme-yap')" id="sptab-odeme-yap" style="flex:1;padding:7px 4px;border:none;border-radius:6px;font-size:11px;font-weight:700;cursor:pointer;background:transparent;color:var(--text3)">Odeme Yap</button>
    </div>
    <div id="sp-content"></div>
  </div>
</div>
<div id="wrap" class="dn">
  <div id="overlay" onclick="closeSide()"></div>
  <div id="side">
    <div class="slogo">
      <div class="slogo-icon">&#x26BD;</div>
      <div><div style="font-weight:700;font-size:13px" id="sn">Dragos Futbol</div><div style="font-size:11px;color:var(--text3)">Akademisi</div></div>
    </div>
    <nav class="snav">
      <div class="nsec">Ana Menu</div>

async function supa(table, method, data, filters) {
  let url = SUPA_URL + '/rest/v1/' + table;
  let params = [];
  if (filters) {
    Object.keys(filters).forEach(function(k){ params.push(k + '=eq.' + encodeURIComponent(filters[k])); });
  }
  if (method === 'GET' && params.length) url += '?' + params.join('&');
  if (method === 'GET') url += (url.includes('?') ? '&' : '?') + 'order=created_at.desc&limit=1000';
  
  var realMethod = (method === 'UPSERT') ? 'POST' : method;
  var headers = {
    'apikey': SUPA_KEY,
    'Authorization': 'Bearer ' + SUPA_KEY,
    'Content-Type': 'application/json',
    'Accept': 'application/json',
    'X-Client-Info': 'sporcu-paneli/1.0'
  };
  if (method === 'UPSERT') headers['Prefer'] = 'resolution=merge-duplicates,return=representation';
  else if (method === 'POST') headers['Prefer'] = 'return=representation';
  else if (method === 'PATCH') headers['Prefer'] = 'return=representation';
  
  var opts = { method: realMethod, headers: headers, mode: 'cors' };
  if (data && method !== 'GET') opts.body = JSON.stringify(data);
  
  try {
    var res = await fetch(url, opts);
    if (!res.ok) {
      var err = await res.text();
      console.error('Supabase error ' + res.status + ':', err);
      return null;
    }
    var text = await res.text();
    return text ? JSON.parse(text) : [];
  } catch(e) {
    console.error('Supabase fetch error:', e.message || e);
    return null;
  }
}

async function supaGet(table, filters) { return await supa(table, 'GET', null, filters); }
async function supaPost(table, data) { return await supa(table, 'POST', data); }
async function supaUpsert(table, data) { return await supa(table, 'UPSERT', Array.isArray(data)?data:[data]); }
async function supaDelete(table, filters) {
  let url = SUPA_URL + '/rest/v1/' + table + '?';
  let params = Object.keys(filters).map(function(k){ return k + '=eq.' + encodeURIComponent(filters[k]); });
  url += params.join('&');
  var res = await fetch(url, {
    method: 'DELETE',
    headers: { 'apikey': SUPA_KEY, 'Authorization': 'Bearer ' + SUPA_KEY, 'Prefer': 'return=representation' }
  });
  return res.ok;
}
async function supaPatch(table, data, filters) {
  let url = SUPA_URL + '/rest/v1/' + table + '?';
  let params = Object.keys(filters).map(function(k){ return k + '=eq.' + encodeURIComponent(filters[k]); });
  url += params.join('&');

    body: JSON.stringify(data)
  });
  return res.ok ? await res.json() : null;
}

      supaGet('messages', {org_id: oid}),
      supaGet('settings', {org_id: oid})
    ]);
    athletes = (aths||[]).map(dbToAth);
    payments = (pays||[]).map(dbToPay);
    coaches = (coachs||[]).map(dbToCoach);
    // rebuild attData object: {date: {athleteId: status}}
    attData = {};
    (atts||[]).forEach(function(r) {
      if (!attData[r.att_date]) attData[r.att_date] = {};
      attData[r.att_date][r.athlete_id] = r.status;
    });
    messages = (msgs||[]).map(dbToMsg);
    var org = getOrgById(currentOrgId);
    settings = sets && sets[0] ? dbToSettings(sets[0]) : {schoolName: org ? org.name : 'Akademi'};
  } catch(e) {
    console.error('loadOrgData error:', e);
  }
  hideLoading();
}

function attRate(aid) {
  var total = 0, present = 0, keys = Object.keys(attData);
  for (var i = 0; i < keys.length; i++) { var day = attData[keys[i]]; if (day[aid] !== undefined) { total++; if (day[aid] === 'P') present++; } }
  return total > 0 ? Math.round(present / total * 100) : null;
}
function overdueCount() { var n = 0; for (var i = 0; i < payments.length; i++) { if (payments[i].st === 'overdue') n++; } return n; }
function pendingCount() { var n = 0; for (var i = 0; i < payments.length; i++) { if (payments[i].st === 'pending' || payments[i].st === 'overdue') n++; } return n; }

      if (users[i].email === id) { found = users[i]; break; }

    if (found) {
      // Get org to find phone - stored in org or user object
      phone = found.phone || '';

  if (entered !== _forgotCtx.code) { errEl.classList.remove('dn'); return; }

  var p1 = (document.getElementById('fp-np1')||{}).value||'';
  var p2 = (document.getElementById('fp-np2')||{}).value||'';
  var errEl = document.getElementById('fp-new-err');

function doSporcuLogin() {
  var tc = (document.getElementById('ls-tc')||{}).value || '';
  var pass = (document.getElementById('ls-pass')||{}).value || '';
  var errEl = document.getElementById('ls-err');
  tc = tc.trim(); pass = pass.trim();

  // Search all orgs for athlete with this TC
  var orgs = getAllOrgs();
  var foundAth = null, foundOrgId = null;
  for (var oi = 0; oi < orgs.length; oi++) {
    var orgId = orgs[oi].id;
    var orgAthletes = [];
    try { var v = localStorage.getItem('sp-a-' + orgId); if (v) orgAthletes = JSON.parse(v); } catch(e){}
    for (var ai = 0; ai < orgAthletes.length; ai++) {
      var a = orgAthletes[ai];
      if (a.tc === tc) {
        // Check password - stored as spPass, fallback to tc last 4 digits
        var expectedPass = a.spPass || tc.slice(-4);
        if (pass === expectedPass) { foundAth = a; foundOrgId = orgId; break; }
      }
    }
    if (foundAth) break;
  }

  if (foundAth) {
    currentSporcu = foundAth;
    currentSporcuOrgId = foundOrgId;
    // Load org data into memory for this sporcu session
    currentOrgId = foundOrgId;
    loadOrgData();
    // Show sporcu portal
    document.getElementById('login').style.display = 'none';
    document.getElementById('sporcu-portal').style.display = 'block';
    // Set name/avatar
    var av = document.getElementById('sp-avatar');
    if (av) av.textContent = (foundAth.fn[0]||'S').toUpperCase();
    var org = getOrgById(foundOrgId);
    var on = document.getElementById('sp-orgname');
    if (on && org) on.textContent = org.name;
    errEl.classList.add('dn');
    spTab('profil');
  } else {
    errEl.classList.remove('dn');
  }
}

      supaGet('users'),
      supaGet('orgs')
    ]);
    _usersCache = (allUsers||[]).map(function(u){ return {id:u.id,orgId:u.org_id,email:u.email,pass:u.pass,role:u.role,name:u.name,phone:u.phone}; });
    _orgsCache = (allOrgs||[]).map(function(o){ return {id:o.id,name:o.name}; });

    var found = null;
    for (var i = 0; i < _usersCache.length; i++) {
      if (_usersCache[i].email === e && _usersCache[i].pass === p) { found = _usersCache[i]; break; }
    }
    hideLoading();

      currentUser = found;

      await loadOrgData();
      document.getElementById('login').style.display = 'none';

      var suname = document.getElementById('suname');
      if (suname) suname.textContent = found.name || found.email.split('@')[0];
      var sava = document.getElementById('sava');
      if (sava) sava.textContent = (found.name || found.email)[0].toUpperCase();

async function saveAth(id) {
  var fn=gv('af-fn'), ln=gv('af-ln'), tc=gv('af-tc'), sp=gv('af-sp');
  if (!fn||!ln||!tc||!sp) { toast('Ad, soyad, TCKN ve spor zorunlu!','e'); return; }
  if (tc.length !== 11) { toast('TCKN 11 hane olmali!','e'); return; }
  var d = {fn:fn,ln:ln,tc:tc,bd:gv('af-bd'),gn:gv('af-gn'),ph:gv('af-ph'),em:'',sp:sp,cat:gv('af-ct'),lic:gv('af-li'),ci:gv('af-ci'),st:gv('af-st'),fee:gvn('af-fe'),pp:gv('af-pl'),pn:gv('af-pn'),pp2:gv('af-pp'),nt:gv('af-nt'),spPass:gv('af-spass')||undefined};
  showLoading();
  if (id) {
    for (var i=0;i<athletes.length;i++){if(athletes[i].id===id){athletes[i]=Object.assign({},athletes[i],d);break;}}
    await dbSaveAth(athletes.find(function(a){return a.id===id;}));
    toast('Sporcu guncellendi');
  } else {
    d.id=uid(); d.rd=tod(); athletes.unshift(d);
    await dbSaveAth(d);
    toast('Sporcu eklendi');
  }
  hideLoading(); closeModal(); go('athletes');
}

function delAth(id) {
  var a=null; for(var i=0;i<athletes.length;i++){if(athletes[i].id===id){a=athletes[i];break;}} if(!a)return;
  confirm2(a.fn+' '+a.ln+' silinsin mi?','Bu islem geri alinamaz.', async function(){
    athletes=athletes.filter(function(x){return x.id!==id;});
    await dbDelAth(id);
    toast('Sporcu silindi'); go('athletes');
  });
}

async function savePay() {
  var ds=gv('pf-ds'), am=gvn('pf-am');
  if(!ds||!am){toast('Aciklama ve tutar zorunlu!','e');return;}
  var ty=gv('pf-ty'), aid=gv('pf-at');
  var ath=null; for(var i=0;i<athletes.length;i++){if(athletes[i].id===aid){ath=athletes[i];break;}}
  var p={id:uid(),aid:aid,an:ath?(ath.fn+' '+ath.ln):'',amt:am,dt:gv('pf-dt'),dd:gv('pf-dd'),ty:ty,cat:gv('pf-ct'),ds:ds,st:gv('pf-st'),inv:(ty==='income'?'INV':'EXP')+'-'+Date.now()};
  payments.unshift(p);
  showLoading(); await dbSavePay(p); hideLoading();
  closeModal(); go('payments'); toast('Odeme kaydedildi');
}

function delPay(id){
  confirm2('Odeme silinsin mi?','Bu islem geri alinamaz.',async function(){
    payments=payments.filter(function(p){return p.id!==id;});
    await dbDelPay(id); renderPayTbl(); toast('Odeme silindi');
  });
}

async function markPaid(id){
  var p=null; for(var i=0;i<payments.length;i++){if(payments[i].id===id){payments[i].st='completed';p=payments[i];break;}}
  if(p){showLoading();await dbSavePay(p);hideLoading();}
  go(curPage); toast('Odeme tamamlandi');
}

async function approveHavale(id){
  var p=null;
  for(var i=0;i<payments.length;i++){if(payments[i].id===id){payments[i].st='completed';payments[i].needsApproval=false;payments[i].approvedBy=currentUser?currentUser.name:'Admin';payments[i].approvedAt=tod();p=payments[i];break;}}
  if(p){showLoading();await dbSavePay(p);hideLoading();}
  go(curPage); toast('Havale onaylandi!');
}

function rejectHavale(id){
  confirm2('Havale reddedilsin mi?','Odeme reddedilecek.',async function(){
    var p=null; for(var i=0;i<payments.length;i++){if(payments[i].id===id){payments[i].st='cancelled';payments[i].needsApproval=false;p=payments[i];break;}}
    if(p){showLoading();await dbSavePay(p);hideLoading();}
    go(curPage); toast('Havale reddedildi');
  });
}

function pgAccounting() {
  var months=['Ocak','Subat','Mart','Nisan','Mayis','Haziran','Temmuz','Agustos','Eylul','Ekim','Kasim','Aralik'];
  var now=new Date(), curY=now.getFullYear(), curM=now.getMonth();
  var income=0, expense=0;
  var monthly={};
  for(var i=0;i<12;i++)monthly[i]={income:0,expense:0};
  payments.forEach(function(p){
    if(p.st!=='completed')return;
    var d=new Date(p.dt);
    if(d.getFullYear()===curY){
      var m=d.getMonth();
      if(p.ty==='income'){monthly[m].income+=Number(p.amt)||0;income+=Number(p.amt)||0;}
      else{monthly[m].expense+=Number(p.amt)||0;expense+=Number(p.amt)||0;}
    }
  });
  var h='<div class="ph"><div class="stit">Muhasebe\x3C/div>\x3C/div>';
  h+='<div class="g3 mb3">';
  h+=sc('g','&#x1F4C8;',fmtN(income)+' TL','Toplam Gelir','');
  h+=sc('r','&#x1F4C9;',fmtN(expense)+' TL','Toplam Gider','');
  h+=sc('b','&#x1F4B0;',fmtN(income-expense)+' TL','Net','');
  h+='\x3C/div>';
  h+='<div class="card"><div class="tw6 mb3">'+curY+' Aylik Ozet\x3C/div><div class="tw"><table><thead><tr><th>Ay\x3C/th><th>Gelir\x3C/th><th>Gider\x3C/th><th>Net\x3C/th>\x3C/tr>\x3C/thead><tbody>';
  for(var i=11;i>=0;i--){
    var net=monthly[i].income-monthly[i].expense;
    h+='<tr'+(i===curM?' style="background:rgba(88,166,255,.06)"':'')+
      '><td class="tsm tw6">'+months[i]+'\x3C/td>'+
      '<td class="tg tsm">'+fmtN(monthly[i].income)+' TL\x3C/td>'+
      '<td class="tr2 tsm">'+fmtN(monthly[i].expense)+' TL\x3C/td>'+
      '<td class="tsm tw6 '+(net>=0?'tg':'tr2')+'">'+fmtN(net)+' TL\x3C/td>\x3C/tr>';
  }
  h+='\x3C/tbody>\x3C/table>\x3C/div>\x3C/div>';
  return h;
}

async function setAtt(aid, s) {

  else{attData[ATD][aid]=s;await dbSaveAtt(ATD,aid,s);}
  go('attendance');
}

async function markAllAtt(s) {
  if(!attData[ATD])attData[ATD]={};
  var list=athletes.filter(function(a){return a.st==='active'&&(!ATSP||a.sp===ATSP);});
  showLoading();
  for(var i=0;i<list.length;i++){attData[ATD][list[i].id]=s;await dbSaveAtt(ATD,list[i].id,s);}
  hideLoading(); go('attendance');
}

  toast('Havale bildirimi gonderildi! Admin onayini bekleyin.');
  spTab('odemeler');
}

// Forgot password - update with Supabase
async function fpSetNewPassword() {
  var p1=(document.getElementById('fp-np1')||{}).value||'';
  var p2=(document.getElementById('fp-np2')||{}).value||'';
  var errEl=document.getElementById('fp-new-err');
  function showErrFp(m){errEl.textContent=m;errEl.classList.remove('dn');}
  if(!p1){showErrFp('Sifre bos!');return;}
  if(p1!==p2){showErrFp('Sifreler eslesmiyor!');return;}
  if(p1.length<4){showErrFp('En az 4 karakter!');return;}
  showLoading();
  if(_forgotCtx.type==='admin'){
    await supaPatch('users',{pass:p1},{id:_forgotCtx.target.id});
  } else {
    await supaPatch('athletes',{sp_pass:p1},{id:_forgotCtx.target.id});
  }
  hideLoading(); _forgotCtx=null;
  var box=document.getElementById('login');
  box.innerHTML='<div class="lbox" style="max-width:400px"><div class="llogo"><div class="llogo-i">&#x2705;\x3C/div><h1 style="font-weight:800;font-size:18px">Sifre Guncellendi!\x3C/div><p style="color:var(--text3);font-size:13px;margin-top:3px">Yeni sifrenizle giris yapabilirsiniz.\x3C/p>\x3C/div><button class="btn bp w100" style="margin-top:16px" onclick="location.reload()">Giris Yap\x3C/button>\x3C/div>';
}

// Sporcu login - search Supabase
async function doSporcuLogin() {
  var tc=(document.getElementById('ls-tc')||{}).value||'';
  var pass=(document.getElementById('ls-pass')||{}).value||'';
  var errEl=document.getElementById('ls-err');
  tc=tc.trim(); pass=pass.trim();
  showLoading();
  try {
    var results=await supaGet('athletes',{tc:tc});
    hideLoading();
    var foundAth=null, foundOrgId=null;
    (results||[]).forEach(function(r){
      var expectedPass=r.sp_pass||tc.slice(-4);
      if(pass===expectedPass){foundAth=dbToAth(r);foundOrgId=r.org_id;}
    });
    if(foundAth){
      currentSporcu=foundAth; currentSporcuOrgId=foundOrgId;
      currentOrgId=foundOrgId;
      await loadOrgData();
      document.getElementById('login').style.display='none';
      document.getElementById('sporcu-portal').style.display='block';
      var av=document.getElementById('sp-avatar'); if(av)av.textContent=(foundAth.fn[0]||'S').toUpperCase();
      var orgs=await supaGet('orgs',{id:foundOrgId});
      var orgName=orgs&&orgs[0]?orgs[0].name:'Akademi';
      var on=document.getElementById('sp-orgname'); if(on)on.textContent=orgName;
      errEl.classList.add('dn');
      spTab('profil');
    } else {
      errEl.classList.remove('dn');
    }
  } catch(e){
    hideLoading(); errEl.classList.remove('dn');
  }
}
