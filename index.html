<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<meta name="theme-color" content="#080c14"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<title>Dragos Futbol Akademisi</title>
<link rel="manifest" href='data:application/json,{"name":"Dragos","short_name":"Dragos","display":"standalone","background_color":"#080c14","theme_color":"#3b82f6"}'/>
<style>
/* VARSAYILAN: KOYU TEMA */
:root {
  --bg: #080c14; --bg2: #0f1623; --bg3: #151e2d; --bg4: #1a2540;
  --border: #1e3352; --border2: #2a4a7f;
  --text: #e2e8f0; --text2: #94a3b8; --text3: #475569;
  --blue: #3b82f6; --blue2: #60a5fa;
  --green: #22c55e; --red: #ef4444; --yellow: #eab308;
  --grad: linear-gradient(135deg, var(--blue), var(--blue2));
  --grad-hover: linear-gradient(135deg, var(--blue2), #93c5fd);
  --purple: #a855f7;
}

/* YENİ: SARI - LACİVERT AÇIK TEMA */
html[data-theme="light"] {
  --bg: #f1f5f9; --bg2: #ffffff; --bg3: #f8fafc; --bg4: #e2e8f0;
  --border: #cbd5e1; --border2: #94a3b8;
  --text: #0f172a; --text2: #475569; --text3: #64748b;
  --blue: #0B225C; /* Fenerbahçe Laciverti */
  --blue2: #1e3a8a;
  --green: #16a34a; --red: #dc2626; --yellow: #d97706;
  --grad: linear-gradient(135deg, #0B225C, #1e3a8a);
  --grad-hover: linear-gradient(135deg, #1e3a8a, #0B225C);
  --purple: #9333ea;
}
html[data-theme="light"] .ni.on { color: #FFED00; /* Fenerbahçe Sarısı */ }
html[data-theme="light"] .bp { color: #FFED00; }
html[data-theme="light"] .ava { color: #FFED00; }

*{box-sizing:border-box;margin:0;padding:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;user-select:none;-webkit-tap-highlight-color:transparent}
body{background:var(--bg);color:var(--text);font-size:15px;line-height:1.5;overflow-x:hidden;transition:background 0.3s, color 0.3s;}
a{color:inherit;text-decoration:none}
button{background:none;border:none;color:inherit;cursor:pointer;font:inherit;outline:none}
input,select,textarea{font:inherit;color:inherit;background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:12px;width:100%;outline:none;transition:border-color .2s, background 0.3s;accent-color:var(--blue)}
input:focus,select:focus,textarea:focus{border-color:var(--blue)}
.dn{display:none!important}
.flex{display:flex} .fca{align-items:center} .fjb{justify-content:space-between} .fjc{justify-content:center}
.gap2{gap:8px} .gap3{gap:12px} .gap4{gap:16px} .fwrap{flex-wrap:wrap}
.tw6{font-weight:600} .tw8{font-weight:800} .tsm{font-size:14px} .ts{font-size:13px} .tm{color:var(--text2)} .tc{text-align:center}
.trunc{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.w100{width:100%} .h100{height:100%} .pr{position:relative}
.mb2{margin-bottom:8px} .mb3{margin-bottom:16px} .mt2{margin-top:8px} .mt3{margin-top:16px} .pt2{padding-top:8px}

/* YAPI */
#wrap{display:flex;height:100vh;width:100vw}
#side{width:260px;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;transition:transform .3s, background 0.3s;z-index:100}
.slogo{padding:20px;display:flex;align-items:center;gap:12px;border-bottom:1px solid var(--border)}
.slogo-icon{width:34px;height:34px;background:var(--grad);border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:18px;color:#fff;font-weight:800}
html[data-theme="light"] .slogo-icon { color: #FFED00; }
.snav{padding:16px 8px;flex:1;overflow-y:auto}
.nsec{font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin:16px 8px 8px}
.ni{display:flex;align-items:center;gap:12px;padding:10px 12px;border-radius:8px;color:var(--text2);font-weight:500;margin-bottom:2px;transition:all .2s;position:relative}
.ni svg{width:20px;height:20px;opacity:.7}
.ni:hover{background:var(--bg3);color:var(--text)}
.ni.on{background:var(--grad);color:#fff}
.ni.on svg{opacity:1}
.badge{background:var(--red);color:#fff;font-size:11px;font-weight:800;padding:2px 6px;border-radius:20px;min-width:20px;text-align:center;position:absolute;right:12px}

#main-wrap{flex:1;display:flex;flex-direction:column;min-width:0;background:var(--bg);transition:background 0.3s;}
#head{height:60px;background:var(--bg)/80;backdrop-filter:blur(10px);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 20px;z-index:50; transition:background 0.3s;}
.menu-btn{display:none;padding:8px;background:var(--bg3);border-radius:8px;border:1px solid var(--border);color:var(--text)}
.menu-btn svg{width:20px;height:20px}
#main{flex:1;overflow-y:auto;padding:24px;position:relative}

.bnav{display:none;height:65px;background:var(--bg2);border-top:1px solid var(--border);padding-bottom:env(safe-area-inset-bottom);z-index:100; transition:background 0.3s;}
.bni-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;color:var(--text2);padding:8px 0}
.bni-btn svg{width:24px;height:24px;opacity:.7;transition:all .2s}
.bni-btn span{font-size:10px;font-weight:600}
.bni-btn.on{color:var(--blue2)}
.bni-btn.on svg{opacity:1;transform:translateY(-2px)}

/* KARTLAR & MODÜLLER */
.ph{margin-bottom:24px}
.stit{font-size:24px;font-weight:800;letter-spacing:-.5px}
.ssub{color:var(--text2);font-size:14px;margin-top:4px}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:20px;margin-bottom:16px;box-shadow:0 4px 6px -1px rgba(0,0,0,.1),0 2px 4px -1px rgba(0,0,0,.06); transition:background 0.3s;}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.g21{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:16px}

.stat-card{padding:20px;position:relative;overflow:hidden;transition:transform .2s;cursor:pointer}
.stat-card:hover{transform:translateY(-2px)}
.stat-icon{width:40px;height:40px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px;margin-bottom:12px}
.stat-b .stat-icon{background:var(--blue)/20;color:var(--blue2)}
.stat-g .stat-icon{background:var(--green)/20;color:var(--green)}
.stat-r .stat-icon{background:var(--red)/20;color:var(--red)}
.stat-y .stat-icon{background:var(--yellow)/20;color:var(--yellow)}
.stat-val{font-size:24px;font-weight:800;letter-spacing:-.5px;margin-bottom:4px}
.stat-lbl{color:var(--text2);font-size:13px;font-weight:500}

.btn{padding:10px 16px;border-radius:8px;font-weight:600;font-size:14px;transition:all .2s;display:inline-flex;align-items:center;justify-content:center;gap:8px}
.btn-sm{padding:6px 12px;font-size:13px}
.btn-xs{padding:4px 8px;font-size:12px;border-radius:6px}
.bp{background:var(--grad);color:#fff;box-shadow:0 2px 10px rgba(59,130,246,.3)}
.bp:hover{background:var(--grad-hover);transform:translateY(-1px);box-shadow:0 4px 12px rgba(59,130,246,.4)}
.bs{background:var(--bg3);color:var(--text);border:1px solid var(--border)}
.bs:hover{background:var(--border);color:#fff}
html[data-theme="light"] .bs:hover { color: var(--blue); }
.bd{background:rgba(239,68,68,.1);color:var(--red);border:1px solid rgba(239,68,68,.2)}
.bd:hover{background:var(--red);color:#fff}
.bsu{background:rgba(34,197,94,.1);color:var(--green);border:1px solid rgba(34,197,94,.2)}
.bsu:hover{background:var(--green);color:#fff}

.tw table{width:100%;border-collapse:collapse;text-align:left}
.tw th{padding:12px 16px;font-size:12px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid var(--border)}
.tw td{padding:16px;border-bottom:1px solid var(--border)/50;font-size:14px}
.tw tr:last-child td{border-bottom:none}
.tw tr:hover td{background:var(--bg)/50}

.bg{padding:4px 8px;border-radius:6px;font-size:12px;font-weight:700}
.bg-g{background:rgba(34,197,94,.15);color:#4ade80}
html[data-theme="light"] .bg-g { color: #16a34a; }
.bg-r{background:rgba(239,68,68,.15);color:#f87171}
html[data-theme="light"] .bg-r { color: #dc2626; }
.bg-y{background:rgba(234,179,8,.15);color:#facc15}
html[data-theme="light"] .bg-y { color: #d97706; }
.bg-b{background:rgba(59,130,246,.15);color:#60a5fa}
html[data-theme="light"] .bg-b { color: #1d4ed8; }

.tg{color:#4ade80} html[data-theme="light"] .tg { color: #16a34a; }
.tr2{color:#f87171} html[data-theme="light"] .tr2 { color: #dc2626; }
.tb{color:#60a5fa} html[data-theme="light"] .tb { color: #1d4ed8; }

.ava{display:flex;align-items:center;justify-content:center;border-radius:50%;background:var(--grad);color:#fff;font-weight:700}
.al{padding:12px 16px;border-radius:8px;font-size:14px;display:flex;align-items:flex-start;gap:12px}
.al-y{background:rgba(234,179,8,.1);color:#facc15;border:1px solid rgba(234,179,8,.2)}
.al-r{background:rgba(239,68,68,.1);color:#f87171;border:1px solid rgba(239,68,68,.2)}
.al-g{background:rgba(34,197,94,.1);color:#4ade80;border:1px solid rgba(34,197,94,.2)}
.al-b{background:rgba(59,130,246,.1);color:#60a5fa;border:1px solid rgba(59,130,246,.2)}

/* FORMLAR & MODAL */
.fgr{display:flex;flex-direction:column;gap:6px}
.fgr label{font-size:13px;font-weight:600;color:var(--text2)}
.fs{padding:8px 12px;font-size:14px}

#modal{position:fixed;inset:0;background:rgba(0,0,0,.6);backdrop-filter:blur(4px);display:none;align-items:center;justify-content:center;z-index:999;opacity:0;transition:opacity .2s}
#modal.show{display:flex;opacity:1}
.m-box{background:var(--bg);border:1px solid var(--border);border-radius:16px;width:100%;max-width:500px;max-height:90vh;display:flex;flex-direction:column;box-shadow:0 20px 25px -5px rgba(0,0,0,.2); transition:background 0.3s;}
.m-head{padding:20px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.m-tit{font-size:18px;font-weight:800}
.m-body{padding:20px;overflow-y:auto;flex:1}
.m-foot{padding:20px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:12px;background:var(--bg2);border-radius:0 0 16px 16px; transition:background 0.3s;}

/* GİRİŞ EKRANI */
#lbox-wrap{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;padding:20px;z-index:1000; transition:background 0.3s;}
.lbox{background:var(--bg2);border:1px solid var(--border);border-radius:24px;padding:32px;width:100%;max-width:400px;box-shadow:0 20px 25px -5px rgba(0,0,0,.2); transition:background 0.3s;}
.llogo{display:flex;flex-direction:column;align-items:center;margin-bottom:32px}
.llogo-i{width:64px;height:64px;background:var(--grad);border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:32px;color:#fff;margin-bottom:16px}
html[data-theme="light"] .llogo-i { color: #FFED00; }
.lerr{background:rgba(239,68,68,.1);color:#f87171;padding:12px;border-radius:8px;font-size:13px;margin-bottom:16px;text-align:center;border:1px solid rgba(239,68,68,.2)}

/* OVERLAY & YUKLENIYOR */
#overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);backdrop-filter:blur(2px);z-index:90;display:none;opacity:0;transition:opacity .3s}
#overlay.show{display:block;opacity:1}
#loading-overlay{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999}
.spinner{width:40px;height:40px;border:3px solid var(--border);border-top-color:var(--blue);border-radius:50%;animation:spin 1s linear infinite;margin-bottom:16px}
@keyframes spin{to{transform:rotate(360deg)}}
.toast{position:fixed;bottom:20px;left:50%;transform:translate(-50%,100%);background:var(--bg3);color:var(--text);padding:12px 24px;border-radius:12px;font-size:14px;font-weight:600;box-shadow:0 10px 15px -3px rgba(0,0,0,.2);border:1px solid var(--border);z-index:10000;opacity:0;transition:all .3s}
.toast.show{transform:translate(-50%,0);opacity:1}

/* SPORCU PORTALI */
#sporcu-portal{display:none;flex-direction:column;height:100vh;background:var(--bg); transition:background 0.3s;}
.sp-head{background:var(--bg2);border-bottom:1px solid var(--border);padding:16px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50}
.sp-nav{display:flex;overflow-x:auto;padding:0 20px;background:var(--bg2);border-bottom:1px solid var(--border);scrollbar-width:none}
.sp-nav::-webkit-scrollbar{display:none}
.sp-tab{padding:16px 4px;margin-right:24px;font-size:14px;font-weight:600;color:var(--text2);border-bottom:2px solid transparent;white-space:nowrap;display:flex;align-items:center;gap:8px; cursor:pointer}
.sp-tab.on{color:var(--blue2);border-bottom-color:var(--blue2)}

#sp-content{flex:1;overflow-y:auto;padding:20px}
.profile-hero{background:linear-gradient(to bottom,var(--bg2),var(--bg));padding:32px 20px;border-radius:16px;border:1px solid var(--border);margin-bottom:20px}
.dr{display:flex;justify-content:space-between;padding:12px 0;border-bottom:1px solid var(--border)/50}
.dr:last-child{border-bottom:none}
.prb{height:8px;background:var(--bg3);border-radius:4px;overflow:hidden}
.prb div{height:100%;transition:width 1s ease}
.prb-g{background:var(--green)} .prb-y{background:var(--yellow)} .prb-r{background:var(--red)}

/* EKSTRA */
.dv{height:1px;background:var(--border);margin:20px 0}
.att-row{display:flex;align-items:center;justify-content:space-between;padding:12px;border-bottom:1px solid var(--border)/50}
.att-btns{display:flex;gap:8px}
.att-b{padding:6px 12px;border-radius:6px;font-size:12px;font-weight:600;background:var(--bg3);border:1px solid var(--border);color:var(--text2)}
.att-b.ap{background:rgba(34,197,94,.1);color:var(--green);border-color:rgba(34,197,94,.3)}
.att-b.aa{background:rgba(239,68,68,.1);color:var(--red);border-color:rgba(239,68,68,.3)}
.att-b.al2{background:rgba(234,179,8,.1);color:var(--yellow);border-color:rgba(234,179,8,.3)}

.quick-actions{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
.qa-btn{background:var(--bg3);border:1px solid var(--border);border-radius:12px;padding:16px 8px;display:flex;flex-direction:column;align-items:center;gap:8px;transition:all .2s}
.qa-btn:hover{background:var(--bg4);transform:translateY(-2px)}
.qa-icon{font-size:24px}
.qa-lbl{font-size:11px;font-weight:700;color:var(--text);text-transform:uppercase;letter-spacing:.5px}

/* Theme & Lang Toggles */
.head-toggles { display: flex; align-items: center; gap: 8px; margin-right: 12px; }
.ht-btn { background: var(--bg3); border: 1px solid var(--border); color: var(--text); border-radius: 8px; padding: 6px 10px; font-size: 14px; font-weight: bold; cursor: pointer; transition: all 0.2s; }
.ht-btn:hover { background: var(--border); }

@media (max-width:768px){
    .g2,.g3,.g4,.g21,.quick-actions{grid-template-columns:1fr}
    #side{position:fixed;top:0;bottom:0;left:0;transform:translateX(-100%);box-shadow:none}
    #side.open{transform:translateX(0);box-shadow:10px 0 30px rgba(0,0,0,.5)}
    .menu-btn{display:block}
    .bnav{display:flex}
    .snav{display:none}
    #main{padding:16px}
    .m-box{height:100%;max-height:100%;border-radius:0;border:none}
    .m-foot{border-radius:0;padding-bottom:env(safe-area-inset-bottom,20px)}
    .head-toggles { margin-right: 0; }
}
</style>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
</head>
<body>

<div id="loading-overlay" style="display:none">
    <div class="spinner"></div>
    <div style="font-weight:600;color:var(--text2)" data-i18n="loading">Yükleniyor...</div>
</div>

<div id="modal">
    <div class="m-box">
        <div class="m-head">
            <div class="m-tit" id="modal-title">Başlık</div>
            <button class="menu-btn" onclick="closeModal()" style="display:block;padding:4px;border:none"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg></button>
        </div>
        <div class="m-body" id="modal-body"></div>
        <div class="m-foot" id="modal-footer"></div>
    </div>
</div>

<div id="lbox-wrap">
    <div class="lbox">
        <div class="llogo">
            <div class="llogo-i" style="background-image:url('/assets/logo.png');background-size:cover;background-position:center;border:2px solid var(--border)"></div>
            <h1 style="font-size:24px;font-weight:800;letter-spacing:-.5px;text-align:center">Dragos Futbol Akademisi</h1>
            <p style="color:var(--text2);font-size:14px;margin-top:4px">Kayıt ve Yönetim Sistemi</p>
        </div>
        
        <div id="login-admin" class="dn">
            <div class="al al-y mb3" style="font-size:12px">🔒 Yönetici Giriş Modu Aktif</div>
            <div class="fgr mb2"><label>Yönetici E-posta</label><input id="le" type="email" placeholder="admin@spor.com"/></div>
            <div class="fgr mb3"><label>Şifre</label><input id="lp" type="password" placeholder="••••••••"/></div>
            <div id="lerr" class="lerr dn"></div>
            <button class="btn bp w100 mb2" style="padding:14px;font-size:15px" onclick="doLogin()">Yönetici Olarak Gir</button>
        </div>

        <div id="login-sporcu">
            <div class="fgr mb2"><label>TC Kimlik No</label><input id="ls-tc" type="tel" maxlength="11" placeholder="11 Haneli TC Giriniz"/></div>
            <div class="fgr mb3"><label>Sistem Şifresi</label><input id="ls-pass" type="password" placeholder="TC Son 4 Hane veya Şifre"/></div>
            <div id="ls-err" class="lerr dn">Kayıt bulunamadı veya şifre hatalı!</div>
            <button class="btn bp w100" style="padding:14px;font-size:15px" onclick="doNormalLogin()">Giriş Yap</button>
        </div>
    </div>
</div>

<div id="sporcu-portal">
    <div class="sp-head">
        <div class="flex fca gap3">
            <div class="ava" style="width:40px;height:40px" id="sp-avatar"></div>
            <div><div class="tw6" id="sp-name">İsim Soyisim</div><div class="ts tm" id="sp-orgname">Dragos Futbol Akademisi</div></div>
        </div>
        <div class="flex fca gap2">
            <button id="sp-theme-btn" class="ht-btn" onclick="toggleTheme()" style="font-size:16px;">🌙</button>
            <button class="btn bs btn-sm" onclick="doSporcuLogout()" data-i18n="btnLogout">Çıkış</button>
        </div>
    </div>
    <div class="sp-nav">
        <div class="sp-tab on" onclick="spTab('profil')" data-i18n="spProfil">Profil</div>
        <div class="sp-tab" onclick="spTab('yoklama')" data-i18n="spYoklama">Yoklama</div>
        <div class="sp-tab" onclick="spTab('odemeler')" data-i18n="spOdemeler">Ödemeler</div>
        <div class="sp-tab" onclick="spTab('odeme-yap')" data-i18n="spOdemeYap">Ödeme Yap</div>
    </div>
    <div id="sp-content"></div>
</div>

<div id="wrap" class="dn">
    <div id="overlay" onclick="closeSide()"></div>
    
    <div id="side">
        <div class="slogo">
          <div class="slogo-icon" id="side-logo-icon">&#x26BD;</div>
          <img id="side-logo-img" style="display:none;height:34px;border-radius:9px;object-fit:contain" src="" alt="Logo"/>
          <div><div style="font-weight:700;font-size:13px" id="sn">Dragos Akademisi</div><div style="font-size:11px;color:var(--text3)" id="sn2">Yönetim</div></div>
        </div>
        <nav class="snav">
