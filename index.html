<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dragos Futbol Akademisi | Yönetim Paneli</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg: #080c14; --bg2: #0f1623; --bg3: #151e2d; --bg4: #1a2540;
            --border: #1e3352; --text: #e2e8f0; --text2: #94a3b8; --text3: #475569;
            --blue: #3b82f6; --blue2: #60a5fa; --green: #22c55e; --red: #ef4444; --yellow: #eab308;
            --grad: linear-gradient(135deg, var(--blue), var(--blue2));
        }
        [data-theme="light"] {
            --bg: #f1f5f9; --bg2: #ffffff; --bg3: #f8fafc; --bg4: #e2e8f0;
            --border: #cbd5e1; --text: #0f172a; --text2: #475569; --text3: #64748b;
            --blue: #0B225C; --blue2: #1e3a8a;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', -apple-system, sans-serif; }
        body { background: var(--bg); color: var(--text); overflow-x: hidden; transition: 0.3s; }
        .dn { display: none !important; }
        .flex { display: flex; } .fca { align-items: center; } .fjb { justify-content: space-between; } .fjc { justify-content: center; }
        .gap2 { gap: 8px; } .gap3 { gap: 12px; } .gap4 { gap: 16px; } .mb3 { margin-bottom: 16px; } .mt3 { margin-top: 16px; }
        
        #wrap { display: flex; height: 100vh; width: 100vw; }
        #side { width: 260px; background: var(--bg2); border-right: 1px solid var(--border); display: flex; flex-direction: column; z-index: 1000; transition: 0.3s; }
        .slogo { padding: 20px; display: flex; align-items: center; gap: 12px; border-bottom: 1px solid var(--border); }
        .slogo-icon { width: 40px; height: 40px; background: var(--grad); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 20px; color: #fff; }
        .snav { padding: 16px 8px; flex: 1; overflow-y: auto; }
        .nsec { font-size: 11px; font-weight: 700; color: var(--text3); text-transform: uppercase; margin: 16px 8px 8px; letter-spacing: 0.5px; }
        .ni { display: flex; align-items: center; gap: 12px; padding: 10px 12px; border-radius: 8px; color: var(--text2); font-weight: 500; margin-bottom: 2px; width: 100%; cursor: pointer; border: none; background: none; text-align: left; transition: 0.2s; }
        .ni:hover { background: var(--bg3); color: var(--text); }
        .ni.on { background: var(--grad); color: #fff; box-shadow: 0 4px 12px rgba(59, 130, 246, 0.2); }
        
        #main-wrap { flex: 1; display: flex; flex-direction: column; min-width: 0; background: var(--bg); }
        #head { height: 60px; background: var(--bg2); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 24px; }
        #main { flex: 1; overflow-y: auto; padding: 24px; }

        .card { background: var(--bg2); border: 1px solid var(--border); border-radius: 16px; padding: 24px; margin-bottom: 24px; }
        .stat-card { text-align: center; border-bottom: 4px solid var(--blue); }
        .stat-card h2 { font-size: 32px; font-weight: 800; margin-bottom: 4px; }
        
        .btn { padding: 10px 18px; border-radius: 8px; font-weight: 600; font-size: 14px; cursor: pointer; display: inline-flex; align-items: center; gap: 8px; border: none; transition: 0.2s; }
        .bp { background: var(--grad); color: #fff; }
        .bs { background: var(--bg3); color: var(--text); border: 1px solid var(--border); }
        .bd { background: rgba(239, 68, 68, 0.1); color: var(--red); border: 1px solid var(--red); }
        
        .tw { overflow-x: auto; width: 100%; }
        .tw table { width: 100%; border-collapse: collapse; min-width: 600px; }
        .tw th { padding: 14px; font-size: 12px; color: var(--text2); border-bottom: 1px solid var(--border); text-align: left; text-transform: uppercase; }
        .tw td { padding: 16px; border-bottom: 1px solid var(--border); font-size: 14px; }
        
        #lbox-wrap { position: fixed; inset: 0; background: var(--bg); display: flex; align-items: center; justify-content: center; z-index: 10000; }
        .lbox { background: var(--bg2); border: 1px solid var(--border); border-radius: 24px; padding: 40px; width: 100%; max-width: 420px; text-align: center; }
        .ltabs { display: flex; background: var(--bg); padding: 4px; border-radius: 12px; margin-bottom: 24px; }
        .ltab { flex: 1; padding: 12px; font-size: 14px; font-weight: 600; color: var(--text2); border-radius: 8px; cursor: pointer; }
        .ltab.on { background: var(--bg2); color: var(--text); }
        input, select, textarea { padding: 14px; border-radius: 10px; background: var(--bg3); border: 1px solid var(--border); color: #fff; width: 100%; outline: none; margin-bottom: 16px; }
        
        #modal { position: fixed; inset: 0; background: rgba(0,0,0,0.8); display: none; align-items: center; justify-content: center; z-index: 20000; backdrop-filter: blur(4px); }
        #modal.show { display: flex; }
        .m-box { background: var(--bg2); border: 1px solid var(--border); border-radius: 20px; width: 90%; max-width: 550px; padding: 30px; }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<div id="lbox-wrap">
    <div class="lbox">
        <div class="slogo-icon" style="margin: 0 auto 20px; width: 60px; height: 60px; font-size: 30px;">⚽</div>
        <h2 class="mb3">Dragos Futbol Akademisi</h2>
        <div class="ltabs" id="login-tabs">
            <div class="ltab on" onclick="switchLoginTab('sporcu')">Sporcu/Veli</div>
            <div class="ltab" onclick="switchLoginTab('coach')">Antrenör</div>
        </div>
        <div id="login-admin" class="dn">
            <input id="le" type="email" placeholder="Yönetici E-posta">
            <input id="lp" type="password" placeholder="Şifre">
            <button class="btn bp w100" onclick="doLogin()" style="width: 100%;">Yönetici Girişi</button>
        </div>
        <div id="login-sporcu">
            <input id="ls-tc" type="tel" maxlength="11" placeholder="Sporcu TC Kimlik">
            <input id="ls-pass" type="password" placeholder="Şifre (TC Son 4)">
            <button class="btn bp w100" onclick="doNormalLogin('sporcu')" style="width: 100%;">Sporcu Portalı Girişi</button>
        </div>
        <div id="login-coach" class="dn">
            <input id="lc-tc" type="tel" maxlength="11" placeholder="Antrenör TC Kimlik">
            <input id="lc-pass" type="password" placeholder="Antrenör Şifresi">
            <button class="btn bp w100" onclick="doNormalLogin('coach')" style="width: 100%;">Eğitmen Girişi</button>
        </div>
        <div class="flex fjc gap4 mt3 ts tm" style="border-top: 1px solid var(--border); padding-top: 20px;">
            <a href="javascript:void(0)" onclick="showLegal('kvkk')">KVKK Aydınlatma</a>
            <a href="javascript:void(0)" onclick="showLegal('kullanim')">Kullanım Sözleşmesi</a>
        </div>
    </div>
</div>

<div id="wrap" class="dn">
    <div id="side">
        <div class="slogo">
            <div class="slogo-icon">⚽</div>
            <div style="font-weight: 800; font-size: 18px; letter-spacing: -0.5px;">DRAGOS PRO</div>
        </div>
        <nav class="snav">
            <div class="nsec">Ana Menü</div>
            <button class="ni on" id="ni-dashboard" onclick="go('dashboard')"><i class="fa-solid fa-chart-pie"></i><span>Gösterge Paneli</span></button>
            <button class="ni" id="ni-athletes" onclick="go('athletes')"><i class="fa-solid fa-users"></i><span>Sporcu Listesi</span></button>
            <button class="ni" id="ni-attendance" onclick="go('attendance')"><i class="fa-solid fa-calendar-check"></i><span>Yoklama Takibi</span></button>
            <button class="ni" id="ni-coaches" onclick="go('coaches')"><i class="fa-solid fa-user-tie"></i><span>Antrenörler</span></button>
            
            <div class="nsec" id="sec-finance">Yönetim & Muhasebe</div>
            <button class="ni" id="ni-payments" onclick="go('payments')"><i class="fa-solid fa-credit-card"></i><span>Aidat / Ödemeler</span></button>
            <button class="ni" id="ni-accounting" onclick="go('accounting')"><i class="fa-solid fa-file-invoice-dollar"></i><span>Finansal Rapor</span></button>
            <button class="ni" id="ni-branches" onclick="go('branches')"><i class="fa-solid fa-building"></i><span>Şube Yönetimi</span></button>
            <button class="ni" id="ni-announcements" onclick="go('announcements')"><i class="fa-solid fa-bullhorn"></i><span>Duyuru Yayınla</span></button>
            <button class="ni" id="ni-sms" onclick="go('sms')"><i class="fa-solid fa-comment-sms"></i><span>Toplu SMS</span></button>
            
            <div class="nsec" id="sec-platform">Platform Güvenliği</div>
            <button class="ni" id="ni-org-manage" onclick="go('org-manage')"><i class="fa-solid fa-shield-halved"></i><span>Kurum Yönetimi</span></button>
            <button class="ni" id="ni-settings" onclick="go('settings')"><i class="fa-solid fa-gears"></i><span>Sistem Ayarları</span></button>
            
            <div style="margin-top: auto; padding: 20px; border-top: 1px solid var(--border);">
                <div class="flex fca gap2 mb3">
                    <div style="width: 32px; height: 32px; border-radius: 50%; background: var(--grad); display: flex; align-items: center; justify-content: center; font-weight: 700;" id="user-init">A</div>
                    <div id="suname" style="font-weight: 700; font-size: 13px;">Kullanıcı</div>
                </div>
                <button onclick="doLogout()" class="ni" style="color: var(--red);"><i class="fa-solid fa-power-off"></i><span>Oturumu Kapat</span></button>
            </div>
        </nav>
    </div>

    <div id="main-wrap">
        <header id="head">
            <div class="flex fca gap3">
                <button class="btn bs" id="side-toggle" style="padding: 8px;"><i class="fa-solid fa-bars"></i></button>
                <div class="tw6" id="bar-title" style="font-size: 18px;">Dashboard</div>
            </div>
            <div class="flex fca gap4">
                <div id="live-clock" class="ts tm">22:00:00</div>
                <button class="btn bs" onclick="toggleTheme()" style="padding: 10px;"><i class="fa-solid fa-moon"></i></button>
            </div>
        </header>
        <main id="main"></main>
    </div>
</div>

<div id="modal">
    <div class="m-box">
        <div class="fjb flex mb3">
            <h3 id="modal-title">Başlık</h3>
            <button onclick="closeModal()" style="background:none; border:none; color:var(--text2); font-size:24px; cursor:pointer;">&times;</button>
        </div>
        <div id="modal-body" class="mb3 ts tm" style="line-height: 1.6;"></div>
        <div id="modal-footer" class="flex fjb gap3"></div>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
