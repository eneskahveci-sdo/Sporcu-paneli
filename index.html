<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<title>Dragos Futbol Akademisi | Yönetim Paneli</title>
<style>
:root {
  --bg: #080c14; --bg2: #0f1623; --bg3: #151e2d; --bg4: #1a2540;
  --border: #1e3352; --text: #e2e8f0; --text2: #94a3b8; --text3: #475569;
  --blue: #3b82f6; --blue2: #60a5fa; --green: #22c55e; --red: #ef4444; --yellow: #eab308;
  --grad: linear-gradient(135deg, var(--blue), var(--blue2));
}
html[data-theme="light"] {
  --bg: #f1f5f9; --bg2: #ffffff; --bg3: #f8fafc; --bg4: #e2e8f0;
  --border: #cbd5e1; --text: #0f172a; --text2: #475569; --text3: #64748b;
  --blue: #0B225C; --blue2: #1e3a8a;
}
*{box-sizing:border-box;margin:0;padding:0;font-family:-apple-system,system-ui,sans-serif;}
body{background:var(--bg);color:var(--text);overflow-x:hidden;transition:0.3s;}
.dn{display:none!important} .flex{display:flex} .fca{align-items:center} .fjb{justify-content:space-between} .fjc{justify-content:center}
.gap2{gap:8px} .gap3{gap:12px} .gap4{gap:16px} .mb3{margin-bottom:16px} .mt3{margin-top:16px}
.tw6{font-weight:600} .tsm{font-size:14px} .ts{font-size:13px} .tm{color:var(--text2)}

#wrap{display:flex;height:100vh;width:100vw}
#side{width:260px;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;z-index:100;transition:0.3s}
.slogo{padding:20px;display:flex;align-items:center;gap:12px;border-bottom:1px solid var(--border)}
.slogo-icon{width:34px;height:34px;background:var(--grad);border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:18px;color:#fff;font-weight:800}
.snav{padding:16px 8px;flex:1;overflow-y:auto}
.nsec{font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;margin:16px 8px 8px}
.ni{display:flex;align-items:center;gap:12px;padding:10px 12px;border-radius:8px;color:var(--text2);font-weight:500;margin-bottom:2px;width:100%;cursor:pointer;transition:0.2s;border:none;background:none;text-align:left}
.ni:hover{background:var(--bg3);color:var(--text)}
.ni.on{background:var(--grad);color:#fff}

#main-wrap{flex:1;display:flex;flex-direction:column;min-width:0;background:var(--bg)}
#head{height:60px;background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 20px}
#main{flex:1;overflow-y:auto;padding:24px}

.card{background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:20px;margin-bottom:16px}
.btn{padding:10px 16px;border-radius:8px;font-weight:600;font-size:14px;cursor:pointer;display:inline-flex;align-items:center;gap:8px;border:none}
.bp{background:var(--grad);color:#fff}
.bs{background:var(--bg3);color:var(--text);border:1px solid var(--border)}
.bd{background:rgba(239,68,68,0.1);color:var(--red);border:1px solid var(--red)}

.tw table{width:100%;border-collapse:collapse}
.tw th{padding:12px;font-size:12px;color:var(--text2);border-bottom:1px solid var(--border);text-align:left}
.tw td{padding:14px;border-bottom:1px solid var(--border);font-size:14px}

/* Giriş Ekranı */
#lbox-wrap{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:1000}
.lbox{background:var(--bg2);border:1px solid var(--border);border-radius:24px;padding:32px;width:100%;max-width:400px;text-align:center}
.ltabs{display:flex;background:var(--bg);padding:4px;border-radius:12px;margin-bottom:24px}
.ltab{flex:1;padding:10px;font-size:13px;font-weight:600;color:var(--text2);border-radius:8px;cursor:pointer}
.ltab.on{background:var(--bg2);color:var(--text)}
.fgr{display:flex;flex-direction:column;gap:6px;text-align:left;margin-bottom:12px}
input{padding:12px;border-radius:8px;background:var(--bg3);border:1px solid var(--border);color:#fff;width:100%}

#modal{position:fixed;inset:0;background:rgba(0,0,0,0.7);display:none;align-items:center;justify-content:center;z-index:2000}
#modal.show{display:flex}
.m-box{background:var(--bg2);border:1px solid var(--border);border-radius:16px;width:90%;max-width:500px;padding:20px}

@media (max-width:768px){ #side{display:none} }
</style>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<div id="lbox-wrap">
    <div class="lbox">
        <h2 style="margin-bottom:8px">Dragos Futbol Akademisi</h2>
        <p class="tm ts mb3">Yönetim ve Kayıt Sistemi</p>
        
        <div class="ltabs" id="login-tabs">
            <div class="ltab on" onclick="switchLoginTab('sporcu')">Sporcu/Veli</div>
            <div class="ltab" onclick="switchLoginTab('coach')">Antrenör</div>
        </div>

        <div id="login-admin" class="dn">
            <div class="fgr"><label>Yönetici E-posta</label><input id="le" type="email"/></div>
            <div class="fgr"><label>Şifre</label><input id="lp" type="password"/></div>
            <button class="btn bp w100" onclick="doLogin()" style="width:100%">Yönetici Girişi</button>
        </div>

        <div id="login-sporcu">
            <div class="fgr"><label>Sporcu TC No</label><input id="ls-tc" type="tel"/></div>
            <div class="fgr"><label>Şifre</label><input id="ls-pass" type="password"/></div>
            <button class="btn bp w100" onclick="doNormalLogin('sporcu')" style="width:100%">Giriş Yap</button>
        </div>

        <div id="login-coach" class="dn">
            <div class="fgr"><label>Antrenör TC No</label><input id="lc-tc" type="tel"/></div>
            <div class="fgr"><label>Şifre</label><input id="lc-pass" type="password"/></div>
            <button class="btn bp w100" onclick="doNormalLogin('coach')" style="width:100%">Antrenör Girişi</button>
        </div>

        <div class="flex fjc gap4 mt3 ts tm">
            <a href="#" onclick="showLegal('kvkk')">KVKK Metni</a>
            <a href="#" onclick="showLegal('kullanim')">Sözleşme</a>
        </div>
    </div>
</div>

<div id="wrap" class="dn">
    <div id="side">
        <div class="slogo">
            <div class="slogo-icon">⚽</div>
            <div class="tw6">Dragos Panel</div>
        </div>
        <nav class="snav">
            <div class="nsec">Ana Menü</div>
            <button class="ni on" id="ni-dashboard" onclick="go('dashboard')"><span>Gösterge</span></button>
            <button class="ni" id="ni-athletes" onclick="go('athletes')"><span>Sporcular</span></button>
            <button class="ni" id="ni-attendance" onclick="go('attendance')"><span>Yoklama</span></button>
            <button class="ni" id="ni-coaches" onclick="go('coaches')"><span>Antrenörler</span></button>
            
            <div class="nsec" id="sec-finance">Yönetim (Muhasebe)</div>
            <button class="ni" id="ni-payments" onclick="go('payments')"><span>Ödemeler</span></button>
            <button class="ni" id="ni-accounting" onclick="go('accounting')"><span>Finans / Rapor</span></button>
            <button class="ni" id="ni-branches" onclick="go('branches')"><span>Şubeler</span></button>
            <button class="ni" id="ni-announcements" onclick="go('announcements')"><span>Duyurular</span></button>
            
            <div class="nsec" id="sec-platform">Platform</div>
            <button class="ni" id="ni-org-manage" onclick="go('org-manage')"><span>Kurum Yönetimi</span></button>

            <div class="nsec" id="sec-sys">Sistem</div>
            <button class="ni" id="ni-settings" onclick="go('settings')"><span>Ayarlar</span></button>
            
            <div style="margin-top:20px; padding:10px; border-top:1px solid var(--border)">
                <div class="ts tw6" id="suname">Kullanıcı</div>
                <button onclick="doLogout()" class="ts tm" style="border:none;background:none;cursor:pointer">Çıkış Yap</button>
            </div>
        </nav>
    </div>

    <div id="main-wrap">
        <header id="head">
            <div class="tw6" id="bar-title">Dashboard</div>
            <button class="btn bs btn-sm" onclick="toggleTheme()">🌙/☀️</button>
        </header>
        <main id="main"></main>
    </div>
</div>

<div id="modal">
    <div class="m-box">
        <h3 id="modal-title" style="margin-bottom:15px">Başlık</h3>
        <div id="modal-body" class="mb3 ts tm"></div>
        <div id="modal-footer" class="flex fjb"></div>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
