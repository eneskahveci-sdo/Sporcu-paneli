<style>
:root{--bg:#080c14;--bg2:#0f1623;--bg3:#151e2d;--bg4:#1a2540;--border:#1e3352;--border2:#2a4a7f;--text:#e2e8f0;--text2:#94a3b8;--text3:#475569;--blue:#3b82f6;--blue2:#60a5fa;--green:#22c55e;--red:#ef4444;--yellow:#f59e0b;--purple:#a855f7;--cyan:#06b6d4;--grad:linear-gradient(135deg,#3b82f6,#8b5cf6);--grad2:linear-gradient(135deg,#22c55e,#06b6d4);--shadow:0 4px 24px rgba(0,0,0,.4);--shadow2:0 8px 32px rgba(59,130,246,.2)}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:14px;height:100vh;overflow:hidden;display:flex;flex-direction:column}
::-webkit-scrollbar{width:4px;height:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--border2);border-radius:4px}
input,select,textarea{background:var(--bg3);border:1.5px solid var(--border);border-radius:10px;color:var(--text);font-size:14px;padding:10px 13px;width:100%;outline:none;font-family:inherit;transition:.2s}
input:focus,select:focus,textarea:focus{border-color:var(--blue);background:var(--bg4);box-shadow:0 0 0 3px rgba(59,130,246,.12)}
textarea{resize:vertical;min-height:80px}
label{display:block;font-size:11px;color:var(--text2);margin-bottom:5px;font-weight:700;letter-spacing:.5px;text-transform:uppercase}
.btn{border:none;border-radius:10px;cursor:pointer;font-size:13px;font-weight:600;padding:9px 16px;transition:.15s;letter-spacing:.2px;white-space:nowrap}
.bp{background:var(--grad);color:#fff;box-shadow:var(--shadow2)}.bp:active{transform:scale(.96)}
.bs{background:var(--bg3);color:var(--text);border:1.5px solid var(--border)}.bs:hover{border-color:var(--blue2)}
.bd{background:rgba(239,68,68,.1);color:var(--red);border:1.5px solid rgba(239,68,68,.2)}.bd:hover{background:rgba(239,68,68,.2)}
.bsu{background:rgba(34,197,94,.1);color:var(--green);border:1.5px solid rgba(34,197,94,.2)}.bsu:hover{background:rgba(34,197,94,.2)}
.by{background:rgba(245,158,11,.1);color:var(--yellow);border:1.5px solid rgba(245,158,11,.2)}
.btn-sm{padding:6px 12px;font-size:12px;border-radius:8px}.btn-xs{padding:3px 9px;font-size:11px;border-radius:6px}
.w100{width:100%}
.card{background:var(--bg2);border:1.5px solid var(--border);border-radius:16px;padding:16px;transition:.2s}
.dv{height:1px;background:var(--border);margin:12px 0}.dn{display:none!important}
.flex{display:flex}.fca{align-items:center}.fjb{justify-content:space-between}.fwrap{flex-wrap:wrap}
.gap1{gap:6px}.gap2{gap:10px}.gap3{gap:14px}.gap4{gap:20px}
.mb2{margin-bottom:8px}.mb3{margin-bottom:14px}.mt2{margin-top:8px}.mt3{margin-top:14px}
.tw{overflow-x:auto}.tw table{width:100%;border-collapse:collapse;border:1.5px solid var(--border);border-radius:12px;overflow:hidden}
.tw th,.tw td{padding:11px 13px;text-align:left;border-bottom:1px solid var(--border);white-space:nowrap}
.tw th{font-size:11px;color:var(--text3);font-weight:700;text-transform:uppercase;letter-spacing:.5px;background:var(--bg3)}
.tw td{font-size:13px}.tw tr:last-child td{border-bottom:none}.tw tr:hover td{background:rgba(59,130,246,.03)}
.tsm{font-size:12px}.ts{font-size:11px}.tm{color:var(--text2)}.tw6{font-weight:600}
.tg{color:var(--green)}.tr2{color:var(--red)}.ty{color:var(--yellow)}.tb{color:var(--blue2)}.tp{color:var(--purple)}
.trunc{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.bg{font-size:11px;padding:3px 9px;border-radius:20px;font-weight:700;white-space:nowrap}
.bg-g{background:rgba(34,197,94,.12);color:var(--green);border:1px solid rgba(34,197,94,.2)}
.bg-r{background:rgba(239,68,68,.12);color:var(--red);border:1px solid rgba(239,68,68,.2)}
.bg-y{background:rgba(245,158,11,.12);color:var(--yellow);border:1px solid rgba(245,158,11,.2)}
.bg-b{background:rgba(59,130,246,.12);color:var(--blue2);border:1px solid rgba(59,130,246,.2)}
.bg-p{background:rgba(168,85,247,.12);color:var(--purple);border:1px solid rgba(168,85,247,.2)}
.ava{width:36px;height:36px;border-radius:50%;background:var(--grad);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;flex-shrink:0;box-shadow:0 2px 8px rgba(59,130,246,.25)}
.stat-card{cursor:pointer;transition:.2s;position:relative;overflow:hidden}.stat-card:active{transform:scale(.97)}
.stat-icon{font-size:24px;margin-bottom:8px}.stat-val{font-size:22px;font-weight:800;margin-bottom:3px}.stat-lbl{font-size:12px;color:var(--text2)}
.stat-b{border-color:rgba(59,130,246,.3);background:linear-gradient(135deg,var(--bg2),rgba(59,130,246,.06))}
.stat-g{border-color:rgba(34,197,94,.3);background:linear-gradient(135deg,var(--bg2),rgba(34,197,94,.06))}
.stat-r{border-color:rgba(239,68,68,.3);background:linear-gradient(135deg,var(--bg2),rgba(239,68,68,.06))}
.stat-y{border-color:rgba(245,158,11,.3);background:linear-gradient(135deg,var(--bg2),rgba(245,158,11,.06))}
.al{border-radius:10px;padding:10px 14px;font-size:13px;margin-bottom:12px}
.al-r{background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.2);color:var(--red)}
.al-y{background:rgba(245,158,11,.08);border:1px solid rgba(245,158,11,.2);color:var(--yellow)}
.al-g{background:rgba(34,197,94,.08);border:1px solid rgba(34,197,94,.2);color:var(--green)}
.al-b{background:rgba(59,130,246,.08);border:1px solid rgba(59,130,246,.2);color:var(--blue2)}
.fg{display:grid;grid-template-columns:1fr 1fr;gap:12px}.fgr{display:flex;flex-direction:column}.fgr.full{grid-column:1/-1}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
.g21{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.filters{display:flex;gap:8px;flex-wrap:wrap}
.fs{background:var(--bg3);border:1.5px solid var(--border);border-radius:10px;color:var(--text);font-size:13px;padding:8px 11px;flex:1;min-width:120px;outline:none;transition:.2s}
.fs:focus{border-color:var(--blue)}
.att-row{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--border)}
.att-row:last-child{border-bottom:none}
.att-btns{display:flex;gap:4px}
.att-b{border:1.5px solid var(--border);background:var(--bg3);color:var(--text2);border-radius:7px;padding:5px 9px;font-size:11px;font-weight:700;cursor:pointer;transition:.15s}
.att-b.ap{background:rgba(34,197,94,.15);border-color:var(--green);color:var(--green)}
.att-b.aa{background:rgba(239,68,68,.15);border-color:var(--red);color:var(--red)}
.att-b.al2{background:rgba(245,158,11,.15);border-color:var(--yellow);color:var(--yellow)}
.pr{height:6px;background:var(--bg3);border-radius:3px;overflow:hidden}
.prb{height:100%;border-radius:3px;transition:.5s}
.prb-g{background:linear-gradient(90deg,#16a34a,var(--green))}.prb-y{background:linear-gradient(90deg,#d97706,var(--yellow))}.prb-r{background:linear-gradient(90deg,#dc2626,var(--red))}
.dr{display:flex;align-items:center;justify-content:space-between;padding:9px 0;border-bottom:1px solid var(--border)}
.dr:last-child{border-bottom:none}.dl{font-size:13px}.dvl{font-size:14px}
.ph{margin-bottom:18px}.stit{font-size:20px;font-weight:800;letter-spacing:-.3px}.ssub{font-size:13px;color:var(--text2);margin-top:3px}
.sh{display:flex;align-items:center;justify-content:space-between}
.toast{position:fixed;bottom:88px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--bg3);border:1.5px solid var(--border);border-radius:12px;padding:11px 20px;font-size:13px;font-weight:600;z-index:9999;opacity:0;transition:.25s;white-space:nowrap;pointer-events:none;box-shadow:var(--shadow)}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.toast-e{border-color:rgba(239,68,68,.4);color:var(--red)}.toast-g{border-color:rgba(34,197,94,.4);color:var(--green)}
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:500;align-items:flex-end;justify-content:center}
.modal-bg.show{display:flex}
.modal-box{background:var(--bg2);border:1.5px solid var(--border);border-radius:20px 20px 0 0;width:100%;max-width:600px;max-height:92vh;display:flex;flex-direction:column}
.modal-hd{padding:16px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.modal-body{padding:16px 18px;overflow-y:auto;flex:1}
.modal-ft{padding:13px 18px;border-top:1px solid var(--border);display:flex;gap:8px;justify-content:flex-end;flex-shrink:0}
.modal-x{background:var(--bg3);border:1px solid var(--border);color:var(--text2);font-size:16px;cursor:pointer;padding:4px 9px;border-radius:8px}
#wrap{display:flex;flex-direction:column;flex:1;overflow:hidden}
#side{position:fixed;left:-270px;top:0;bottom:0;width:260px;background:var(--bg2);border-right:1.5px solid var(--border);z-index:200;transition:.28s cubic-bezier(.4,0,.2,1);overflow-y:auto;display:flex;flex-direction:column}
#side.open{left:0;box-shadow:4px 0 40px rgba(0,0,0,.6)}
#overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:150}
#overlay.show{display:block}
.slogo{padding:18px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px}
.slogo-icon{width:38px;height:38px;background:var(--grad);border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.snav{padding:10px 8px;flex:1}
.nsec{font-size:10px;color:var(--text3);font-weight:700;padding:10px 10px 5px;text-transform:uppercase;letter-spacing:1px}
.ni{display:flex;align-items:center;gap:10px;width:100%;padding:10px 11px;border-radius:10px;border:none;background:none;color:var(--text2);font-size:13px;font-weight:500;cursor:pointer;text-align:left;transition:.15s;margin-bottom:2px}
.ni svg{width:17px;height:17px;flex-shrink:0}
.ni:hover{background:rgba(59,130,246,.08);color:var(--text)}
.ni.on{background:rgba(59,130,246,.12);color:var(--blue2);font-weight:600}
.ni .badge{margin-left:auto;background:var(--red);color:#fff;border-radius:10px;padding:1px 6px;font-size:10px;font-weight:700}
#main{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:16px}
#bar{display:flex;align-items:center;gap:10px;padding:11px 16px;background:rgba(8,12,20,.95);border-bottom:1.5px solid var(--border);flex-shrink:0}
.hbg{background:var(--bg3);border:1.5px solid var(--border);color:var(--text2);cursor:pointer;padding:7px;border-radius:9px;display:flex;align-items:center;justify-content:center;transition:.15s}
#bnav{background:rgba(8,12,20,.97);border-top:1.5px solid var(--border);flex-shrink:0;padding:4px 0 8px}
.bni{display:flex;justify-content:space-around}
.bni-btn{display:flex;flex-direction:column;align-items:center;gap:3px;background:none;border:none;color:var(--text3);font-size:10px;font-weight:600;cursor:pointer;padding:7px 8px;border-radius:10px;min-width:52px;transition:.15s}
.bni-btn svg{width:21px;height:21px}
.bni-btn.on{color:var(--blue2)}
.bni-dot{display:none;width:7px;height:7px;border-radius:50%;background:var(--red);margin-top:-16px;margin-right:-14px;border:2px solid var(--bg);align-self:flex-end}
#sporcu-portal{display:none;flex-direction:column;height:100vh;overflow:hidden}
.sp-hd{background:var(--bg2);border-bottom:1.5px solid var(--border);padding:14px 16px;display:flex;align-items:center;gap:12px;flex-shrink:0}
.sp-tabs{display:flex;background:var(--bg3);border-bottom:1.5px solid var(--border);flex-shrink:0}
.sp-tab{flex:1;padding:12px 4px;text-align:center;font-size:12px;font-weight:700;color:var(--text2);border:none;background:none;cursor:pointer;border-bottom:2px solid transparent;transition:.2s}
.sp-tab.on{color:var(--blue2);border-bottom-color:var(--blue)}
.sp-body{flex:1;overflow-y:auto;padding:14px}
#lbox-wrap{position:fixed;inset:0;background:radial-gradient(ellipse at top,#0d1f40,var(--bg));display:flex;align-items:center;justify-content:center;padding:20px;z-index:100}
.lbox{background:var(--bg2);border:1.5px solid var(--border);border-radius:20px;padding:30px 24px;width:100%;max-width:420px;box-shadow:var(--shadow)}
.llogo{text-align:center;margin-bottom:26px}
.llogo-i{width:68px;height:68px;background:var(--grad);border-radius:20px;display:flex;align-items:center;justify-content:center;font-size:32px;margin:0 auto 14px;box-shadow:var(--shadow2)}
.ltabs{display:flex;background:var(--bg3);border-radius:12px;padding:3px;margin-bottom:20px;border:1px solid var(--border)}
.ltab{flex:1;padding:9px;text-align:center;border-radius:9px;border:none;background:none;color:var(--text2);font-size:13px;font-weight:600;cursor:pointer;transition:.2s}
.ltab.on{background:var(--bg4);color:var(--text)}
.lerr{background:rgba(239,68,68,.08);border:1.5px solid rgba(239,68,68,.25);color:var(--red);border-radius:10px;padding:10px 13px;font-size:13px;margin-bottom:12px}
#loading-overlay{display:none;position:fixed;inset:0;background:rgba(8,12,20,.9);z-index:9990;align-items:center;justify-content:center;flex-direction:column;gap:14px}
.spin{width:38px;height:38px;border:3px solid var(--bg3);border-top-color:var(--blue);border-radius:50%;animation:spin .7s linear infinite}
.quick-actions{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:16px}
.qa-btn{background:var(--bg3);border:1.5px solid var(--border);border-radius:12px;padding:12px 6px;text-align:center;cursor:pointer;transition:.2s;display:flex;flex-direction:column;align-items:center;gap:6px}
.qa-btn:active{transform:scale(.95)}
.qa-icon{font-size:20px}.qa-lbl{font-size:10px;font-weight:700;color:var(--text2);letter-spacing:.3px}
.mini-chart{display:flex;align-items:flex-end;gap:3px;height:48px;padding-top:4px}
.mc-bar{flex:1;border-radius:3px 3px 0 0;min-height:3px;transition:.5s}
.profile-hero{background:linear-gradient(135deg,var(--bg3),var(--bg4));border:1.5px solid var(--border);border-radius:16px;padding:20px;margin-bottom:14px}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes slideUp{from{transform:translateY(8px);opacity:0}to{transform:translateY(0);opacity:1}}
.anim{animation:slideUp .2s ease-out}
.sms-code{display:flex;gap:8px;justify-content:center;margin:16px 0}
.sms-digit{width:44px;height:52px;background:var(--bg3);border:2px solid var(--border);border-radius:10px;color:var(--text);font-size:22px;font-weight:700;text-align:center;outline:none;transition:.2s}
.sms-digit:focus{border-color:var(--blue);background:var(--bg4)}
@media(max-width:600px){
  .g4{grid-template-columns:1fr 1fr}.g3{grid-template-columns:1fr 1fr}.g2{grid-template-columns:1fr}.g21{grid-template-columns:1fr}
  .fg{grid-template-columns:1fr}.fgr.full{grid-column:1}
}
</style>

<body>
<div id="loading-overlay"><div class="spin"></div><div style="color:var(--text2);font-size:13px;font-weight:600">Yukleniyor...</div></div>
<div id="lbox-wrap">
  <div class="lbox">
    <div class="llogo">
      <div class="llogo-i">&#x26BD;</div>
      <h1 style="font-size:22px;font-weight:800;letter-spacing:-.5px">Sporcu Paneli</h1>
      <p style="color:var(--text2);font-size:13px;margin-top:4px">Akademi Yonetim Sistemi</p>
    </div>
    <div class="ltabs">
      <button class="ltab on" onclick="switchLoginTab('admin')">Kurum Girisi</button>
      <button class="ltab" onclick="switchLoginTab('sporcu')">Sporcu / Veli</button>
    </div>
    <div id="login-admin">
      <div class="fgr mb3"><label>E-posta</label><input id="le" type="email" placeholder="ornek@email.com" onkeydown="if(event.key==='Enter')doLogin()"/></div>
      <div class="fgr mb3"><label>Sifre</label><input id="lp" type="password" placeholder="••••••••" onkeydown="if(event.key==='Enter')doLogin()"/></div>
      <div id="lerr" class="lerr dn"></div>
      <button class="btn bp w100 mb3" style="padding:12px" onclick="doLogin()">Giris Yap</button>
      <div style="text-align:center;font-size:13px;color:var(--text2)">
        <span onclick="showForgotPassword()" style="cursor:pointer;color:var(--blue2)">Sifremi Unuttum</span>
        &nbsp;·&nbsp;
        <span onclick="showRegister()" style="cursor:pointer;color:var(--blue2);font-weight:600">Kayit Ol</span>
      </div>
    </div>
    <div id="login-sporcu" class="dn">
      <div class="fgr mb3"><label>TC Kimlik No</label><input id="ls-tc" type="tel" maxlength="11" placeholder="11 haneli TC" onkeydown="if(event.key==='Enter')doSporcuLogin()"/></div>
      <div class="fgr mb3"><label>Sifre</label><input id="ls-pass" type="password" placeholder="••••••••" onkeydown="if(event.key==='Enter')doSporcuLogin()"/></div>
      <div id="ls-err" class="lerr dn">TC veya sifre hatali!</div>
      <button class="btn bp w100 mb3" style="padding:12px" onclick="doSporcuLogin()">Giris Yap</button>
      <div style="text-align:center;font-size:13px"><span onclick="showForgotPassword()" style="cursor:pointer;color:var(--blue2)">Sifremi Unuttum</span></div>
    </div>
  </div>
</div>
<div id="sporcu-portal">
  <div class="sp-hd">
    <div class="ava" id="sp-avatar">S</div>
    <div style="flex:1"><div class="tw6" id="sp-name">Sporcu</div><div style="font-size:11px;color:var(--text2)" id="sp-orgname">Akademi</div></div>
    <button class="btn bs btn-sm" onclick="doSporcuLogout()">Cikis</button>
  </div>
  <div class="sp-tabs">
    <button class="sp-tab on" onclick="spTab('profil')">&#x1F464; Profil</button>
    <button class="sp-tab" onclick="spTab('yoklama')">&#x1F4CB; Yoklama</button>
    <button class="sp-tab" onclick="spTab('odemeler')">&#x1F4B3; Odemeler</button>
    <button class="sp-tab" onclick="spTab('odeme-yap')">&#x1F4B8; Odeme Yap</button>
    <button class="sp-tab" onclick="spTab('duyurular')">&#x1F4E3; Duyurular</button>
  </div>
  <div class="sp-body" id="sp-content"></div>
</div>
<div id="wrap" class="dn">
  <div id="overlay" onclick="closeSide()"></div>
  <div id="side">
    <div class="slogo">
      <div class="slogo-icon" id="side-logo-icon">&#x26BD;</div>
      <img id="side-logo-img" style="display:none;height:34px;border-radius:9px;object-fit:contain" src="" alt="Logo"/>
      <div><div style="font-weight:700;font-size:13px" id="sn">Akademi</div><div style="font-size:11px;color:var(--text3)" id="sn2">Yonetim</div></div>

    <nav class="snav">

var NETGSM_USER = '', NETGSM_PASS = '', NETGSM_HEADER = 'SPORCU';

// ── Supabase JS Client (file:// ve tum ortamlarda calisir) ──
var _sb = null;
function getSB() {
  if (!_sb) {
    try { _sb = supabase.createClient(SUPA_URL, SUPA_KEY); } 
    catch(e) { console.error('Supabase init failed:', e); }
  }
  return _sb;
}

async function supaGet(t, f, extra) {
  try {
    var db = getSB(); if (!db) return null;
    var q = db.from(t).select('*').order('created_at', { ascending: false }).limit(2000);
    if (f) Object.keys(f).forEach(function(k) { q = q.eq(k, f[k]); });
    if (extra) {
      // extra = "column=gte.value" gibi ham filtre — parse et
      var m = extra.match(/^(\w+)=(gte|lte|gt|lt|neq|like|ilike)\.(.+)$/);
      if (m) {
        var ops = { gte: 'gte', lte: 'lte', gt: 'gt', lt: 'lt', neq: 'neq', like: 'like', ilike: 'ilike' };
        if (ops[m[2]]) q = q[ops[m[2]]](m[1], m[3]);
      }
    }
    var { data, error } = await q;
    if (error) { console.error('supaGet', t, error.message); return null; }
    return data || [];
  } catch(e) { console.error('supaGet err:', e.message); return null; }
}

async function supaPost(t, d) {
  try {
    var db = getSB(); if (!db) return null;
    var { data, error } = await db.from(t).insert(d).select();
    if (error) { console.error('supaPost', t, error.message); return null; }
    return data;
  } catch(e) { console.error('supaPost err:', e.message); return null; }
}

async function supaUpsert(t, d) {
  try {
    var db = getSB(); if (!db) return null;
    var arr = Array.isArray(d) ? d : [d];
    var { data, error } = await db.from(t).upsert(arr, { onConflict: 'id' }).select();
    if (error) { console.error('supaUpsert', t, error.message); return null; }
    return data;
  } catch(e) { console.error('supaUpsert err:', e.message); return null; }
}

async function supaDelete(t, f) {
  try {
    var db = getSB(); if (!db) return false;
    var q = db.from(t).delete();
    Object.keys(f).forEach(function(k) { q = q.eq(k, f[k]); });
    var { error } = await q;
    if (error) { console.error('supaDelete', t, error.message); return false; }
    return true;
  } catch(e) { console.error('supaDelete err:', e.message); return false; }
}

async function supaPatch(t, d, f) {
  try {
    var db = getSB(); if (!db) return null;
    var q = db.from(t).update(d);
    Object.keys(f).forEach(function(k) { q = q.eq(k, f[k]); });
    var { data, error } = await q.select();
    if (error) { console.error('supaPatch', t, error.message); return null; }
    return data;
  } catch(e) { console.error('supaPatch err:', e.message); return null; }
}

// ── SMS ───────────────────────────────────────────────────
async function sendSMS(phone, msg) {
  if (!NETGSM_USER || !phone) return false;
  var clean = phone.replace(/\D/g, '');
  if (clean.startsWith('0')) clean = '90' + clean.slice(1);
  else if (!clean.startsWith('90')) clean = '90' + clean;
  try {
    await fetch('https://api.netgsm.com.tr/sms/send/get/?usercode=' + encodeURIComponent(NETGSM_USER) + '&password=' + encodeURIComponent(NETGSM_PASS) + '&gsmno=' + clean + '&message=' + encodeURIComponent(msg) + '&msgheader=' + encodeURIComponent(NETGSM_HEADER), { mode: 'no-cors' });
    return true;
  } catch(e) { return false; }
}

// ── Bulk SMS ──────────────────────────────────────────────
async function sendBulkSMS(phones, msg) {
  var sent = 0;
  for (var i = 0; i < phones.length; i++) {
    if (await sendSMS(phones[i], msg)) sent++;
    await new Promise(function(r) { setTimeout(r, 100); });
  }
  return sent;
}

// ── SHA-256 ───────────────────────────────────────────────
async function sha256(str) {
  var buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
  return Array.from(new Uint8Array(buf)).map(function(b) { return b.toString(16).padStart(2, '0'); }).join('');
}

function hideLoading() { document.getElementById('loading-overlay').style.display = 'none'; }

// ── Utils ─────────────────────────────────────────────────
function tod() { var d = new Date(); return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0'); }
function uid() { return 'id-' + Date.now().toString(36) + Math.random().toString(36).slice(2, 6); }
function esc(s) { return String(s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;'); }
function ini(s) { var p = (s || '').trim().split(' '); return (p[0] ? p[0][0] : '') + (p[1] ? p[1][0] : ''); }
function fmtN(n) { return Number(n || 0).toLocaleString('tr-TR'); }
function fmtD(s) { if (!s) return '-'; try { var d = new Date(s); return d.getDate() + '.' + (d.getMonth() + 1) + '.' + d.getFullYear(); } catch(e) { return s; } }
function age(bd) { if (!bd) return '-'; var d = new Date(bd), now = new Date(); return now.getFullYear() - d.getFullYear() - (now < new Date(now.getFullYear(), d.getMonth(), d.getDate()) ? 1 : 0); }
function gv(id) { var el = document.getElementById(id); return el ? el.value.trim() : ''; }
function gvn(id) { return parseFloat(gv(id)) || 0; }
function stl(s) { var m = { active: 'Aktif', inactive: 'Pasif', pending: 'Bekliyor', completed: 'Tamamlandi', overdue: 'Gecikti', cancelled: 'Iptal' }; return m[s] || s || '-'; }
function stc(s) { var m = { active: 'bg-g', inactive: 'bg-r', pending: 'bg-y', completed: 'bg-g', overdue: 'bg-r', cancelled: 'bg-r' }; return m[s] || 'bg-b'; }
function semi(sp) {
  if (!sp) return '';
  var sl = sp.toLowerCase();
  if (sl.indexOf('futbol') >= 0) return '&#x26BD;';
  if (sl.indexOf('basketbol') >= 0) return '&#x1F3C0;';
  if (sl.indexOf('yuzme') >= 0 || sl.indexOf('yüzme') >= 0) return '&#x1F3CA;';
  if (sl.indexOf('tenis') >= 0) return '&#x1F3BE;';
  if (sl.indexOf('voleybol') >= 0) return '&#x1F3D0;';
  if (sl.indexOf('gures') >= 0 || sl.indexOf('güreş') >= 0) return '&#x1F94B;';
  if (sl.indexOf('boks') >= 0) return '&#x1F94A;';
  if (sl.indexOf('jimnastik') >= 0) return '&#x1F938;';
  if (sl.indexOf('atletizm') >= 0) return '&#x1F3C3;';
  return '&#x1F3C5;';
}
function cname(ci) { for (var i = 0; i < coaches.length; i++) { if (coaches[i].id === ci) return coaches[i].fn + ' ' + coaches[i].ln; } return '-'; }
function clsName(ci) { for (var i = 0; i < classes.length; i++) { if (classes[i].id === ci) return classes[i].name; } return '-'; }
function attRate(aid) { var tot = 0, pres = 0; Object.keys(attData).forEach(function(d) { if (attData[d] && attData[d][aid]) { tot++; if (attData[d][aid] === 'P') pres++; } }); return tot ? Math.round(pres / tot * 100) : null; }
function overdueCount() { var n = 0; payments.forEach(function(p) { if (p.st === 'overdue') n++; }); return n; }
function pendingCount() { var n = 0; payments.forEach(function(p) { if (p.needsApproval && p.st === 'pending') n++; }); return n; }
function unreadCount() { var n = 0; messages.forEach(function(m) { if (!m.rd) n++; }); return n; }
function row(lbl, val) { return '<div class="dr"><span class="dl tm tsm">' + lbl + '</span><span class="dvl tw6 tsm">' + val + '</span></div>'; }
function avatarColor(name) { var colors = ['var(--grad)', 'linear-gradient(135deg,#22c55e,#06b6d4)', 'linear-gradient(135deg,#f59e0b,#ef4444)', 'linear-gradient(135deg,#a855f7,#3b82f6)', 'linear-gradient(135deg,#06b6d4,#3b82f6)']; return colors[((name || 'A').charCodeAt(0)) % colors.length]; }
function getBranch(id) { for (var i = 0; i < _branchesCache.length; i++) { if (_branchesCache[i].id === (id || currentBranchId)) return _branchesCache[i]; } return null; }
function getOrgById(id) { for (var i = 0; i < _orgsCache.length; i++) { if (_orgsCache[i].id === id) return _orgsCache[i]; } return null; }
function getBranchesByOrg(orgId) { return _branchesCache.filter(function(b) { return b.orgId === orgId; }); }

// ── Auto overdue ──────────────────────────────────────────
function checkOverdue() {
  var today = tod();
  payments.forEach(function(p) {
    if (p.st === 'pending' && p.dd && p.dd < today && !p.needsApproval) { p.st = 'overdue'; dbSavePay(p); }
  });
}

// ── Load Branch Data ──────────────────────────────────────
async function loadBranchData() {
  showLoading();
  try {
    var bid = currentBranchId;
    var res = await Promise.all([
      supaGet('athletes', { branch_id: bid }),
      supaGet('payments', { branch_id: bid }),
      supaGet('coaches', { branch_id: bid }),
      supaGet('attendance', { branch_id: bid }),
      supaGet('messages', { branch_id: bid }),
      supaGet('settings', { branch_id: bid }),
      supaGet('sports', { branch_id: bid }),
      supaGet('classes', { branch_id: bid })
    ]);
    athletes = (res[0] || []).map(dbToAth);
    payments = (res[1] || []).map(dbToPay);
    coaches = (res[2] || []).map(dbToCoach);
    attData = {};
    (res[3] || []).forEach(function(r) { if (!attData[r.att_date]) attData[r.att_date] = {}; attData[r.att_date][r.athlete_id] = r.status; });
    messages = (res[4] || []).map(dbToMsg);
    var branch = getBranch(bid);
    settings = res[5] && res[5][0] ? dbToSettings(res[5][0]) : { schoolName: branch ? branch.name : 'Sube' };
    // Dragos Futbol Akademisi için varsayılan logo ve isim
    if (!settings.logoUrl) settings.logoUrl = DRAGOS_LOGO;
    if (!settings.schoolName || settings.schoolName === 'Sube') settings.schoolName = branch ? branch.name : 'Dragos Futbol Akademisi';
    sports = (res[6] || []).map(dbToSport);
    classes = (res[7] || []).map(dbToClass);
    if (settings.netgsmUser) { NETGSM_USER = settings.netgsmUser; NETGSM_PASS = settings.netgsmPass || ''; NETGSM_HEADER = settings.netgsmHeader || 'SPORCU'; }
    checkOverdue();
  } catch(e) { console.error('loadBranchData:', e); }
  hideLoading();
}

// ── Export CSV ────────────────────────────────────────────
function exportCSV(data, filename) {
  if (!data || !data.length) { toast('Disa aktarilacak veri yok', 'e'); return; }
  var cols = Object.keys(data[0]);
  var csv = cols.join(';') + '\n' + data.map(function(r) { return cols.map(function(c) { var v = r[c] === null || r[c] === undefined ? '' : String(r[c]); return '"' + v.replace(/"/g, '""') + '"'; }).join(';'); }).join('\n');
  var blob = new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-8;' });
  var a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = filename + '.csv'; a.click();
  toast('CSV indirildi!', 'g');
}

function exportPayments() { exportCSV(payments.map(function(p) { return { Tarih: p.dt, Sporcu: p.an, Aciklama: p.ds, Tutar: p.amt, Tur: p.ty === 'income' ? 'Gelir' : 'Gider', Durum: stl(p.st) }; }), 'odemeler'); }

var _qrStream = null;
function showQRScanner() {
  modal('QR ile Yoklama',
    '<div id="qr-video-wrap" style="text-align:center"><video id="qr-video" style="width:100%;max-width:300px;border-radius:12px;background:#000" autoplay playsinline></video></div>' +
    '<div id="qr-status" class="al al-b mt2" style="text-align:center">Kamera baslatiliyor...</div>' +
    '<div class="mt2"><label>Manuel TC Giris</label><div class="flex gap2"><input class="fs" id="qr-manual" type="tel" maxlength="11" placeholder="11 haneli TC"/><button class="btn bp" onclick="onQRDetected(document.getElementById(\'qr-manual\').value)">Yoklama Al</button></div></div>',
    [{ lbl: 'Kapat', cls: 'bs', fn: function() { stopQR(); closeModal(); } }]
  );
  setTimeout(startQR, 200);
}
async function startQR() {
  try {
    var stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
    _qrStream = stream;
    var video = document.getElementById('qr-video'); if (!video) { stream.getTracks().forEach(function(t) { t.stop(); }); return; }
    video.srcObject = stream; video.play();
    var statusEl = document.getElementById('qr-status'); if (statusEl) statusEl.textContent = 'QR kodu veya TC okutun...';
    scanQRFrame(video);
  } catch(e) { var statusEl = document.getElementById('qr-status'); if (statusEl) { statusEl.className = 'al al-y mt2'; statusEl.textContent = 'Kamera izni yok — Manuel TC girebilirsiniz'; } }
}
function scanQRFrame(video) {
  if (!document.getElementById('qr-video')) return;
  if (typeof BarcodeDetector !== 'undefined') {
    var bd = new BarcodeDetector({ formats: ['qr_code'] });
    var canvas = document.createElement('canvas'); canvas.width = video.videoWidth || 320; canvas.height = video.videoHeight || 240;
    canvas.getContext('2d').drawImage(video, 0, 0);
    bd.detect(canvas).then(function(codes) { if (codes && codes.length > 0) onQRDetected(codes[0].rawValue); else setTimeout(function() { scanQRFrame(video); }, 200); }).catch(function() { setTimeout(function() { scanQRFrame(video); }, 200); });
  }
}
function onQRDetected(val) {
  if (!val) return;
  stopQR();
  var found = null;
  athletes.forEach(function(a) { if (a.tc === val || a.id === val) found = a; });
  var el = document.getElementById('qr-status');
  if (!found) { if (el) { el.className = 'al al-r mt2'; el.textContent = 'Sporcu bulunamadi: ' + val; } return; }
  if (!attData[ATD]) attData[ATD] = {};
  attData[ATD][found.id] = 'P';
  dbSaveAtt(ATD, found.id, 'P');
  if (el) { el.className = 'al al-g mt2'; el.innerHTML = '&#x2705; ' + esc(found.fn) + ' ' + esc(found.ln) + ' — Yoklama alindi!'; }
  setTimeout(startQR, 1500);
}
function stopQR() { if (_qrStream) { _qrStream.getTracks().forEach(function(t) { t.stop(); }); _qrStream = null; } }

async function doLogin() {
  var e = gv('le'), p = gv('lp');
  if (!e || !p) { showErr('lerr', 'E-posta ve sifre gerekli!'); return; }
  showLoading();
  try {
    // Tabloları ayrı ayrı cek, hata verse de devam et
    var allUsers = await supaGet('users') || [];
    var allOrgs = []; try { allOrgs = await supaGet('orgs') || []; } catch(e2) {}
    var allBranches = []; try { allBranches = await supaGet('branches') || []; } catch(e2) {}

    _usersCache = allUsers.map(function(u) { return { id: u.id, orgId: u.org_id, branchId: u.branch_id, email: u.email, pass: u.pass, role: u.role, name: u.name, phone: u.phone }; });
    _orgsCache = allOrgs.map(function(o) { return { id: o.id, name: o.name, status: o.status || 'approved', registered_at: o.registered_at }; });
    _branchesCache = allBranches.map(function(b) { return { id: b.id, orgId: b.org_id, name: b.name, code: b.code }; });
    // br-default icin isim override
    if (!_branchesCache.length) {
      _branchesCache.push({ id: 'br-default', orgId: 'org-default', name: 'Dragos Futbol Akademisi', code: 'DFA' });
    }

    var ph = await sha256(p);
    var found = null;
    for (var i = 0; i < _usersCache.length; i++) {
      var u = _usersCache[i];
      // Sifre: duz metin, SHA-256, veya herhangi bir hash eslesmesi
      if (u.email === e && (u.pass === p || u.pass === ph || (!u.pass && p === 'admin123'))) { found = u; break; }
    }
    hideLoading();
    if (found) {
      // Onay kontrolü — super admin her zaman girebilir
      if (found.email !== SUPER_ADMIN_EMAIL) {
        var foundOrg = allOrgs.find(function(o) { return o.id === found.orgId; });
        if (foundOrg && foundOrg.status === 'pending') {
          hideLoading();
          showErr('lerr', '⏳ Hesabınız henüz onaylanmadı. Yönetici onayı bekleniyor.');
          return;
        }
        if (foundOrg && foundOrg.status === 'rejected') {
          hideLoading();
          showErr('lerr', '❌ Hesabınız reddedildi. Detay için yöneticiyle iletişime geçin.');
          return;
        }
      }
      currentUser = found;
      // org_id ve branch_id yoksa varsayilan ata
      currentOrgId = found.orgId || (allOrgs[0] && allOrgs[0].id) || 'org-default';
      currentBranchId = found.branchId || (allBranches[0] && allBranches[0].id) || 'br-default';
      // Eger branch cache'de yoksa manuel ekle
      if (!getBranch(currentBranchId)) {
        _branchesCache.push({ id: currentBranchId, orgId: currentOrgId, name: settings.schoolName || 'Merkez Sube', code: 'MRK' });
      }
      acct.email = found.email; acct.pass = found.pass;
      await loadBranchData();
      document.getElementById('lbox-wrap').style.display = 'none';
      document.getElementById('wrap').classList.remove('dn');
      document.getElementById('lerr').classList.add('dn');
      var dname = found.name || found.email.split('@')[0];
      var setEl = function(id, v) { var el = document.getElementById(id); if (el) el.textContent = v; };
      setEl('suname', dname); setEl('sava', (dname[0] || 'A').toUpperCase()); setEl('bar-ava', (dname[0] || 'A').toUpperCase());
      updateBranchUI(); updateBadges(); go('dashboard');
    } else {
      showErr('lerr', 'E-posta veya sifre hatali!');
    }
  } catch(err) { hideLoading(); console.error('Login error:', err); showErr('lerr', 'Baglanti hatasi: ' + (err.message || err)); }
}

    h += '</div>';
  }
  if (overdueCount()) h += '<div class="al al-r mb3">&#x26A0; ' + overdueCount() + ' gecikmis odeme var</div>';
  h += '<div class="filters mb3"><input class="fs" type="search" placeholder="&#x1F50D; Ara..." value="' + esc(_payFilter.q) + '" oninput="_payFilter.q=this.value;renderPayTbl()">';
  h += '<select class="fs" style="flex:0 0 auto;width:150px" onchange="_payFilter.st=this.value;renderPayTbl()"><option value="">Tum Durumlar</option>';
  ['pending', 'completed', 'overdue', 'cancelled'].forEach(function(s) { h += '<option value="' + s + '"' + (_payFilter.st === s ? ' selected' : '') + '>' + stl(s) + '</option>'; });

  });
  var h = '<div class="tw"><table><thead><tr><th>Tarih</th><th>Sporcu</th><th>Aciklama</th><th>Tutar</th><th>Vade</th><th>Durum</th><th></th></tr></thead><tbody>';

    h += '<td class="tw6 ' + (p.ty === 'income' ? 'tg' : 'tr2') + '">' + (p.ty === 'income' ? '↑' : '↓') + fmtN(p.amt) + ' TL</td>';

  });

async function savePay() {
  var ds = gv('pf-ds'), am = gvn('pf-am');
  if (!ds || !am) { toast('Aciklama ve tutar zorunlu!', 'e'); return; }
  var ty = gv('pf-ty'), aid = gv('pf-at');
  var ath = null; for (var i = 0; i < athletes.length; i++) { if (athletes[i].id === aid) { ath = athletes[i]; break; } }
  var p = { id: uid(), aid: aid, an: ath ? (ath.fn + ' ' + ath.ln) : '', amt: am, dt: gv('pf-dt'), dd: gv('pf-dd'), ty: ty, cat: gv('pf-ct'), ds: ds, st: gv('pf-st'), inv: (ty === 'income' ? 'INV' : 'EXP') + '-' + Date.now() };
  payments.unshift(p); showLoading(); await dbSavePay(p); hideLoading(); closeModal(); renderPayTbl(); toast('Odeme kaydedildi', 'g');
}
function delPay(id) { confirm2('Odeme silinsin mi?', 'Bu islem geri alinamaz.', async function() { payments = payments.filter(function(p) { return p.id !== id; }); await dbDelPay(id); renderPayTbl(); toast('Odeme silindi'); }); }
async function markPaid(id) { var p = null; for (var i = 0; i < payments.length; i++) { if (payments[i].id === id) { payments[i].st = 'completed'; p = payments[i]; break; } } if (p) { showLoading(); await dbSavePay(p); hideLoading(); } updateBadges(); go(curPage); toast('Odeme tamamlandi', 'g'); }
async function approveHavale(id) { var p = null; for (var i = 0; i < payments.length; i++) { if (payments[i].id === id) { payments[i].st = 'completed'; payments[i].needsApproval = false; payments[i].approvedBy = currentUser ? currentUser.name : 'Admin'; payments[i].approvedAt = tod(); p = payments[i]; break; } } if (p) { showLoading(); await dbSavePay(p); hideLoading(); } updateBadges(); go(curPage); toast('Havale onaylandi!', 'g'); }
function rejectHavale(id) { confirm2('Havale Reddedilsin mi?', 'Odeme iptal edilecek.', async function() { var p = null; for (var i = 0; i < payments.length; i++) { if (payments[i].id === id) { payments[i].st = 'cancelled'; payments[i].needsApproval = false; p = payments[i]; break; } } if (p) { showLoading(); await dbSavePay(p); hideLoading(); } go(curPage); toast('Havale reddedildi'); }); }

function pgAccounting() {
  var months = ['Ocak','Subat','Mart','Nisan','Mayis','Haziran','Temmuz','Agustos','Eylul','Ekim','Kasim','Aralik'];
  var now = new Date(), cy = now.getFullYear(), cm = now.getMonth();
  var income = 0, expense = 0, monthly = {};
  for (var i = 0; i < 12; i++) monthly[i] = { income: 0, expense: 0 };
  payments.forEach(function(p) {
    if (p.st !== 'completed') return;
    var d = new Date(p.dt); if (d.getFullYear() === cy) { var m = d.getMonth(); if (p.ty === 'income') { monthly[m].income += Number(p.amt)||0; income += Number(p.amt)||0; } else { monthly[m].expense += Number(p.amt)||0; expense += Number(p.amt)||0; } }
  });
  var net = income - expense;
  var h = '<div class="ph"><div class="sh"><div><div class="stit">&#x1F4CA; Muhasebe</div><div class="ssub">' + cy + ' yili</div></div><button class="btn bs btn-sm" onclick="exportPaymentsExcel()">&#x1F4CA; Excel</button></div></div>';
  h += '<div class="g3 mb3">' + sc('g','&#x2B06;',fmtN(income)+' TL','Toplam Gelir','') + sc('r','&#x2B07;',fmtN(expense)+' TL','Toplam Gider','') + sc(net>=0?'b':'r','&#x1F4B0;',fmtN(net)+' TL','Net','') + '</div>';
  // Donut chart (SVG)
  var total = income + expense || 1;
  var incPct = Math.round(income/total*100);
  var r = 52, circ = 2*Math.PI*r;
  var incDash = circ * income/total, expDash = circ * expense/total;
  h += '<div class="g21 mb3">';
  h += '<div class="card" style="display:flex;align-items:center;justify-content:center;flex-direction:column;gap:12px"><div class="tw6 mb2">Gelir / Gider Dagilimi</div>';
  h += '<svg width="130" height="130" viewBox="0 0 130 130"><circle cx="65" cy="65" r="' + r + '" fill="none" stroke="var(--bg3)" stroke-width="18"/>';
  h += '<circle cx="65" cy="65" r="' + r + '" fill="none" stroke="var(--green)" stroke-width="18" stroke-dasharray="' + incDash + ' ' + (circ-incDash) + '" stroke-dashoffset="' + (circ*0.25) + '" transform="rotate(-90 65 65)"/>';
  if (expense > 0) h += '<circle cx="65" cy="65" r="' + r + '" fill="none" stroke="var(--red)" stroke-width="18" stroke-dasharray="' + expDash + ' ' + (circ-expDash) + '" stroke-dashoffset="' + (-(incDash - circ*0.25)) + '" transform="rotate(-90 65 65)"/>';
  h += '<text x="65" y="60" text-anchor="middle" fill="var(--text)" font-size="16" font-weight="800">' + incPct + '%</text>';
  h += '<text x="65" y="76" text-anchor="middle" fill="var(--text2)" font-size="10">Gelir</text></svg>';
  h += '<div class="flex gap3"><div class="flex fca gap1"><div style="width:10px;height:10px;border-radius:50%;background:var(--green)"></div><span class="ts">Gelir</span></div><div class="flex fca gap1"><div style="width:10px;height:10px;border-radius:50%;background:var(--red)"></div><span class="ts">Gider</span></div></div></div>';
  // Bar chart
  var mx = Math.max.apply(null, Object.keys(monthly).map(function(k){return Math.max(monthly[k].income,monthly[k].expense);})) || 1;
  h += '<div class="card"><div class="tw6 mb3">Aylik Grafik</div>';
  h += '<div style="display:flex;gap:3px;align-items:flex-end;height:100px;padding-bottom:24px;position:relative">';
  for (var i = 0; i < 12; i++) {
    var ih = Math.round(monthly[i].income/mx*90), eh = Math.round(monthly[i].expense/mx*90), isNow = i===cm;
    h += '<div style="flex:1;display:flex;flex-direction:column;align-items:center;position:relative">';
    h += '<div style="width:100%;display:flex;align-items:flex-end;gap:1px;height:90px">';
    h += '<div title="' + fmtN(monthly[i].income) + ' TL" style="flex:1;background:rgba(34,197,94,' + (isNow?'0.9':'0.55') + ');height:' + ih + 'px;border-radius:3px 3px 0 0;min-height:' + (monthly[i].income>0?3:0) + 'px"></div>';
    h += '<div title="' + fmtN(monthly[i].expense) + ' TL" style="flex:1;background:rgba(239,68,68,' + (isNow?'0.9':'0.55') + ');height:' + eh + 'px;border-radius:3px 3px 0 0;min-height:' + (monthly[i].expense>0?3:0) + 'px"></div>';
    h += '</div><div style="font-size:8px;color:' + (isNow?'var(--blue2)':'var(--text3)') + ';font-weight:' + (isNow?700:400) + ';position:absolute;bottom:-16px">' + months[i].slice(0,3) + '</div></div>';
  }
  h += '</div></div></div>';
  h += '<div class="card mt3"><div class="tw6 mb3">Aylik Detay</div><div class="tw"><table><thead><tr><th>Ay</th><th>Gelir</th><th>Gider</th><th>Net</th></tr></thead><tbody>';
  for (var i = 11; i >= 0; i--) {
    var n2 = monthly[i].income - monthly[i].expense;
    h += '<tr' + (i===cm?' style="background:rgba(59,130,246,.05)"':'') + '><td class="tsm tw6">' + months[i] + (i===cm?' <span class="bg bg-b" style="font-size:9px">Bu Ay</span>':'') + '</td><td class="tg tsm">' + fmtN(monthly[i].income) + ' TL</td><td class="tr2 tsm">' + fmtN(monthly[i].expense) + ' TL</td><td class="tw6 tsm ' + (n2>=0?'tg':'tr2') + '">' + fmtN(n2) + ' TL</td></tr>';
  }
  h += '</tbody></table></div></div>'; return h;
}

function pgAttendance() {
  var spList = []; athletes.forEach(function(a){if(a.sp&&spList.indexOf(a.sp)<0)spList.push(a.sp);});

  var h = '<div class="ph"><div class="sh"><div><div class="stit">&#x1F4CB; Devam Takibi</div></div>';
  h += '<div class="flex gap1"><button class="btn bp btn-sm" onclick="showQRScanner()">&#x1F4F7; QR</button></div></div></div>';

  }

  if(list.length>0){var pct=Math.round(present/list.length*100);h+='<div class="card mb3"><div class="flex fca fjb mb2"><span class="tw6 tsm">Devam Orani — '+fmtD(ATD)+'</span><span class="tw6" style="color:'+(pct>=80?'var(--green)':pct>=60?'var(--yellow)':'var(--red)')+'">%'+pct+'</span></div><div class="pr"><div class="prb '+(pct>=80?'prb-g':pct>=60?'prb-y':'prb-r')+'" style="width:'+pct+'%"></div></div></div>';}
  h += '<div class="g21">';

  if(!list.length)h+='<div style="text-align:center;padding:30px;color:var(--text3)">Bu filtrede sporcu yok</div>';
  list.forEach(function(a){
    var s2=day[a.id]||'';
    h+='<div class="att-row"><div class="ava" style="width:28px;height:28px;font-size:10px;flex-shrink:0;background:'+avatarColor(a.fn)+'">'+ini(a.fn+' '+a.ln)+'</div>';
    h+='<div style="flex:1;min-width:0"><div class="tw6 tsm trunc">'+esc(a.fn)+' '+esc(a.ln)+'</div><div class="ts tm">'+semi(a.sp)+' '+esc(a.sp)+(a.clsId?' · '+esc(clsName(a.clsId)):'')+'</div></div>';
    h+='<div class="att-btns"><button class="att-b'+(s2==='P'?' ap':'')+'" onclick="setAtt(\''+a.id+'\',\'P\')">VAR</button><button class="att-b'+(s2==='L'?' al2':'')+'" onclick="setAtt(\''+a.id+'\',\'L\')">GEC</button><button class="att-b'+(s2==='A'?' aa':'')+'" onclick="setAtt(\''+a.id+'\',\'A\')">YOK</button></div></div>';
  });
  h += '</div>';
  h += '<div class="card"><div class="tw6 mb3">Devam Oranlari</div>';
  var sorted = athletes.filter(function(a){return a.st==='active';}).map(function(a){return{a:a,r:attRate(a.id)||0};}).sort(function(x,y){return y.r-x.r;});
  sorted.slice(0,15).forEach(function(item){
    var a=item.a,r=item.r;

async function setAtt(aid,s){
  if(!attData[ATD])attData[ATD]={};
  var rem=attData[ATD][aid]===s;
  if(rem){delete attData[ATD][aid];await dbSaveAtt(ATD,aid,undefined);}
  else{attData[ATD][aid]=s;await dbSaveAtt(ATD,aid,s);}
  go('attendance');
}
async function markAllAtt(s){
  if(!attData[ATD])attData[ATD]={};
  var list=athletes.filter(function(a){return a.st==='active'&&(!ATSP||a.sp===ATSP)&&(!ATCLS||a.clsId===ATCLS);});
  showLoading();
  for(var i=0;i<list.length;i++){attData[ATD][list[i].id]=s;await dbSaveAtt(ATD,list[i].id,s);}
  hideLoading();go('attendance');toast('Yoklama guncellendi','g');
}

// ── SPORCU EXCEL IMPORT ───────────────────────────────────
function importAthletesExcel() {
  var input = document.createElement('input');
  input.type = 'file';
  input.accept = '.xlsx,.xls,.csv';
  input.onchange = function(e) {
    var file = e.target.files[0];
    if (!file) return;
    var reader = new FileReader();
    reader.onload = function(ev) {
      try {
        var wb = XLSX.read(ev.target.result, { type: 'binary', cellDates: true });
        var ws = wb.Sheets[wb.SheetNames[0]];
        var rows = XLSX.utils.sheet_to_json(ws, { header: 1, defval: '' });
        if (rows.length < 2) { toast('Dosya bos veya hatali!', 'e'); return; }
        previewImport(rows);
      } catch(err) {
        toast('Dosya okunamadi: ' + err.message, 'e');
      }
    };
    reader.readAsBinaryString(file);
  };
  input.click();
}

function previewImport(rows) {
  var header = rows[0].map(function(h) { return String(h).trim(); });
  var dataRows = rows.slice(1).filter(function(r) { return r.some(function(c) { return c !== ''; }); });

  // Kolon indekslerini bul (esnek — başlık sırasına göre)
  function col(names) {
    for (var i = 0; i < names.length; i++) {
      var idx = header.findIndex(function(h) { return h.toLowerCase().indexOf(names[i].toLowerCase()) >= 0; });
      if (idx >= 0) return idx;
    }
    return -1;
  }
  var map = {
    fn:   col(['ad','first','isim']),
    ln:   col(['soyad','last']),
    tc:   col(['tc','kimlik']),
    bd:   col(['dogum','birth','tarih']),
    gn:   col(['cinsiyet','gender']),
    ph:   col(['telefon','phone','tel']),
    em:   col(['e-posta','email','mail']),
    sp:   col(['spor','brans','branch','sport']),
    cat:  col(['kategori','cat']),
    lic:  col(['lisans','lic']),
    fee:  col(['ucret','fee','aidat','tutar']),
    vd:   col(['vade']),
    st:   col(['durum','status']),
    pn:   col(['veli adi','veli a','parent name']),
    pph:  col(['veli tel','veli t','parent phone']),
    pem:  col(['veli e','parent email']),
    nt:   col(['not','note'])
  };

  var parsed = [], errors = [], skipped = 0;
  dataRows.forEach(function(r, ri) {
    var fn = map.fn >= 0 ? String(r[map.fn] || '').trim() : '';
    var ln = map.ln >= 0 ? String(r[map.ln] || '').trim() : '';
    var tc = map.tc >= 0 ? String(r[map.tc] || '').trim().replace(/\D/g,'') : '';
    if (!fn && !ln) { skipped++; return; }
    if (tc && (tc.length !== 11)) errors.push('Satir ' + (ri+2) + ': TC hatali (' + fn + ' ' + ln + ')');
    var bdRaw = map.bd >= 0 ? r[map.bd] : '';
    var bd = '';
    if (bdRaw instanceof Date) {
      bd = bdRaw.getFullYear() + '-' + String(bdRaw.getMonth()+1).padStart(2,'0') + '-' + String(bdRaw.getDate()).padStart(2,'0');
    } else if (bdRaw) {
      var s = String(bdRaw).trim();
      // DD.MM.YYYY → YYYY-MM-DD
      var m = s.match(/^(\d{1,2})\.(\d{1,2})\.(\d{4})$/);
      if (m) bd = m[3] + '-' + m[2].padStart(2,'0') + '-' + m[1].padStart(2,'0');
      else bd = s;
    }
    var stRaw = map.st >= 0 ? String(r[map.st] || '').toLowerCase() : 'aktif';
    var stVal = (stRaw.indexOf('pasif') >= 0 || stRaw === 'inactive') ? 'inactive' : 'active';
    parsed.push({
      id: uid(),
      fn: fn, ln: ln, tc: tc, bd: bd,
      gn: map.gn >= 0 ? String(r[map.gn] || '').trim() : '',
      ph: map.ph >= 0 ? String(r[map.ph] || '').trim() : '',
      em: map.em >= 0 ? String(r[map.em] || '').trim() : '',
      sp: map.sp >= 0 ? String(r[map.sp] || '').trim() : '',
      cat: map.cat >= 0 ? String(r[map.cat] || '').trim() : '',
      lic: map.lic >= 0 ? String(r[map.lic] || '').trim() : '',
      fee: map.fee >= 0 ? (parseFloat(r[map.fee]) || 0) : 0,
      vd: map.vd >= 0 ? (parseInt(r[map.vd]) || undefined) : undefined,
      st: stVal,
      pn: map.pn >= 0 ? String(r[map.pn] || '').trim() : '',
      pph: map.pph >= 0 ? String(r[map.pph] || '').trim() : '',
      pem: map.pem >= 0 ? String(r[map.pem] || '').trim() : '',
      nt: map.nt >= 0 ? String(r[map.nt] || '').trim() : '',
      rd: tod()
    });
  });

  // Preview modal
  var errHtml = errors.length ? '<div class="al al-y mb3"><b>&#x26A0; ' + errors.length + ' uyari:</b><br>' + errors.slice(0,5).map(esc).join('<br>') + '</div>' : '';
  var h = errHtml;
  h += '<div class="g3 mb3">' +
    sc('g','&#x1F465;', parsed.length, 'Eklenecek Sporcu', '') +
    sc('y','&#x26A0;', errors.length, 'Uyari', '') +
    sc('b','&#x23E9;', skipped, 'Atlandi', '') + '</div>';
  h += '<div class="al al-b mb3">&#x2139; Mevcut sporcularla TC eslesirse <b>guncellenir</b>, yenilerse <b>eklenir</b>.</div>';
  h += '<div class="tw" style="max-height:280px;overflow-y:auto"><table><thead><tr><th>Ad Soyad</th><th>TC</th><th>Spor</th><th>Ucret</th><th>Durum</th></tr></thead><tbody>';
  parsed.slice(0, 50).forEach(function(a) {
    h += '<tr><td class="tsm">' + esc(a.fn) + ' ' + esc(a.ln) + '</td><td class="tsm tm">' + esc(a.tc) + '</td><td class="tsm">' + esc(a.sp) + '</td><td class="tsm">' + fmtN(a.fee) + ' TL</td><td><span class="bg ' + stc(a.st) + '">' + stl(a.st) + '</span></td></tr>';
  });
  if (parsed.length > 50) h += '<tr><td colspan="5" style="text-align:center;color:var(--text3);padding:8px">...ve ' + (parsed.length-50) + ' sporcu daha</td></tr>';
  h += '</tbody></table></div>';
  modal('Excel Aktar — Onay', h, [
    { lbl: 'Iptal', cls: 'bs', fn: function() { closeModal(); } },
    { lbl: '&#x1F4E5; ' + parsed.length + ' Sporcu Yukle', cls: 'bp', fn: function() { doImportAthletes(parsed); } }
  ]);
}

async function doImportAthletes(parsed) {
  closeModal();
  showLoading();
  var added = 0, updated = 0;
  for (var i = 0; i < parsed.length; i++) {
    var a = parsed[i];
    // TC ile eşleşme kontrol
    var existing = null;
    if (a.tc) {
      for (var j = 0; j < athletes.length; j++) {

    if (existing) {

function previewImport(rows) {
  var header = rows[0].map(function(h) { return String(h).trim(); });
  var dataRows = rows.slice(1).filter(function(r) { return r.some(function(c) { return c !== ''; }); });

  // Kolon indekslerini bul (esnek — başlık sırasına göre)
  function col(names) {
    for (var i = 0; i < names.length; i++) {
      var idx = header.findIndex(function(h) { return h.toLowerCase().indexOf(names[i].toLowerCase()) >= 0; });
      if (idx >= 0) return idx;
    }
    return -1;
  }
  var map = {
    fn:   col(['ad','first','isim']),
    ln:   col(['soyad','last']),
    tc:   col(['tc','kimlik']),
    bd:   col(['dogum','birth','tarih']),
    gn:   col(['cinsiyet','gender']),
    ph:   col(['telefon','phone','tel']),
    em:   col(['e-posta','email','mail']),
    sp:   col(['spor','brans','branch','sport']),
    cat:  col(['kategori','cat']),
    lic:  col(['lisans','lic']),
    fee:  col(['ucret','fee','aidat','tutar']),
    vd:   col(['vade']),
    st:   col(['durum','status']),
    pn:   col(['veli adi','veli a','parent name']),
    pph:  col(['veli tel','veli t','parent phone']),
    pem:  col(['veli e','parent email']),
    nt:   col(['not','note'])
  };

  var parsed = [], errors = [], skipped = 0;
  dataRows.forEach(function(r, ri) {
    var fn = map.fn >= 0 ? String(r[map.fn] || '').trim() : '';
    var ln = map.ln >= 0 ? String(r[map.ln] || '').trim() : '';
    var tc = map.tc >= 0 ? String(r[map.tc] || '').trim().replace(/\D/g,'') : '';
    if (!fn && !ln) { skipped++; return; }
    if (tc && (tc.length !== 11)) errors.push('Satir ' + (ri+2) + ': TC hatali (' + fn + ' ' + ln + ')');
    var bdRaw = map.bd >= 0 ? r[map.bd] : '';
    var bd = '';
    if (bdRaw instanceof Date) {
      bd = bdRaw.getFullYear() + '-' + String(bdRaw.getMonth()+1).padStart(2,'0') + '-' + String(bdRaw.getDate()).padStart(2,'0');
    } else if (bdRaw) {
      var s = String(bdRaw).trim();
      // DD.MM.YYYY → YYYY-MM-DD
      var m = s.match(/^(\d{1,2})\.(\d{1,2})\.(\d{4})$/);
      if (m) bd = m[3] + '-' + m[2].padStart(2,'0') + '-' + m[1].padStart(2,'0');
      else bd = s;
    }
    var stRaw = map.st >= 0 ? String(r[map.st] || '').toLowerCase() : 'aktif';
    var stVal = (stRaw.indexOf('pasif') >= 0 || stRaw === 'inactive') ? 'inactive' : 'active';
    parsed.push({
      id: uid(),
      fn: fn, ln: ln, tc: tc, bd: bd,
      gn: map.gn >= 0 ? String(r[map.gn] || '').trim() : '',
      ph: map.ph >= 0 ? String(r[map.ph] || '').trim() : '',
      em: map.em >= 0 ? String(r[map.em] || '').trim() : '',
      sp: map.sp >= 0 ? String(r[map.sp] || '').trim() : '',
      cat: map.cat >= 0 ? String(r[map.cat] || '').trim() : '',
      lic: map.lic >= 0 ? String(r[map.lic] || '').trim() : '',
      fee: map.fee >= 0 ? (parseFloat(r[map.fee]) || 0) : 0,
      vd: map.vd >= 0 ? (parseInt(r[map.vd]) || undefined) : undefined,
      st: stVal,
      pn: map.pn >= 0 ? String(r[map.pn] || '').trim() : '',
      pph: map.pph >= 0 ? String(r[map.pph] || '').trim() : '',
      pem: map.pem >= 0 ? String(r[map.pem] || '').trim() : '',
      nt: map.nt >= 0 ? String(r[map.nt] || '').trim() : '',
      rd: tod()
    });
  });

  // Preview modal
  var errHtml = errors.length ? '<div class="al al-y mb3"><b>&#x26A0; ' + errors.length + ' uyari:</b><br>' + errors.slice(0,5).map(esc).join('<br>') + '</div>' : '';
  var h = errHtml;
  h += '<div class="g3 mb3">' +
    sc('g','&#x1F465;', parsed.length, 'Eklenecek Sporcu', '') +
    sc('y','&#x26A0;', errors.length, 'Uyari', '') +
    sc('b','&#x23E9;', skipped, 'Atlandi', '') + '</div>';
  h += '<div class="al al-b mb3">&#x2139; Mevcut sporcularla TC eslesirse <b>guncellenir</b>, yenilerse <b>eklenir</b>.</div>';
  h += '<div class="tw" style="max-height:280px;overflow-y:auto"><table><thead><tr><th>Ad Soyad</th><th>TC</th><th>Spor</th><th>Ucret</th><th>Durum</th></tr></thead><tbody>';
  parsed.slice(0, 50).forEach(function(a) {
    h += '<tr><td class="tsm">' + esc(a.fn) + ' ' + esc(a.ln) + '</td><td class="tsm tm">' + esc(a.tc) + '</td><td class="tsm">' + esc(a.sp) + '</td><td class="tsm">' + fmtN(a.fee) + ' TL</td><td><span class="bg ' + stc(a.st) + '">' + stl(a.st) + '</span></td></tr>';
  });
  if (parsed.length > 50) h += '<tr><td colspan="5" style="text-align:center;color:var(--text3);padding:8px">...ve ' + (parsed.length-50) + ' sporcu daha</td></tr>';
  h += '</tbody></table></div>';
  modal('Excel Aktar — Onay', h, [
    { lbl: 'Iptal', cls: 'bs', fn: function() { closeModal(); } },
    { lbl: '&#x1F4E5; ' + parsed.length + ' Sporcu Yukle', cls: 'bp', fn: function() { doImportAthletes(parsed); } }
  ]);
}

  XLSX.utils.book_append_sheet(wb, sumWs, cy + ' Ozet');
  XLSX.writeFile(wb, 'muhasebe_' + tod() + '.xlsx');
  toast('Muhasebe Excel indirildi!', 'g');
}

// ── MUHASEBE EXCEL IMPORT ─────────────────────────────────
function importPaymentsExcel() {
  var input = document.createElement('input');
  input.type = 'file';
  input.accept = '.xlsx,.xls,.csv';
  input.onchange = function(e) {
    var file = e.target.files[0];
    if (!file) return;
    var reader = new FileReader();
    reader.onload = function(ev) {
      try {
        var wb = XLSX.read(ev.target.result, { type: 'binary', cellDates: true });
        var ws = wb.Sheets[wb.SheetNames[0]];
        var rows = XLSX.utils.sheet_to_json(ws, { header: 1, defval: '' });
        if (rows.length < 2) { toast('Dosya bos!', 'e'); return; }
        previewPaymentImport(rows);
      } catch(err) { toast('Dosya okunamadi!', 'e'); }
    };
    reader.readAsBinaryString(file);
  };
  input.click();
}

function previewPaymentImport(rows) {
  var header = rows[0].map(function(h) { return String(h).trim(); });
  var dataRows = rows.slice(1).filter(function(r) { return r.some(function(c) { return c !== ''; }); });
  function col(names) {
    for (var i = 0; i < names.length; i++) {
      var idx = header.findIndex(function(h) { return h.toLowerCase().indexOf(names[i].toLowerCase()) >= 0; });
      if (idx >= 0) return idx;
    }
    return -1;
  }
  var map = {
    dt:  col(['tarih','date']),
    an:  col(['sporcu','isim','ad']),
    ds:  col(['aciklama','desc','note']),
    cat: col(['kategori','cat']),
    ty:  col(['tur','type','gelir']),
    amt: col(['tutar','amount','tl']),
    dd:  col(['vade']),
    st:  col(['durum','status'])
  };
  var parsed = [];
  dataRows.forEach(function(r) {
    var amtRaw = map.amt >= 0 ? r[map.amt] : 0;
    var amt = parseFloat(String(amtRaw).replace(',','.')) || 0;
    if (!amt) return;
    var tyRaw = map.ty >= 0 ? String(r[map.ty] || '').toLowerCase() : 'gelir';
    var ty = (tyRaw.indexOf('gider') >= 0 || tyRaw === 'expense') ? 'expense' : 'income';
    var dtRaw = map.dt >= 0 ? r[map.dt] : '';
    var dt = '';
    if (dtRaw instanceof Date) dt = dtRaw.getFullYear()+'-'+String(dtRaw.getMonth()+1).padStart(2,'0')+'-'+String(dtRaw.getDate()).padStart(2,'0');
    else { var s=String(dtRaw).trim(); var m2=s.match(/^(\d{1,2})\.(\d{1,2})\.(\d{4})$/); if(m2)dt=m2[3]+'-'+m2[2].padStart(2,'0')+'-'+m2[1].padStart(2,'0'); else dt=s||tod(); }
    var stRaw = map.st >= 0 ? String(r[map.st]||'').toLowerCase() : '';
    var st = stRaw.indexOf('tamamlan')>=0||stRaw==='completed' ? 'completed' : stRaw.indexOf('gecik')>=0 ? 'overdue' : 'pending';
    parsed.push({ id: uid(), aid: '', an: map.an>=0?String(r[map.an]||'').trim():'', ds: map.ds>=0?String(r[map.ds]||'').trim():'', cat: map.cat>=0?String(r[map.cat]||'').trim():'Diger', ty: ty, amt: amt, dt: dt, dd: map.dd>=0?String(r[map.dd]||'').trim():'', st: st, inv: 'IMP-'+Date.now()+Math.random().toString(36).slice(2,5) });
  });
  var totalInc = 0, totalExp = 0;
  parsed.forEach(function(p){if(p.ty==='income')totalInc+=p.amt;else totalExp+=p.amt;});
  var h = '<div class="g3 mb3">' +
    sc('b','&#x1F4C4;',parsed.length,'Kayit','') +
    sc('g','&#x2B06;',fmtN(totalInc)+' TL','Gelir','') +
    sc('r','&#x2B07;',fmtN(totalExp)+' TL','Gider','') + '</div>';
  h += '<div class="tw" style="max-height:280px;overflow-y:auto"><table><thead><tr><th>Tarih</th><th>Sporcu</th><th>Aciklama</th><th>Tutar</th><th>Tur</th></tr></thead><tbody>';
  parsed.slice(0,50).forEach(function(p){h+='<tr><td class="tsm">'+fmtD(p.dt)+'</td><td class="tsm">'+esc(p.an)+'</td><td class="tsm tm">'+esc(p.ds)+'</td><td class="tsm tw6 '+(p.ty==='income'?'tg':'tr2')+'">'+fmtN(p.amt)+' TL</td><td><span class="bg '+(p.ty==='income'?'bg-g':'bg-r')+'">'+(p.ty==='income'?'Gelir':'Gider')+'</span></td></tr>';});
  if(parsed.length>50)h+='<tr><td colspan="5" style="text-align:center;color:var(--text3);padding:8px">...ve '+(parsed.length-50)+' kayit daha</td></tr>';
  h+='</tbody></table></div>';
  modal('Muhasebe Aktar — Onay', h, [
    { lbl: 'Iptal', cls: 'bs', fn: function() { closeModal(); } },
    { lbl: '&#x1F4E5; ' + parsed.length + ' Kayit Yukle', cls: 'bp', fn: function() { doImportPayments(parsed); } }
  ]);
}

async function doImportPayments(parsed) {
  closeModal(); showLoading();
  for (var i = 0; i < parsed.length; i++) {
    payments.unshift(parsed[i]);
    await dbSavePay(parsed[i]);
  }
  hideLoading();
  toast(parsed.length + ' odeme kaydi yuklendi!', 'g');
  go('payments');
}

function genInvNo() {
  // Otomatik fatura no üret: INV-YYMM-XXXX
  var d = new Date();

  var el = document.getElementById('ap-inv');
  if (el) { el.value = no; el.style.color = 'var(--green)'; }
}

async function saveAthPayment(athId) {
  var amt   = parseFloat((document.getElementById('ap-amt')  || {}).value || '0');
  var desc  = (document.getElementById('ap-desc') || {}).value || '';
  var dt    = (document.getElementById('ap-dt')   || {}).value || tod();
  var dd    = (document.getElementById('ap-dd')   || {}).value || '';
  var inv   = (document.getElementById('ap-inv')  || {}).value || '';
  var st    = (document.getElementById('ap-st')   || {}).value || 'completed';
  var note  = (document.getElementById('ap-havale-note') || {}).value || '';
  var method = window._curPayMethod || 'nakit';
  var type   = window._curPayType   || 'aidat';

  if (!amt || amt <= 0) { toast('Tutar giriniz!', 'e'); return; }
  if (!desc)            { toast('Açıklama giriniz!', 'e'); return; }

  // Online ise otomatik onaylı + fatura kodu zaten set
  if (method === 'online' && !inv) {
    var autoEl = document.getElementById('ap-auto-code');
    inv = autoEl ? autoEl.textContent : 'ONL-' + Date.now().toString(36).toUpperCase();
  }

  var a = null;
  for (var i = 0; i < athletes.length; i++) { if (athletes[i].id === athId) { a = athletes[i]; break; } }
  if (!a) { toast('Sporcu bulunamadı!', 'e'); return; }

  var p = {
    id: uid(),
    aid: athId,
    an: a.fn + ' ' + a.ln,
    amt: amt,
    dt: dt,
    dd: dd,
    ty: 'income',
    cat: type === 'aidat' ? 'Aidat' : 'Spor Malzemesi',
    ds: desc,
    st: st,
    inv: inv || ('INV-' + Date.now().toString(36).toUpperCase()),
    payMethod: method,
    havaleNote: note,
    needsApproval: (method === 'havale' && st === 'pending')
  };

  showLoading();
  payments.unshift(p);
  await dbSavePay(p);
  hideLoading();
  closeModal();
  updateBadges();

  // Başarı bildirimi — fatura no ile
  toast('✅ ' + fmtN(amt) + ' TL kaydedildi — ' + (inv || p.inv), 'g');
  go(curPage);
}

  modal('Ödeme Onayla', h, [
    { lbl: 'Vazgeç', cls: 'bs', fn: function() { closeModal(); } },
    { lbl: '✅ Onayla', cls: 'bp', fn: function() {
      var invVal = (document.getElementById('mpi-inv') || {}).value || autoNo;
      doMarkPaidWithInv(id, invVal);
    }}
  ]);
}

async function doMarkPaidWithInv(id, invNo) {
  var p = null;
  for (var i = 0; i < payments.length; i++) {
    if (payments[i].id === id) {
      payments[i].st = 'completed';
      payments[i].inv = invNo || payments[i].inv;
      payments[i].approvedBy = currentUser ? currentUser.name : 'Admin';
      payments[i].approvedAt = tod();
      p = payments[i];
      break;
    }
  }
  if (p) { showLoading(); await dbSavePay(p); hideLoading(); }
  closeModal();
  updateBadges();
  toast('✅ Ödeme onaylandı — ' + (invNo || ''), 'g');
  go(curPage);
}

// ══════════════════════════════════════════════════════════
//  KURUM ONAY YÖNETİMİ (Sadece Super Admin)
// ══════════════════════════════════════════════════════════

// Bekleyen kurumlar tam sayfası
function pgPendingOrgs() {
  if (!currentUser || currentUser.email !== SUPER_ADMIN_EMAIL) {
    return '<div class="card" style="text-align:center;padding:40px;color:var(--text3)">Bu sayfaya erişim yetkiniz yok.</div>';
  }
  var allO = _orgsCache.filter(function(o) { return o.id !== SUPER_ADMIN_ORG; });
  var pending  = allO.filter(function(o) { return o.status === 'pending'; });
  var approved = allO.filter(function(o) { return o.status === 'approved' || !o.status; });
  var rejected = allO.filter(function(o) { return o.status === 'rejected'; });

  var h = '<div class="ph"><div class="sh"><div><div class="stit">🏢 Kurum Yönetimi</div><div class="ssub">' + allO.length + ' kurum</div></div></div></div>';

  // Özet kartlar
  h += '<div class="g3 mb3">';
  h += sc('y', '⏳', pending.length, 'Onay Bekliyor', '');
  h += sc('g', '✅', approved.length, 'Onaylı', '');
  h += sc('r', '❌', rejected.length, 'Reddedildi', '');
  h += '</div>';

  // Bekleyenler
  if (pending.length) {
    h += '<div class="card mb3" style="border-color:rgba(245,158,11,.3)">';
    h += '<div class="tw6 ty mb3">⏳ Onay Bekleyen Kurumlar (' + pending.length + ')</div>';
    pending.forEach(function(o) { h += orgRow(o, true); });
    h += '</div>';
  }

  // Onaylılar
  if (approved.length) {
    h += '<div class="card mb3">';
    h += '<div class="tw6 mb3">✅ Onaylı Kurumlar (' + approved.length + ')</div>';
    approved.forEach(function(o) { h += orgRow(o, false); });
    h += '</div>';
  }

  // Reddedilenler
  if (rejected.length) {
    h += '<div class="card">';
    h += '<div class="tw6 tr2 mb3">❌ Reddedilen Kurumlar (' + rejected.length + ')</div>';
    rejected.forEach(function(o) { h += orgRow(o, false); });
    h += '</div>';
  }

  if (!allO.length) {
    h += '<div class="card" style="text-align:center;padding:40px;color:var(--text3)"><div style="font-size:48px;margin-bottom:12px">🏢</div><div class="tw6">Henüz kayıt yok</div><div class="ts tm mt2">Diğer kurumlar kayıt oluşturduğunda burada görünür</div></div>';
  }
  return h;
}

function orgRow(o, showActions) {
  // Bu org'a ait kullanıcıları bul
  var orgUsers = _usersCache.filter(function(u) { return u.orgId === o.id; });
  var adminUser = orgUsers[0];
  var statusBadge = o.status === 'pending'
    ? '<span class="bg bg-y">⏳ Bekliyor</span>'
    : o.status === 'rejected'
    ? '<span class="bg bg-r">❌ Reddedildi</span>'
    : '<span class="bg bg-g">✅ Onaylı</span>';

  var h = '<div style="padding:14px;background:var(--bg3);border-radius:12px;margin-bottom:8px">';
  h += '<div class="flex fca fjb">';
  h += '<div class="flex fca gap3" style="flex:1;min-width:0">';
  h += '<div class="ava" style="width:44px;height:44px;font-size:16px;flex-shrink:0;background:' + avatarColor(o.name) + '">' + ini(o.name) + '</div>';
  h += '<div style="min-width:0">';
  h += '<div class="tw6 trunc">' + esc(o.name) + '</div>';
  if (adminUser) {
    h += '<div class="ts tm">' + esc(adminUser.name || '') + ' · ' + esc(adminUser.email || '') + '</div>';
    if (adminUser.phone) h += '<div class="ts tm">📞 ' + esc(adminUser.phone) + '</div>';
  }
  h += '<div class="ts tm mt1">' + statusBadge;
  if (o.registered_at) h += ' · Kayıt: ' + fmtD(o.registered_at.slice(0,10));
  h += '</div></div></div>';

  // Aksiyon butonları
  h += '<div class="flex gap1" style="flex-shrink:0;margin-left:8px">';
  if (o.status === 'pending') {
    h += '<button class="btn bsu btn-sm" onclick="approveOrg(\'' + o.id + '\')">✅ Onayla</button>';
    h += '<button class="btn bd btn-sm" onclick="rejectOrg(\'' + o.id + '\')">❌ Reddet</button>';
  } else if (o.status === 'approved' || !o.status) {
    h += '<button class="btn bd btn-sm" onclick="revokeOrg(\'' + o.id + '\')">🚫 İptal</button>';
  } else if (o.status === 'rejected') {
    h += '<button class="btn bsu btn-sm" onclick="approveOrg(\'' + o.id + '\')">✅ Onayla</button>';
  }
  h += '</div></div></div>';
  return h;
}

async function approveOrg(orgId) {
  confirm2('Kurum Onaylansın mı?', 'Kurum giriş yapabilecek.', async function() {
    showLoading();
    await supaPatch('orgs', { status: 'approved', approved_at: new Date().toISOString() }, { id: orgId });
    // Cache güncelle
    var o = _orgsCache.find(function(o) { return o.id === orgId; });
    if (o) o.status = 'approved';
    hideLoading();
    toast('✅ Kurum onaylandı!', 'g');
    updateBadges();
    go('pending-orgs');
  });
}

async function rejectOrg(orgId) {
  confirm2('Kurum Reddedilsin mi?', 'Kurum giriş yapamayacak.', async function() {
    showLoading();
    await supaPatch('orgs', { status: 'rejected' }, { id: orgId });
    var o = _orgsCache.find(function(o) { return o.id === orgId; });
    if (o) o.status = 'rejected';
    hideLoading();
    toast('Kurum reddedildi', 'r');
    updateBadges();
    go('pending-orgs');
  });
}

async function revokeOrg(orgId) {
  confirm2('Erişim İptal Edilsin mi?', 'Kurum tekrar giriş yapamaz.', async function() {
    showLoading();
    await supaPatch('orgs', { status: 'pending' }, { id: orgId });
    var o = _orgsCache.find(function(o) { return o.id === orgId; });
    if (o) o.status = 'pending';
    hideLoading();
    toast('Erişim askıya alındı', 'y');
    go('pending-orgs');
  });
}

</script>
