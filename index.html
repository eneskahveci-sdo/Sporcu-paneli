<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<meta name="theme-color" content="#080c14"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<title>Sporcu Paneli</title>
<link rel="manifest" href="data:application/json,{&quot;name&quot;:&quot;Sporcu Paneli&quot;,&quot;short_name&quot;:&quot;Sporcu&quot;,&quot;display&quot;:&quot;standalone&quot;,&quot;background_color&quot;:&quot;#080c14&quot;,&quot;theme_color&quot;:&quot;#3b82f6&quot;}"/>
<link rel="stylesheet" href="style.css">
<!-- Supabase JS Client -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<!-- SheetJS -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
</head>
<body>
<!-- Skeleton Loading Overlay -->
<div id="skeleton-overlay" class="skeleton-overlay dn">
  <div class="skeleton-container">
    <div class="skeleton-header">
      <div class="skeleton skeleton-logo"></div>
      <div class="skeleton skeleton-title"></div>
    </div>
    <div class="skeleton-grid">
      <div class="skeleton skeleton-card"></div>
      <div class="skeleton skeleton-card"></div>
      <div class="skeleton skeleton-card"></div>
      <div class="skeleton skeleton-card"></div>
    </div>
    <div class="skeleton skeleton-list"></div>
  </div>
</div>

<!-- Loading Overlay -->
<div id="loading-overlay" class="dn"><div class="spin"></div><div class="loading-text">Yukleniyor...</div></div>

<!-- Login Box -->
<div id="lbox-wrap">
  <div class="lbox">
    <div class="llogo">
      <div class="llogo-i">&#x26BD;</div>
      <h1>Sporcu Paneli</h1>
      <p>Akademi Yonetim Sistemi</p>
    </div>
    <div class="ltabs">
      <button class="ltab on" data-tab="admin">Kurum Girisi</button>
      <button class="ltab" data-tab="sporcu">Sporcu / Veli</button>
    </div>
    <div id="login-admin">
      <div class="fgr mb3"><label>E-posta</label><input id="le" type="email" placeholder="ornek@email.com"/></div>
      <div class="fgr mb3"><label>Sifre</label><input id="lp" type="password" placeholder="••••••••"/></div>
      <div id="lerr" class="lerr dn"></div>
      <button class="btn bp w100 mb3" id="btn-login-admin">Giris Yap</button>
      <div class="login-links">
        <span id="link-forgot">Sifremi Unuttum</span>
        <span>·</span>
        <span id="link-register">Kayit Ol</span>
      </div>
    </div>
    <div id="login-sporcu" class="dn">
      <div class="fgr mb3"><label>TC Kimlik No</label><input id="ls-tc" type="tel" maxlength="11" placeholder="11 haneli TC"/></div>
      <div class="fgr mb3"><label>Sifre</label><input id="ls-pass" type="password" placeholder="••••••••"/></div>
      <div id="ls-err" class="lerr dn">TC veya sifre hatali!</div>
      <button class="btn bp w100 mb3" id="btn-login-sporcu">Giris Yap</button>
      <div class="login-links"><span id="link-forgot2">Sifremi Unuttum</span></div>
    </div>
  </div>
</div>

<!-- Sporcu Portal -->
<div id="sporcu-portal">
  <div class="sp-hd">
    <div class="ava" id="sp-avatar">S</div>
    <div class="sp-info"><div class="tw6" id="sp-name">Sporcu</div><div class="ts tm" id="sp-orgname">Akademi</div></div>
    <button class="btn bs btn-sm" id="btn-sporcu-logout">Cikis</button>
  </div>
  <div class="sp-tabs">
    <button class="sp-tab on" data-tab="profil">&#x1F464; Profil</button>
    <button class="sp-tab" data-tab="yoklama">&#x1F4CB; Yoklama</button>
    <button class="sp-tab" data-tab="odemeler">&#x1F4B3; Odemeler</button>
    <button class="sp-tab" data-tab="odeme-yap">&#x1F4B8; Odeme Yap</button>
    <button class="sp-tab" data-tab="duyurular">&#x1F4E3; Duyurular</button>
  </div>
  <div class="sp-body" id="sp-content"></div>
</div>

<!-- Main App -->
<div id="wrap" class="dn">
  <div id="overlay"></div>
  <div id="side">
    <div class="slogo">
      <div class="slogo-icon" id="side-logo-icon">&#x26BD;</div>
      <img id="side-logo-img" src="/assets/logo.png" alt="Logo"/>
      <div class="slogo-text">
        <div id="sn">Akademi</div>
        <div class="ts tm" id="sn2">Yonetim</div>
      </div>
    </div>
    <nav class="snav">
      <div class="nsec">Ana Menu</div>
      <button class="ni on" data-page="dashboard"><svg viewBox="0 0 24 24"><path d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>Gosterge</button>
      <button class="ni" data-page="athletes"><svg viewBox="0 0 24 24"><path d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0z"/></svg>Sporcular</button>
      <button class="ni" data-page="payments"><svg viewBox="0 0 24 24"><path d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>Odemeler<span class="badge dn" id="badge-pay">0</span></button>
      <button class="ni" data-page="accounting"><svg viewBox="0 0 24 24"><path d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/></svg>Muhasebe</button>
      <button class="ni" data-page="attendance"><svg viewBox="0 0 24 24"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4"/></svg>Devam</button>
      <button class="ni" data-page="coaches"><svg viewBox="0 0 24 24"><path d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>Antrenorler</button>
      <button class="ni" data-page="messages"><svg viewBox="0 0 24 24"><path d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z"/></svg>Mesajlar<span class="badge dn" id="badge-msg">0</span></button>
      <div class="nsec">Yonetim</div>
      <button class="ni" data-page="branches"><svg viewBox="0 0 24 24"><path d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"/></svg>Subeler</button>
      <button class="ni" data-page="sports"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/></svg>Branslar</button>
      <button class="ni" data-page="classes"><svg viewBox="0 0 24 24"><path d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"/></svg>Siniflar</button>
      <button class="ni" data-page="announcements"><svg viewBox="0 0 24 24"><path d="M11 5.882V19.24a1.76 1.76 0 01-3.417.592l-2.147-6.15M18 13a3 3 0 100-6M5.436 13.683A4.001 4.001 0 017 6h1.832c4.1 0 7.625-1.234 9.168-3v14c-1.543-1.766-5.067-3-9.168-3H7a3.988 3.988 0 01-1.564-.317z"/></svg>Duyurular</button>
      <button class="ni" data-page="sms"><svg viewBox="0 0 24 24"><path d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z"/></svg>SMS Duyuru</button>
      <div class="nsec" id="nav-sec-orgs" style="display:none">Platform</div>
      <button class="ni" id="ni-pending-orgs" style="display:none" data-page="pending-orgs"><svg viewBox="0 0 24 24"><path d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"/></svg>Kurum Yonetimi<span class="badge" id="badge-orgs" style="display:none"></span></button>
      <div class="nsec">Sistem</div>
      <button class="ni" data-page="settings"><svg viewBox="0 0 24 24"><path d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/><circle cx="12" cy="12" r="3"/></svg>Ayarlar</button>
      <div class="user-section">
        <div class="flex fca gap2 mb3">
          <div class="ava" id="sava">A</div>
          <div class="user-info"><div class="tw6 tsm trunc" id="suname">Admin</div><div class="ts tm">Yonetici</div></div>
        </div>
        <button class="btn bs btn-sm w100" id="btn-logout">Cikis Yap</button>
      </div>
    </nav>
  </div>
  <div class="main-container">
    <div id="bar">
      <button class="hbg" id="btn-menu"><svg width="20" height="20" viewBox="0 0 24 24"><path d="M4 6h16M4 12h16M4 18h16"/></svg></button>
      <div id="bar-title">Gosterge</div>
      <div class="ava" id="bar-ava">A</div>
    </div>
    <div id="main"></div>
    <!-- Pagination -->
    <div id="pagination" class="pagination dn">
      <button class="btn bs btn-sm" id="btn-prev">← Onceki</button>
      <span class="page-info" id="page-info">1 / 1</span>
      <button class="btn bs btn-sm" id="btn-next">Sonraki →</button>
    </div>
    <div id="bnav">
      <div class="bni">
        <button class="bni-btn on" data-page="dashboard"><svg viewBox="0 0 24 24"><path d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>Ana</button>
        <button class="bni-btn" data-page="athletes"><svg viewBox="0 0 24 24"><path d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0z"/></svg>Sporcular</button>
        <button class="bni-btn" data-page="payments"><svg viewBox="0 0 24 24"><path d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>Odeme</button>
        <button class="bni-btn" data-page="attendance"><svg viewBox="0 0 24 24"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4"/></svg>Devam</button>
        <button class="bni-btn" data-page="settings"><svg viewBox="0 0 24 24"><path d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/><circle cx="12" cy="12" r="3"/></svg>Ayarlar</button>
      </div>
    </div>
  </div>
</div>

<!-- Modal -->
<div id="modal" class="modal-bg">
  <div class="modal-box">
    <div class="modal-hd"><div class="tw6" id="modal-title"></div><button class="modal-x" id="btn-modal-close">&#x2715;</button></div>
    <div class="modal-body" id="modal-body"></div>
    <div class="modal-ft" id="modal-footer"></div>
  </div>
</div>

<script type="module" src="app.js"></script>
</body>
</html>
